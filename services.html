<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Services Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0f172a;
color:white;

}

.container{

width:98%;
max-width:1400px;
margin:20px auto;

}

.header{

background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
margin-bottom:20px;

}

.header h2{

font-size:32px;

}

.search{

width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
margin-bottom:15px;

}

.actions{

display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;

}

.actions button{

flex:1;
min-width:140px;
padding:13px;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;

}

.refresh{

background:#7c3aed;

}

.add{

background:#22c55e;

}

.delete{

background:#dc2626;

}

.table-container{

width:100%;
overflow-x:auto;
-webkit-overflow-scrolling:touch;

}

table{

width:100%;
min-width:1100px;
border-collapse:collapse;
background:#1e293b;

}

th{

background:#334155;
padding:14px;
text-align:left;

}

td{

padding:14px;
border-bottom:1px solid #334155;

}

.edit{

background:#2563eb;
padding:8px 12px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;

}

.remove{

background:#dc2626;
padding:8px 12px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>

Services Management

</h2>

</div>

<input

class="search"

id="search"

type="text"

placeholder="Search Service..."

onkeyup="searchService()">

<div class="actions">

<button

class="refresh"

onclick="loadServices()">

Refresh

</button>

<button

class="add"

onclick="openAddService()">

Add Service

</button>

<button

class="delete"

onclick="deleteAllServices()">

Delete All Services

</button>

</div>

<div class="table-container">

<table>

<thead>

<tr>

<th>ID</th>

<th>Provider</th>

<th>Service</th>

<th>Category</th>

<th>Rate</th>

<th>Min</th>

<th>Max</th>

<th>Action</th>

</tr>

</thead>

<tbody id="serviceTable">

<tr>

<td colspan="8"
style="text-align:center;">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

let SERVICES=[];
  /* ===========================
   LOGIN CHECK
=========================== */

const USER = JSON.parse(localStorage.getItem("user"));

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER || USER.role!=="admin"){

location.href="login.html";

}

/* ===========================
   LOAD SERVICES
=========================== */

async function loadServices(){

try{

const response=await fetch(
API+"/api/services"
);

const data=await response.json();

SERVICES=data.services || [];

renderTable(SERVICES);

}catch(err){

document.getElementById("serviceTable").innerHTML=

"<tr><td colspan='8'>"+err.message+"</td></tr>";

}

}

/* ===========================
   RENDER TABLE
=========================== */

function renderTable(list){

const table=document.getElementById("serviceTable");

table.innerHTML="";

if(list.length===0){

table.innerHTML=

"<tr><td colspan='8' style='text-align:center;'>No Services Found</td></tr>";

return;

}

list.forEach(item=>{

table.innerHTML+=`

<tr>

<td>${item.id}</td>

<td>${item.provider_name || "-"}</td>

<td>${item.name}</td>

<td>${item.category}</td>

<td>₹${item.rate}</td>

<td>${item.min}</td>

<td>${item.max}</td>

<td>

<button

class="edit"

onclick="editService(${item.id})">

Edit

</button>

<button

class="remove"

onclick="deleteService(${item.id})">

Delete

</button>

</td>

</tr>

`;

});

}

/* ===========================
   SEARCH
=========================== */

function searchService(){

const key=

document.getElementById("search")
.value.toLowerCase();

const result=

SERVICES.filter(service=>

service.name.toLowerCase().includes(key) ||

service.category.toLowerCase().includes(key)

);

renderTable(result);

      }
  /* ===========================
   ADD SERVICE
=========================== */

function openAddService(){

location.href="add-service.html";

}

/* ===========================
   EDIT SERVICE
=========================== */

function editService(id){

location.href="edit-service.html?id="+id;

}

/* ===========================
   DELETE SERVICE
=========================== */

async function deleteService(id){

const ok=confirm(
"Delete this service?"
);

if(!ok) return;

try{

const response=await fetch(

API+"/api/services/"+id,

{

method:"DELETE"

}

);

const data=await response.json();

alert(data.message || "Service Deleted");

loadServices();

}catch(err){

alert(err.message);

}

}

/* ===========================
   DELETE ALL SERVICES
=========================== */

async function deleteAllServices(){

const ok=confirm(

"⚠️ Are you sure?\n\nThis will permanently delete ALL services."

);

if(!ok){

return;

}

try{

const response=await fetch(

API+"/api/services",

{

method:"DELETE"

}

);

const data=await response.json();

alert(data.message);

loadServices();

}catch(err){

alert(err.message);

}

}

/* ===========================
   AUTO REFRESH
=========================== */

setInterval(loadServices,30000);

/* ===========================
   PAGE LOAD
=========================== */

window.onload=function(){

loadServices();

};
  /* ===========================
   BUTTON ANIMATION
=========================== */

document.querySelectorAll("button").forEach(btn=>{

btn.addEventListener("mouseenter",function(){

this.style.transform="scale(1.03)";
this.style.transition=".2s";

});

btn.addEventListener("mouseleave",function(){

this.style.transform="scale(1)";

});

});

/* ===========================
   SHORTCUT KEYS
=========================== */

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

location.href="admindashboard.html";

}

if(e.ctrlKey && e.key==="r"){

e.preventDefault();

loadServices();

}

});

/* ===========================
   PAGE READY
=========================== */

console.log("Services Page Ready");

</script>

</body>

</html>
