<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Services Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
width:95%;
margin:auto;
padding:20px;
}

.search{
margin-bottom:20px;
}

.search input{

width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;

}

table{

width:100%;
border-collapse:collapse;

}

th{

background:#334155;
padding:12px;

}

td{

padding:10px;
text-align:center;
border-bottom:1px solid #475569;

}

button{

padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
margin:3px;

}

.add{
background:#22c55e;
}

.edit{
background:#3b82f6;
}

.delete{
background:#ef4444;
}

.refresh{
background:#9333ea;
}

</style>

</head>

<body>

<header>

🛒 Services Management

</header>

<div class="container">

<div class="search">

<input
type="text"
id="search"
placeholder="Search Service..."
onkeyup="searchServices()">

</div>

<table>

<thead>

<tr>

<th>ID</th>

<th>Provider</th>

<th>Service</th>

<th>Category</th>

<th>Rate</th>

<th>Min</th>

<th>Max</th>

<th>Action</th>

</tr>

</thead>

<tbody id="servicesTable">

</tbody>

</table>

<br>

<button
class="refresh"
onclick="loadServices()">

🔄 Refresh

</button>

<button
class="add"
onclick="location.href='add-service.html'">

➕ Add Service

</button>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

let allServices = [];
  /* ===========================
   LOAD SERVICES
=========================== */

async function loadServices(){

try{

const response = await fetch(
API + "/api/services"
);

const data = await response.json();

allServices = data.services || [];

renderServices(allServices);

}catch(err){

console.log(err);

document.getElementById("servicesTable").innerHTML =

`<tr>
<td colspan="8">
Failed to load services
</td>
</tr>`;

}

}

/* ===========================
   RENDER SERVICES
=========================== */

function renderServices(list){

const table =
document.getElementById("servicesTable");

table.innerHTML = "";

if(list.length===0){

table.innerHTML =

`<tr>
<td colspan="8">
No Services Found
</td>
</tr>`;

return;

}

list.forEach(service=>{

table.innerHTML += `

<tr>

<td>${service.id}</td>

<td>${service.provider_id || "-"}</td>

<td>${service.name}</td>

<td>${service.category}</td>

<td>₹ ${service.rate}</td>

<td>${service.min}</td>

<td>${service.max}</td>

<td>

<button
class="edit"
onclick="editService(${service.id})">

✏ Edit

</button>

<button
class="delete"
onclick="deleteService(${service.id})">

🗑 Delete

</button>

</td>

</tr>

`;

});

}
  /* ===========================
   SEARCH SERVICES
=========================== */

function searchServices(){

const keyword =
document.getElementById("search")
.value
.toLowerCase();

const filtered = allServices.filter(service =>

String(service.id)
.includes(keyword)

||

String(service.name)
.toLowerCase()
.includes(keyword)

||

String(service.category)
.toLowerCase()
.includes(keyword)

||

String(service.provider_id || "")
.includes(keyword)

);

renderServices(filtered);

}

/* ===========================
   EDIT SERVICE
=========================== */

function editService(serviceId){

location.href =
"edit-service.html?id=" + serviceId;

}

/* ===========================
   DELETE SERVICE
=========================== */

async function deleteService(serviceId){

const ok = confirm(
"Delete this service?"
);

if(!ok){
return;
}

try{

const response = await fetch(

API + "/api/services/" + serviceId,

{
method:"DELETE"
}

);

const data =
await response.json();

alert(
data.message || data.error
);

loadServices();

}catch(err){

alert(err.message);

}

}

/* ===========================
   PAGE LOAD
=========================== */

loadServices();

/* ===========================
   AUTO REFRESH
=========================== */

setInterval(loadServices,30000);

/* ===========================
   LOGOUT
=========================== */

function logout(){

localStorage.removeItem("token");
localStorage.removeItem("user");

location.href="login.html";

}
  /* ===========================
   LOGIN CHECK
=========================== */

if (!localStorage.getItem("token")) {
    location.href = "login.html";
}

/* ===========================
   WINDOW LOAD
=========================== */

window.onload = function () {
    loadServices();
};

/* ===========================
   BUTTON ANIMATION
=========================== */

document.querySelectorAll("button").forEach(btn => {

    btn.addEventListener("mouseenter", () => {
        btn.style.transform = "scale(1.05)";
        btn.style.transition = ".2s";
    });

    btn.addEventListener("mouseleave", () => {
        btn.style.transform = "scale(1)";
    });

});

</script>

</body>
</html>
