<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Users Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
}

.container{
width:100%;
max-width:1400px;
margin:auto;
padding:15px;
}

.header{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
margin-bottom:20px;
}

.header h2{
font-size:30px;
}

.search{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
margin-bottom:15px;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.actions button{
flex:1;
min-width:140px;
padding:13px;
border:none;
border-radius:8px;
font-size:16px;
color:#fff;
cursor:pointer;
}

.refresh{
background:#7c3aed;
}

.register{
background:#22c55e;
}

.table-container{
width:100%;
overflow-x:auto;
-webkit-overflow-scrolling:touch;
}

table{
width:100%;
min-width:900px;
border-collapse:collapse;
background:#1e293b;
}

th{
background:#334155;
padding:14px;
text-align:center;
}

td{
padding:14px;
text-align:center;
border-bottom:1px solid #334155;
white-space:nowrap;
}

.admin{
background:#2563eb;
padding:6px 10px;
border-radius:6px;
}

.user{
background:#16a34a;
padding:6px 10px;
border-radius:6px;
}

.wallet{
font-weight:bold;
color:#22c55e;
}

.delete{
background:#dc2626;
padding:8px 12px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:#1e293b;
padding:20px;
border-radius:10px;
width:95%;
max-width:420px;
}

.modal-content h3{
margin-bottom:15px;
text-align:center;
}

.modal-content input,
.modal-content select{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
}

.modal-buttons{
display:flex;
gap:10px;
}

.modal-buttons button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
}

.save{
background:#22c55e;
}

.cancel{
background:#ef4444;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h2>Users Management</h2>
</div>

<input
class="search"
id="search"
type="text"
placeholder="Search User..."
onkeyup="searchUsers()">

<div class="actions">

<button
class="refresh"
onclick="loadUsers()">
Refresh
</button>

<button
class="register"
onclick="openRegister()">
Register User
</button>

</div>

<div class="table-container">

<table>

<thead>

<tr>

<th>ID</th>
<th>Username</th>
<th>Role</th>
<th>Wallet</th>
<th>Action</th>

</tr>

</thead>

<tbody id="usersTable">

<tr>

<td colspan="5">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<!-- Register Modal -->

<div
class="modal"
id="registerModal">

<div class="modal-content">

<h3>Register User</h3>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<select id="role">

<option value="user">
User
</option>

<option value="admin">
Admin
</option>

</select>

<input
type="number"
id="wallet"
placeholder="Wallet Balance"
value="0">

<div class="modal-buttons">

<button
class="save"
onclick="registerUser()">
Register
</button>

<button
class="cancel"
onclick="closeRegister()">
Cancel
</button>

</div>

</div>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

let allUsers = [];
  /* ===========================
   LOGIN CHECK
=========================== */

const USER = JSON.parse(localStorage.getItem("user"));

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER || USER.role!=="admin"){

location.href="login.html";

}

/* ===========================
   LOAD USERS
=========================== */

async function loadUsers(){

try{

const response = await fetch(
API + "/api/users"
);

const data = await response.json();

if(!data.success){

document.getElementById("usersTable").innerHTML =
"<tr><td colspan='5'>No Users Found</td></tr>";

return;

}

allUsers = data.users;

renderUsers(allUsers);

}catch(err){

document.getElementById("usersTable").innerHTML =
"<tr><td colspan='5'>"+err.message+"</td></tr>";

}

}

/* ===========================
   RENDER USERS
=========================== */

function renderUsers(list){

const table =
document.getElementById("usersTable");

table.innerHTML="";

if(list.length===0){

table.innerHTML=
"<tr><td colspan='5'>No Users Found</td></tr>";

return;

}

list.forEach(user=>{

table.innerHTML += `

<tr>

<td>${user.id}</td>

<td>${user.username}</td>

<td>

<span class="${
user.role==="admin" ? "admin" : "user"
}">

${user.role}

</span>

</td>

<td class="wallet">

₹${Number(user.wallet).toFixed(2)}

</td>

<td>

<button
class="delete"
onclick="deleteUser(${user.id})">

Delete

</button>

</td>

</tr>

`;

});

}

/* ===========================
   SEARCH USER
=========================== */

function searchUsers(){

const keyword =
document.getElementById("search")
.value
.toLowerCase();

const filtered = allUsers.filter(user=>

user.username
.toLowerCase()
.includes(keyword)

||

user.role
.toLowerCase()
.includes(keyword)

||

String(user.id)
.includes(keyword)

);

renderUsers(filtered);

  }
  /* ===========================
   OPEN REGISTER
=========================== */

function openRegister(){

document.getElementById("registerModal").style.display="flex";

}

/* ===========================
   CLOSE REGISTER
=========================== */

function closeRegister(){

document.getElementById("registerModal").style.display="none";

document.getElementById("username").value="";
document.getElementById("password").value="";
document.getElementById("wallet").value="0";
document.getElementById("role").value="user";

}

/* ===========================
   REGISTER USER
=========================== */

async function registerUser(){

const username=
document.getElementById("username").value.trim();

const password=
document.getElementById("password").value;

const role=
document.getElementById("role").value;

const wallet=
Number(document.getElementById("wallet").value);

if(!username || !password){

alert("Enter Username & Password");

return;

}

try{

const response=await fetch(
API+"/api/register",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
password,
role
})
}
);

const data=await response.json();
  console.log("Register Response:", data);

if(!data.success){

alert(data.message);

return;

}

/* Optional Wallet */

if(wallet>0){

await fetch(
API+"/api/wallet/add",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id:data.user?.id,
amount:wallet
})
}
);

}

alert("User Registered Successfully");

closeRegister();

loadUsers();

}catch(err){

alert(err.message);

}

}

/* ===========================
   DELETE USER
=========================== */

async function deleteUser(id){

if(!confirm("Delete this user?")){

return;

}

try{

const response=await fetch(
API+"/api/users/"+id,
{
method:"DELETE"
}
);

const data=await response.json();

alert(data.message);

loadUsers();

}catch(err){

alert(err.message);

}

}

/* ===========================
   WINDOW LOAD
=========================== */

window.onload=function(){

loadUsers();

};

/* ===========================
   AUTO REFRESH
=========================== */

setInterval(loadUsers,30000);
  /* ===========================
   CLOSE MODAL OUTSIDE CLICK
=========================== */

window.onclick=function(e){

const modal=
document.getElementById("registerModal");

if(e.target===modal){

closeRegister();

}

};

/* ===========================
   BUTTON ANIMATION
=========================== */

document.querySelectorAll("button").forEach(btn=>{

btn.addEventListener("mouseenter",function(){

this.style.transform="scale(1.04)";
this.style.transition=".2s";

});

btn.addEventListener("mouseleave",function(){

this.style.transform="scale(1)";

});

});

/* ===========================
   SHORTCUT KEYS
=========================== */

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

closeRegister();

}

if(e.ctrlKey && e.key==="r"){

e.preventDefault();

loadUsers();

}

if(e.ctrlKey && e.key==="n"){

e.preventDefault();

openRegister();

}

});

/* ===========================
   PAGE READY
=========================== */

console.log("Users Management Ready");

</script>

</body>

</html>
