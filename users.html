<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Users Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1120;
color:#fff;
}

.container{
width:95%;
max-width:1500px;
margin:20px auto;
}

.header{

display:flex;
justify-content:space-between;
align-items:center;

background:#1e293b;

padding:20px;

border-radius:18px;

margin-bottom:20px;

box-shadow:0 10px 25px rgba(0,0,0,.35);

}

.brand{

display:flex;
align-items:center;
gap:15px;

}

.logo{

width:55px;
height:55px;

border-radius:14px;

background:linear-gradient(135deg,#7c3aed,#2563eb);

display:flex;
justify-content:center;
align-items:center;

font-size:30px;

}

.brand h2{

font-size:28px;

}

.actions{

display:flex;

gap:10px;

}

.actions button{

padding:12px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-size:15px;

font-weight:bold;

color:white;

transition:.2s;

}

.refresh{

background:#7c3aed;

}

.register{

background:#16a34a;

}

.search-box{

margin-bottom:20px;

}

.search-box input{

width:100%;

padding:14px;

border:none;

border-radius:12px;

font-size:16px;

outline:none;

background:#1e293b;

color:white;

}

.table-box{

background:#1e293b;

border-radius:18px;

overflow:auto;

box-shadow:0 10px 25px rgba(0,0,0,.35);

}

table{

width:100%;

min-width:1300px;

border-collapse:collapse;

}

th{

background:#334155;

padding:16px;

}

td{

padding:16px;

text-align:center;

border-bottom:1px solid #334155;

}

.role-admin{

background:#2563eb;

padding:6px 12px;

border-radius:6px;

}

.role-user{

background:#16a34a;

padding:6px 12px;

border-radius:6px;

}

.wallet{

color:#22c55e;

font-weight:bold;

}

.btn{

padding:8px 12px;

border:none;

border-radius:8px;

cursor:pointer;

font-weight:bold;

color:white;

margin:2px;

}

.balance{

background:#f59e0b;

}

.password{

background:#3b82f6;

}

.delete{

background:#dc2626;

}

.modal{

display:none;

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

background:rgba(0,0,0,.6);

justify-content:center;
align-items:center;

z-index:999;

}

.modal-content{

background:#1e293b;

padding:25px;

border-radius:15px;

width:95%;
max-width:430px;

}

.modal-content h3{

text-align:center;

margin-bottom:20px;

}

.modal-content input,
.modal-content select{

width:100%;

padding:13px;

margin-bottom:12px;

border:none;

border-radius:10px;

outline:none;

font-size:15px;

}

.modal-buttons{

display:flex;

gap:10px;

}

.modal-buttons button{

flex:1;

padding:12px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

color:white;

}

.save{

background:#16a34a;

}

.cancel{

background:#dc2626;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="brand">

<div class="logo">

👥

</div>

<h2 id="siteName">

Loading...

</h2>

</div>

<div class="actions">

<button
class="refresh"
onclick="loadUsers()">

🔄 Refresh

</button>

<button
class="register"
onclick="openRegister()">

➕ Register

</button>

</div>

</div>

<div class="search-box">

<input

id="search"

type="text"

placeholder="Search Username / Role"

onkeyup="searchUsers()">

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>ID</th>

<th>Username</th>

<th>Password</th>

<th>Role</th>

<th>Wallet</th>

<th>Action</th>

</tr>

</thead>

<tbody id="usersTable">

<tr>

<td colspan="6">

Loading...

</td>

</tr>

</tbody>

</table>

  </div>
  <!-- ===========================
     REGISTER MODAL
=========================== -->

<div
class="modal"
id="registerModal">

<div class="modal-content">

<h3>

➕ Register User

</h3>

<input
id="username"
type="text"
placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<select id="role">

<option value="user">

User

</option>

<option value="admin">

Admin

</option>

</select>

<input
id="wallet"
type="number"
value="0"
placeholder="Wallet Balance">

<div class="modal-buttons">

<button
class="save"
onclick="registerUser()">

✅ Register

</button>

<button
class="cancel"
onclick="closeRegister()">

❌ Cancel

</button>

</div>

</div>

</div>

<!-- ===========================
     BALANCE MODAL
=========================== -->

<div
class="modal"
id="balanceModal">

<div class="modal-content">

<h3>

💰 Set Wallet Balance

</h3>

<p>

Current Balance :

<b id="currentBalance">

₹0.00

</b>

</p>

<input
id="newBalance"
type="number"
placeholder="Enter Balance">

<div class="modal-buttons">

<button
class="save"
onclick="saveBalance()">

💾 Save

</button>

<button
class="cancel"
onclick="closeBalanceModal()">

❌ Cancel

</button>

</div>

</div>

</div>

<!-- ===========================
     PASSWORD MODAL
=========================== -->

<div
class="modal"
id="passwordModal">

<div class="modal-content">

<h3>

🔑 Change Password

</h3>

<p>

User ID :

<b id="passwordUserId">

0

</b>

</p>

<input
id="newPassword"
type="text"
placeholder="Enter New Password">

<div class="modal-buttons">

<button
class="save"
onclick="changePassword()">

💾 Save

</button>

<button
class="cancel"
onclick="closePasswordModal()">

❌ Cancel

</button>

</div>

</div>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(localStorage.getItem("user"));

let allUsers = [];

let selectedUserId = null;

let passwordUserId = null;

/* ===========================
   LOGIN CHECK
=========================== */

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER || USER.role!=="admin"){

location.href="login.html";

}
  /* ===========================
   LOAD SITE NAME
=========================== */

async function loadSiteName(){

try{

const response = await fetch(
API + "/api/settings"
);

const data = await response.json();

if(data.success){

document.getElementById("siteName").innerHTML =
data.settings.site_name;

}

}catch(err){

console.log(err);

}

}

/* ===========================
   LOAD USERS
=========================== */

async function loadUsers(){

try{

const response = await fetch(
API + "/api/users"
);

const data = await response.json();

const table =
document.getElementById("usersTable");

table.innerHTML = "";

if(!data.success){

table.innerHTML =
"<tr><td colspan='6'>No Users Found</td></tr>";

return;

}

allUsers = data.users;

renderUsers(allUsers);

}catch(err){

document.getElementById("usersTable").innerHTML =

"<tr><td colspan='6'>"+err.message+"</td></tr>";

}

}

/* ===========================
   RENDER USERS
=========================== */

function renderUsers(list){

const table =
document.getElementById("usersTable");

table.innerHTML = "";

if(list.length===0){

table.innerHTML =
"<tr><td colspan='6'>No Users Found</td></tr>";

return;

}

list.forEach(user=>{

table.innerHTML += `

<tr>

<td>${user.id}</td>

<td>${user.username}</td>

<td>

${user.show_password || "-"}

</td>

<td>

<span class="${
user.role==="admin"
? "role-admin"
: "role-user"
}">

${user.role}

</span>

</td>

<td class="wallet">

₹${Number(user.wallet).toFixed(2)}

</td>

<td>

<button
class="btn balance"
onclick="openBalanceModal(${user.id},${user.wallet})">

💰 Balance

</button>

<button
class="btn password"
onclick="openPasswordModal(${user.id})">

🔑 Password

</button>

<button
class="btn delete"
onclick="deleteUser(${user.id})">

🗑 Delete

</button>

</td>

</tr>

`;

});

}

/* ===========================
   SEARCH USERS
=========================== */

function searchUsers(){

const keyword =
document.getElementById("search")
.value
.toLowerCase();

const filtered = allUsers.filter(user=>

user.username
.toLowerCase()
.includes(keyword)

||

user.role
.toLowerCase()
.includes(keyword)

||

String(user.id)
.includes(keyword)

);

renderUsers(filtered);

  }
  /* ===========================
   OPEN REGISTER
=========================== */

function openRegister(){

document.getElementById("registerModal").style.display="flex";

}

/* ===========================
   CLOSE REGISTER
=========================== */

function closeRegister(){

document.getElementById("registerModal").style.display="none";

document.getElementById("username").value="";
document.getElementById("password").value="";
document.getElementById("wallet").value="0";
document.getElementById("role").value="user";

}

/* ===========================
   REGISTER USER
=========================== */

async function registerUser(){

const username=
document.getElementById("username").value.trim();

const password=
document.getElementById("password").value;

const role=
document.getElementById("role").value;

const wallet=
Number(document.getElementById("wallet").value);

if(!username || !password){

alert("Enter Username & Password");

return;

}

try{

const response=await fetch(

API+"/api/register",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username,
password,
role

})

}

);

const data=await response.json();

if(!data.success){

alert(data.message);

return;

}

if(wallet>0){

await fetch(

API+"/api/wallet/add",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id:data.user.id,
amount:wallet

})

}

);

}

alert("User Registered Successfully");

closeRegister();

loadUsers();

}catch(err){

alert(err.message);

}

}

/* ===========================
   BALANCE MODAL
=========================== */

function openBalanceModal(id,balance){

selectedUserId=id;

document.getElementById("balanceModal").style.display="flex";

document.getElementById("currentBalance").innerHTML=

"₹"+Number(balance).toFixed(2);

document.getElementById("newBalance").value=balance;

}

function closeBalanceModal(){

document.getElementById("balanceModal").style.display="none";

selectedUserId=null;

}

async function saveBalance(){

const balance=

Number(document.getElementById("newBalance").value);

const response=await fetch(

API+"/api/users/set-balance",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id:selectedUserId,

balance

})

}

);

const data=await response.json();

alert(data.message);

closeBalanceModal();

loadUsers();

}

/* ===========================
   PASSWORD MODAL
=========================== */

function openPasswordModal(id){

passwordUserId=id;

document.getElementById("passwordModal").style.display="flex";

document.getElementById("passwordUserId").innerHTML=id;

document.getElementById("newPassword").value="";

}

function closePasswordModal(){

document.getElementById("passwordModal").style.display="none";

passwordUserId=null;

}

async function changePassword(){

const password=

document.getElementById("newPassword").value.trim();

if(password===""){

alert("Enter Password");

return;

}

const response=await fetch(

API+"/api/users/change-password",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id:passwordUserId,

password

})

}

);

const data=await response.json();

alert(data.message);

closePasswordModal();

loadUsers();

  }
