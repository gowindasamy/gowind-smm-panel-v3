<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Users Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
}

.container{
width:100%;
max-width:1400px;
margin:auto;
padding:15px;
}

.header{
background:#1e293b;
padding:20px;
border-radius:12px;
text-align:center;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.header h2{
font-size:30px;
}

.search{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
margin-bottom:15px;
outline:none;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.actions button{
flex:1;
min-width:150px;
padding:13px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
color:#fff;
font-weight:bold;
}

.refresh{
background:#7c3aed;
}

.register{
background:#22c55e;
}

.table-container{
width:100%;
overflow-x:auto;
-webkit-overflow-scrolling:touch;
border-radius:10px;
}

table{
width:100%;
min-width:950px;
border-collapse:collapse;
background:#1e293b;
}

th{
background:#334155;
padding:14px;
text-align:center;
}

td{
padding:14px;
text-align:center;
border-bottom:1px solid #334155;
white-space:nowrap;
}

.admin{
background:#2563eb;
padding:6px 12px;
border-radius:6px;
}

.user{
background:#16a34a;
padding:6px 12px;
border-radius:6px;
}

.wallet{
font-weight:bold;
color:#22c55e;
}

.balance{
background:#f59e0b;
color:#fff;
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:5px;
font-weight:bold;
}

.delete{
background:#dc2626;
color:#fff;
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:#1e293b;
padding:20px;
border-radius:10px;
width:95%;
max-width:420px;
}

.modal-content h3{
text-align:center;
margin-bottom:15px;
}

.modal-content input,
.modal-content select{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
outline:none;
}

.modal-buttons{
display:flex;
gap:10px;
}

.modal-buttons button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
color:#fff;
font-weight:bold;
}

.save{
background:#22c55e;
}

.cancel{
background:#ef4444;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2 id="siteName">Loading...</h2>

</div>

<input

class="search"

id="search"

type="text"

placeholder="Search User..."

onkeyup="searchUsers()">

<div class="actions">

<button
class="refresh"
onclick="loadUsers()">

🔄 Refresh

</button>

<button
class="register"
onclick="openRegister()">

➕ Register User

</button>

</div>

<div class="table-container">

<table>

<thead>

<tr>

<th>ID</th>
<th>Username</th>
<th>Password</th>
<th>Role</th>
<th>Wallet</th>
<th>Action</th>

</tr>

</thead>

<tbody id="usersTable">

<tr>

<td colspan="6">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<!-- Register Modal -->

<div
class="modal"
id="registerModal">

<div class="modal-content">

<h3>

Register User

</h3>

<input
id="username"
placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<select id="role">

<option value="user">User</option>

<option value="admin">Admin</option>

</select>

<input
id="wallet"
type="number"
value="0"
placeholder="Wallet Balance">

<div class="modal-buttons">

<button
class="save"
onclick="registerUser()">

Register

</button>

<button
class="cancel"
onclick="closeRegister()">

Cancel

</button>

</div>

</div>

</div>

<!-- Balance Modal -->

<div
class="modal"
id="balanceModal">

<div class="modal-content">

<h3>

✏️ Set Wallet Balance

</h3>

<p>

Current Balance :

<b id="currentBalance">

₹0.00

</b>

</p>

<input
id="newBalance"
type="number"
placeholder="New Balance">

<div class="modal-buttons">

<button
class="save"
onclick="saveBalance()">

Save

</button>

<button
class="cancel"
onclick="closeBalanceModal()">

Cancel

</button>

</div>

</div>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(localStorage.getItem("user"));

let allUsers=[];

let selectedUserId=null;
  /* ===========================
   LOGIN CHECK
=========================== */

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER || USER.role!=="admin"){

location.href="login.html";

}

/* ===========================
   LOAD USERS
=========================== */

async function loadUsers(){

try{

const response=await fetch(
API+"/api/users"
);

const data=await response.json();

const table=
document.getElementById("usersTable");

table.innerHTML="";

if(!data.success){

table.innerHTML=

"<tr><td colspan='5'>No Users Found</td></tr>";

return;

}

allUsers=data.users;

renderUsers(allUsers);

}catch(err){

document.getElementById("usersTable").innerHTML=

"<tr><td colspan='5'>"+err.message+"</td></tr>";

}

}

/* ===========================
   RENDER USERS
=========================== */

function renderUsers(list){

const table=
document.getElementById("usersTable");

table.innerHTML="";

if(list.length===0){

table.innerHTML=

"<tr><td colspan='5'>No Users Found</td></tr>";

return;

}

list.forEach(user=>{

table.innerHTML+=`

<tr>

<td>${user.id}</td>

<td>${user.username}</td>

<td>

${user.show_password || "-"}

</td>

<td>

<span class="${
user.role==="admin"
? "admin"
: "user"
}">

${user.role}

</span>

</td>

<td class="wallet">

₹${Number(user.wallet).toFixed(2)}

</td>

<td>

<button
class="balance"
onclick="openBalanceModal(${user.id},${user.wallet})">

✏️ Balance

</button>

<button
class="delete"
onclick="deleteUser(${user.id})">

🗑 Delete

</button>

</td>

</tr>

`;

});

}

/* ===========================
   SEARCH USERS
=========================== */

function searchUsers(){

const keyword=

document.getElementById("search")
.value
.toLowerCase();

const filtered=

allUsers.filter(user=>

user.username
.toLowerCase()
.includes(keyword)

||

user.role
.toLowerCase()
.includes(keyword)

||

String(user.id)
.includes(keyword)

);

renderUsers(filtered);

   }
  /* ===========================
   OPEN REGISTER
=========================== */

function openRegister(){

document.getElementById("registerModal").style.display="flex";

}

/* ===========================
   CLOSE REGISTER
=========================== */

function closeRegister(){

document.getElementById("registerModal").style.display="none";

document.getElementById("username").value="";
document.getElementById("password").value="";
document.getElementById("wallet").value="0";
document.getElementById("role").value="user";

}

/* ===========================
   REGISTER USER
=========================== */

async function registerUser(){

const username=
document.getElementById("username").value.trim();

const password=
document.getElementById("password").value;

const role=
document.getElementById("role").value;

const wallet=
Number(document.getElementById("wallet").value);

if(!username || !password){

alert("Enter Username & Password");

return;

}

try{

const response=await fetch(

API+"/api/register",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username,
password,
role

})

}

);

const data=await response.json();

if(!data.success){

alert(data.message);

return;

}

if(wallet>0){

await fetch(

API+"/api/wallet/add",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id:data.user.id,
amount:wallet

})

}

);

}

alert("User Created Successfully");

closeRegister();

loadUsers();

}catch(err){

alert(err.message);

}

}

/* ===========================
   OPEN BALANCE MODAL
=========================== */

function openBalanceModal(id,balance){

selectedUserId=id;

document.getElementById("balanceModal").style.display="flex";

document.getElementById("currentBalance").innerHTML=

"₹"+Number(balance).toFixed(2);

document.getElementById("newBalance").value=balance;

}

/* ===========================
   CLOSE BALANCE MODAL
=========================== */

function closeBalanceModal(){

document.getElementById("balanceModal").style.display="none";

document.getElementById("newBalance").value="";

selectedUserId=null;

}

async function loadSiteName(){

const response=await fetch(
API+"/api/settings"
);

const data=await response.json();

if(data.success){

document.getElementById("siteName").innerHTML=
data.settings.site_name;

}

  }
/* ===========================
   SAVE BALANCE
=========================== */

async function saveBalance(){

const balance=

Number(document.getElementById("newBalance").value);

if(selectedUserId===null){

return;

}

try{

const response=await fetch(

API+"/api/users/set-balance",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id:selectedUserId,

balance:balance

})

}

);

const data=await response.json();

alert(data.message);

closeBalanceModal();

loadUsers();

}catch(err){

alert(err.message);

}

  }
 /* ===========================
   DELETE USER
=========================== */

async function deleteUser(id){

const ok=confirm(
"Delete this user?"
);

if(!ok){

return;

}

try{

const response=await fetch(

API+"/api/users/"+id,

{
method:"DELETE"
}

);

const data=await response.json();

alert(data.message || data.error);

loadUsers();

}catch(err){

alert(err.message);

}

}

/* ===========================
   CLOSE MODALS
=========================== */

window.onclick=function(e){

if(e.target===document.getElementById("registerModal")){

closeRegister();

}

if(e.target===document.getElementById("balanceModal")){

closeBalanceModal();

}

};

/* ===========================
   WINDOW LOAD
=========================== */

window.onload=function(){
loadSiteName();
loadUsers();

};

/* ===========================
   AUTO REFRESH
=========================== */

setInterval(loadUsers,30000);

/* ===========================
   BUTTON ANIMATION
=========================== */

document.addEventListener("mouseover",function(e){

if(e.target.tagName==="BUTTON"){

e.target.style.transform="scale(1.04)";
e.target.style.transition=".2s";

}

});

document.addEventListener("mouseout",function(e){

if(e.target.tagName==="BUTTON"){

e.target.style.transform="scale(1)";

}

});

/* ===========================
   SHORTCUT KEYS
=========================== */

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

closeRegister();

closeBalanceModal();

}

if(e.ctrlKey && e.key==="r"){

e.preventDefault();

loadUsers();

}

if(e.ctrlKey && e.key==="n"){

e.preventDefault();

openRegister();

}

});

/* ===========================
   PAGE READY
=========================== */

console.log("Users Management Ready");

</script>

</body>

</html>
