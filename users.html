<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Users Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial,sans-serif;

}

body{

background:#08111f;

background-image:
radial-gradient(circle at top left,
rgba(147,51,234,.18),
transparent 35%),

radial-gradient(circle at top right,
rgba(6,182,212,.15),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(37,99,235,.18),
transparent 40%);

color:#fff;

min-height:100vh;

}

.container{

width:95%;

max-width:1500px;

margin:18px auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

padding:16px 18px;

margin-bottom:18px;

border-radius:18px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 10px 30px rgba(0,0,0,.25),
0 0 20px rgba(37,99,235,.18);

}

.title h2{

font-size:26px;

font-weight:700;

background:linear-gradient(
90deg,
#3b82f6,
#06b6d4);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.status{

display:flex;

align-items:center;

gap:6px;

margin-top:6px;

font-size:12px;

font-weight:600;

color:#22c55e;

}

.status-dot{

width:8px;

height:8px;

border-radius:50%;

background:#22c55e;

box-shadow:0 0 10px #22c55e;

}

.actions{

display:flex;

gap:10px;

}

.action-btn{

width:44px;

height:44px;

border:none;

border-radius:50%;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:17px;

cursor:pointer;

transition:.3s;

}

.action-btn:hover{

background:#2563eb;

transform:scale(1.08);

box-shadow:0 0 18px rgba(37,99,235,.35);

}

.search{

width:100%;

padding:15px;

margin-bottom:18px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

border-radius:14px;

outline:none;

font-size:16px;

color:#fff;

transition:.3s;

}

.search::placeholder{

color:#94a3b8;

}

.search:focus{

border-color:#3b82f6;

box-shadow:0 0 18px rgba(59,130,246,.35);

}
  .register-btn{

width:100%;

padding:15px;

margin-bottom:18px;

border:none;

border-radius:14px;

cursor:pointer;

font-size:16px;

font-weight:600;

color:#fff;

background:linear-gradient(
90deg,
#2563eb,
#8b5cf6,
#06b6d4);

transition:.3s;

box-shadow:0 10px 25px rgba(0,0,0,.25);

}

.register-btn:hover{

transform:translateY(-2px);

box-shadow:0 0 20px rgba(59,130,246,.35);

}
  .table-box{

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

overflow:auto;

box-shadow:0 10px 30px rgba(0,0,0,.25);

}

table{

width:100%;

min-width:950px;

border-collapse:collapse;

}

th{

padding:16px;

background:rgba(59,130,246,.18);

font-size:15px;

font-weight:600;

text-align:center;

}

td{

padding:15px;

text-align:center;

border-top:1px solid rgba(255,255,255,.08);

}

.role-admin{

background:#2563eb;

padding:6px 12px;

border-radius:8px;

font-weight:bold;

}

.role-user{

background:#22c55e;

padding:6px 12px;

border-radius:8px;

font-weight:bold;

}

.wallet{

color:#22c55e;

font-weight:bold;

}

.btn{

padding:8px 12px;

border:none;

border-radius:8px;

cursor:pointer;

color:#fff;

font-weight:600;

margin:2px;

transition:.3s;

}

.balance{

background:#f59e0b;

}

.password{

background:#3b82f6;

}

.delete{

background:#ef4444;

}

.btn:hover{

transform:translateY(-2px);

}

.modal{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:rgba(8,17,31,.70);

backdrop-filter:blur(8px);

-webkit-backdrop-filter:blur(8px);

justify-content:center;

align-items:center;

z-index:999;

}

.modal-content{

width:92%;

max-width:430px;

padding:24px;

background:#162235;

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

box-shadow:0 10px 30px rgba(0,0,0,.35);

}

.modal-content h3{

text-align:center;

font-size:34px;

margin-bottom:20px;

color:#fff;

}

.modal-content p{

margin-bottom:15px;

font-size:18px;

color:#fff;

}

.modal-content input,
.modal-content select{

width:100%;

padding:15px;

margin-bottom:15px;

background:#1f2d44;

border:1px solid rgba(255,255,255,.08);

border-radius:12px;

color:#fff;

font-size:16px;

outline:none;

}

.modal-buttons{

display:flex;

gap:12px;

margin-top:10px;

}

.modal-buttons button{

flex:1;

padding:14px;

border:none;

border-radius:12px;

font-size:16px;

font-weight:700;

cursor:pointer;

color:#fff;

}

.save{

background:#00c853;

}

.cancel{

background:#ff1744;

}

@media(max-width:768px){

table{

min-width:900px;

}

}
.modal-buttons .save{

background:#00c853 !important;

color:#fff !important;

}

.modal-buttons .cancel{

background:#ff1744 !important;

color:#fff !important;

}

.modal-buttons .save:hover{

background:#00b248 !important;

}

.modal-buttons .cancel:hover{

background:#d50000 !important;

  }
</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">

<h2 id="siteName">

Loading...

</h2>

<div class="status">

<div class="status-dot"></div>

<span>ACTIVE</span>

</div>

</div>

<div class="actions">

<button
class="action-btn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<button
class="action-btn"
onclick="loadUsers()">

<i class="fa-solid fa-rotate-right"></i>

</button>

<button
class="action-btn"
onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

</div>

</div>

<input

class="search"

id="search"

type="text"

placeholder="Search Username / Role"

onkeyup="searchUsers()">
<button
class="register-btn"
onclick="openRegister()">

<i class="fa-solid fa-user-plus"></i>

Register User / Admin

</button>
<div class="table-box">
   <table>

<thead>

<tr>

<th>ID</th>

<th>Username</th>

<th>Password</th>

<th>Role</th>

<th>Wallet</th>

<th>Action</th>

</tr>

</thead>

<tbody id="usersTable">

<tr>

<td colspan="6">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<!-- Register Modal -->

<div class="modal" id="registerModal">

<div class="modal-content">

<h3>Register User</h3>

<input
id="username"
type="text"
placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<select id="role">

<option value="user">

User

</option>

<option value="admin">

Admin

</option>

</select>

<input
id="wallet"
type="number"
value="0"
placeholder="Wallet Balance">

<div class="modal-buttons">

<button
class="save"
onclick="registerUser()">

Register

</button>

<button
class="cancel"
onclick="closeRegister()">

Cancel

</button>

</div>

</div>

</div>

<!-- Balance Modal -->

<div class="modal" id="balanceModal">

<div class="modal-content">

<h3>Set Wallet Balance</h3>

<p>

Current Balance :

<b id="currentBalance">

₹0.00

</b>

</p>

<input
id="newBalance"
type="number"
placeholder="Wallet Balance">

<div class="modal-buttons">

<button
class="save"
onclick="saveBalance()">

Save

</button>

<button
class="cancel"
onclick="closeBalanceModal()">

Cancel

</button>

</div>

</div>

</div>

<!-- Password Modal -->

<div class="modal" id="passwordModal">

<div class="modal-content">

<h3>Change Password</h3>

<p>

User ID :

<b id="passwordUserId">

0

</b>

</p>

<input
id="newPassword"
type="text"
placeholder="New Password">

<div class="modal-buttons">

<button
class="save"
onclick="changePassword()">

Save

</button>

<button
class="cancel"
onclick="closePasswordModal()">

Cancel

</button>

</div>

</div>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(localStorage.getItem("user"));

let allUsers=[];

let selectedUserId=null;

let passwordUserId=null;

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER || USER.role!=="admin"){

location.href="login.html";

}

async function loadSettings(){

try{

const response=
await fetch(API+"/api/settings");

const data=
await response.json();

if(data.success){

document.getElementById("siteName").textContent=
data.settings.site_name;

}

}catch(err){

console.log(err);

}

}
   async function loadUsers(){

try{

const response=await fetch(API+"/api/users");

const data=await response.json();

allUsers=data.users||[];

renderUsers(allUsers);

}catch(err){

document.getElementById("usersTable").innerHTML=
"<tr><td colspan='6'>Failed to load users</td></tr>";

}

}

function renderUsers(list){

const table=document.getElementById("usersTable");

table.innerHTML="";

if(list.length===0){

table.innerHTML=
"<tr><td colspan='6'>No Users Found</td></tr>";

return;

}

list.forEach(user=>{

table.innerHTML+=`

<tr>

<td>${user.id}</td>

<td>${user.username}</td>

<td>${user.show_password||"-"}</td>

<td>

<span class="${user.role==="admin"?"role-admin":"role-user"}">

${user.role}

</span>

</td>

<td class="wallet">

₹${Number(user.wallet).toFixed(2)}

</td>

<td>

<button class="btn balance"
onclick="openBalanceModal(${user.id},${user.wallet})">

Balance

</button>

<button class="btn password"
onclick="openPasswordModal(${user.id})">

Password

</button>

<button class="btn delete"
onclick="deleteUser(${user.id})">

Delete

</button>

</td>

</tr>

`;

});

}

function searchUsers(){

const keyword=document.getElementById("search").value.toLowerCase();

renderUsers(

allUsers.filter(user=>

String(user.id).includes(keyword)

||

user.username.toLowerCase().includes(keyword)

||

user.role.toLowerCase().includes(keyword)

)

);

}

function openRegister(){

document.getElementById("registerModal").style.display="flex";

}

function closeRegister(){

document.getElementById("registerModal").style.display="none";

username.value="";

password.value="";

wallet.value="0";

role.value="user";

}

async function registerUser(){

const body={

username:username.value.trim(),

password:password.value,

role:role.value

};

if(!body.username||!body.password){

alert("Enter Username & Password");

return;

}

const response=await fetch(API+"/api/register",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(body)

});

const data=await response.json();

if(!data.success){

alert(data.message);

return;

}

if(Number(wallet.value)>0){

await fetch(API+"/api/wallet/add",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

user_id:data.user.id,

amount:Number(wallet.value)

})

});

}

alert("User Registered Successfully");

closeRegister();

loadUsers();

}

function openBalanceModal(id,balance){

selectedUserId=id;

balanceModal.style.display="flex";

currentBalance.innerHTML="₹"+Number(balance).toFixed(2);

newBalance.value=balance;

}

function closeBalanceModal(){

balanceModal.style.display="none";

}

async function saveBalance(){

const response=await fetch(API+"/api/users/set-balance",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

user_id:selectedUserId,

balance:Number(newBalance.value)

})

});

const data=await response.json();

alert(data.message);

closeBalanceModal();

loadUsers();

}

function openPasswordModal(id){

passwordUserId=id;

passwordModal.style.display="flex";

document.getElementById("passwordUserId").textContent=id;

newPassword.value="";

}

function closePasswordModal(){

passwordModal.style.display="none";

}

async function changePassword(){

if(newPassword.value.trim()===""){

alert("Enter Password");

return;

}

const response=await fetch(API+"/api/users/change-password",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

user_id:passwordUserId,

password:newPassword.value

})

});

const data=await response.json();

alert(data.message);

closePasswordModal();

loadUsers();

}

async function deleteUser(id){

if(!confirm("Delete this user?")) return;

const response=await fetch(API+"/api/users/"+id,{

method:"DELETE"

});

const data=await response.json();

alert(data.message);

loadUsers();

}

function logout(){

localStorage.removeItem("token");

localStorage.removeItem("user");

location.href="login.html";

}

window.onclick=function(e){

if(e.target===registerModal) closeRegister();

if(e.target===balanceModal) closeBalanceModal();

if(e.target===passwordModal) closePasswordModal();

};

window.onload=function(){

loadSettings();

loadUsers();

};

setInterval(loadUsers,30000);

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

closeRegister();

closeBalanceModal();

closePasswordModal();

}

if(e.ctrlKey&&e.key==="r"){

e.preventDefault();

loadUsers();

}

});

</script>

</body>

</html>
