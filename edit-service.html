<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Edit Service</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#08111f;

background-image:

radial-gradient(circle at top left,
rgba(147,51,234,.18),
transparent 35%),

radial-gradient(circle at top right,
rgba(6,182,212,.15),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(37,99,235,.18),
transparent 40%);

color:#fff;

min-height:100vh;

}

.container{

width:95%;
max-width:700px;
margin:20px auto;

}

.header{

display:flex;
justify-content:space-between;
align-items:center;

padding:16px 18px;

margin-bottom:20px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

box-shadow:
0 10px 30px rgba(0,0,0,.25),
0 0 20px rgba(37,99,235,.18);

}

.title h2{

font-size:28px;

font-weight:700;

background:linear-gradient(
90deg,
#3b82f6,
#06b6d4);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.status{

display:flex;
align-items:center;
gap:6px;

margin-top:6px;

font-size:12px;
font-weight:600;

color:#22c55e;

}

.status-dot{

width:8px;
height:8px;

border-radius:50%;

background:#22c55e;

box-shadow:0 0 10px #22c55e;

}

.actions{

display:flex;
gap:10px;

}

.action-btn{

width:44px;
height:44px;

border:none;

border-radius:50%;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:17px;

cursor:pointer;

transition:.3s;

}

.action-btn:hover{

background:#2563eb;

transform:scale(1.08);

box-shadow:0 0 18px rgba(37,99,235,.35);

}

.form-card{

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:24px;

box-shadow:
0 10px 30px rgba(0,0,0,.25);

}

label{

display:block;

margin-top:16px;
margin-bottom:8px;

font-size:14px;
font-weight:600;

color:#cbd5e1;

}

input,
select{

width:100%;

padding:14px;

border:none;
outline:none;

border-radius:12px;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:15px;

transition:.3s;

}

input:focus,
select:focus{

border-color:#3b82f6;

box-shadow:0 0 15px rgba(59,130,246,.35);

}

input::placeholder{

color:#94a3b8;

}
  .save{

width:100%;

padding:14px;

margin-top:24px;

border:none;

border-radius:12px;

cursor:pointer;

font-size:16px;

font-weight:600;

color:#fff;

background:linear-gradient(
90deg,
#2563eb,
#8b5cf6,
#06b6d4);

transition:.3s;

}

.save:hover{

transform:translateY(-2px);

box-shadow:0 0 20px rgba(59,130,246,.35);

}

.delete{

width:100%;

padding:14px;

margin-top:12px;

border:none;

border-radius:12px;

cursor:pointer;

font-size:16px;

font-weight:600;

color:#fff;

background:#ef4444;

transition:.3s;

}

.delete:hover{

background:#dc2626;

transform:translateY(-2px);

}

#result{

margin-top:18px;

text-align:center;

font-weight:bold;

color:#22c55e;

}

@media(max-width:768px){

.header{

flex-direction:column;

gap:15px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">

<h2>Edit Service</h2>

<div class="status">

<div class="status-dot"></div>

<span>ADMIN PANEL</span>

</div>

</div>

<div class="actions">

<button class="action-btn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<button class="action-btn"
onclick="loadService()">

<i class="fa-solid fa-rotate-right"></i>

</button>

<button class="action-btn"
onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

</div>

</div>

<div class="form-card">

<label>Provider</label>

<select id="provider_id">
</select>

<label>Provider Service ID</label>

<input
type="number"
id="provider_service_id"
placeholder="Provider Service ID">

<label>Service Name</label>

<input
type="text"
id="name"
placeholder="Service Name">

<label>Category</label>

<input
type="text"
id="category"
placeholder="Category">

<label>Panel Rate</label>

<input
type="number"
step="0.01"
id="rate"
placeholder="Panel Rate">

<label>Minimum</label>

<input
type="number"
id="min"
placeholder="Minimum Order">

<label>Maximum</label>

<input
type="number"
id="max"
placeholder="Maximum Order">

<label>Status</label>

<select id="status">

<option value="true">
Enabled
</option>

<option value="false">
Disabled
</option>

</select>

<button
class="save"
onclick="updateService()">

💾 Save Changes

</button>

<button
class="delete"
onclick="deleteService()">

🗑 Delete Service

</button>

<div id="result"></div>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const serviceId =
new URLSearchParams(location.search).get("id");
  /* ===========================
   LOGIN CHECK
=========================== */

const USER =
JSON.parse(localStorage.getItem("user"));

if(!localStorage.getItem("token") ||
!USER ||
USER.role!=="admin"){

location.href="login.html";

}

/* ===========================
   LOAD PROVIDERS
=========================== */

async function loadProviders(){

try{

const response =
await fetch(API+"/api/providers");

const data =
await response.json();

const select =
document.getElementById("provider_id");

select.innerHTML="";

data.providers.forEach(provider=>{

select.innerHTML+=`

<option value="${provider.id}">

${provider.name}

</option>

`;

});

}catch(err){

console.log(err);

}

}

/* ===========================
   LOAD SERVICE
=========================== */

async function loadService(){

try{

const response =
await fetch(API+"/api/services/"+serviceId);

const data =
await response.json();

if(!data.success){

document.getElementById("result").textContent =
"Service not found";

return;

}

const service =
data.service;

document.getElementById("provider_id").value =
service.provider_id;

document.getElementById("provider_service_id").value =
service.provider_service_id;

document.getElementById("name").value =
service.name;

document.getElementById("category").value =
service.category;

document.getElementById("rate").value =
service.rate;

document.getElementById("min").value =
service.min;

document.getElementById("max").value =
service.max;

document.getElementById("status").value =
String(service.status);

}catch(err){

document.getElementById("result").textContent =
err.message;

}

  }
  /* ===========================
   UPDATE SERVICE
=========================== */

async function updateService(){

try{

const response = await fetch(

API + "/api/services/" + serviceId,

{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

provider_id:Number(
document.getElementById("provider_id").value
),

provider_service_id:Number(
document.getElementById("provider_service_id").value
),

name:document.getElementById("name").value,

category:document.getElementById("category").value,

rate:Number(
document.getElementById("rate").value
),

min:Number(
document.getElementById("min").value
),

max:Number(
document.getElementById("max").value
),

status:
document.getElementById("status").value==="true"

})

}

);

const data = await response.json();

document.getElementById("result").textContent =
data.message || data.error;

if(data.success){

setTimeout(()=>{

location.href="services.html";

},1000);

}

}catch(err){

document.getElementById("result").textContent =
err.message;

}

}

/* ===========================
   DELETE SERVICE
=========================== */

async function deleteService(){

if(!confirm("Delete this service?"))
return;

try{

const response = await fetch(

API + "/api/services/" + serviceId,

{

method:"DELETE"

}

);

const data = await response.json();

if(data.success){

location.href="services.html";

}else{

document.getElementById("result").textContent =
data.error || data.message;

}

}catch(err){

document.getElementById("result").textContent =
err.message;

}

}

/* ===========================
   LOGOUT
=========================== */

function logout(){

localStorage.removeItem("token");
localStorage.removeItem("user");

location.href="login.html";

}

/* ===========================
   PAGE LOAD
=========================== */

window.onload = async function(){

await loadProviders();

await loadService();

};

</script>

</body>

</html>
