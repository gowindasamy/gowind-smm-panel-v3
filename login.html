<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.container{

width:400px;
max-width:95%;
background:#1e293b;
padding:30px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,.4);

}

h2{

text-align:center;
color:white;
margin-bottom:25px;

}

label{

display:block;
color:white;
margin-bottom:8px;
font-weight:bold;

}

input{

width:100%;
padding:13px;
margin-bottom:18px;
border:none;
border-radius:8px;
font-size:16px;
outline:none;

}

button{

width:100%;
padding:14px;
background:#22c55e;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;

}

button:hover{

background:#16a34a;

}

#result{

margin-top:15px;
text-align:center;
font-weight:bold;
color:#ef4444;

}

.version{

text-align:center;
margin-top:20px;
color:#94a3b8;
font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<h2>

Login

</h2>

<label>

Username

</label>

<input
type="text"
id="username"
placeholder="Enter Username">

<label>

Password

</label>

<input
type="password"
id="password"
placeholder="Enter Password">

<button
onclick="login()">

Login

</button>

<div id="result"></div>

<div class="version">

Gowind SMM Panel v3.1

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";
   /* ===========================
   LOGIN
=========================== */

async function login(){

try{

const username=
document.getElementById("username").value.trim();

const password=
document.getElementById("password").value;

if(username==="" || password===""){

document.getElementById("result").innerHTML=
"Please enter username and password";

return;

}

const response=await fetch(

API+"/api/login",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:username,

password:password

})

}

);

const data=await response.json();

if(
data.message &&
data.message.includes("maintenance")
){

document.body.innerHTML=`

<div style="height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
font-family:Arial,sans-serif;">

<div style="width:420px;
max-width:95%;
background:#1e293b;
padding:35px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.35);
color:white;">

<div style="font-size:70px;">
🚧
</div>

<h1 style="margin:15px 0;">
Panel Under Maintenance
</h1>

<p style="color:#94a3b8;
line-height:1.8;
margin-bottom:25px;">

We are performing scheduled maintenance.<br>
Please try again later.

</p>

<button
onclick="location.reload()"
style="width:100%;
padding:14px;
background:#2563eb;
border:none;
border-radius:10px;
color:white;
font-size:17px;
cursor:pointer;">

🔄 Refresh

</button>

</div>

</div>

`;

return;

}

document.getElementById("result").innerHTML=
data.message || data.error || "Login Failed";

/* SAVE LOGIN */

localStorage.setItem(

"token",

data.token

);

localStorage.setItem(

"user",

JSON.stringify(data.user)

);

/* REDIRECT */

if(data.user.role==="admin"){

location.href="admindashboard.html";

}else{

location.href="userdashboard.html";

}

}catch(err){

document.getElementById("result").innerHTML=
err.message;

}

   }
   /* ===========================
   ALREADY LOGGED IN
=========================== */

const savedUser =
JSON.parse(localStorage.getItem("user"));

if(localStorage.getItem("token") && savedUser){

if(savedUser.role==="admin"){

location.href="admindashboard.html";

}else{

location.href="userdashboard.html";

}

}

/* ===========================
   ENTER KEY LOGIN
=========================== */

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

login();

}

});

/* ===========================
   BUTTON ANIMATION
=========================== */

const btn=document.querySelector("button");

btn.addEventListener("mouseenter",function(){

btn.style.transform="scale(1.03)";
btn.style.transition=".2s";

});

btn.addEventListener("mouseleave",function(){

btn.style.transform="scale(1)";

});

/* ===========================
   PAGE READY
=========================== */

console.log("Login Page Ready");

</script>

</body>

</html>
