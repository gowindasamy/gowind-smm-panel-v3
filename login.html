<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

background:#08111f;

background-image:
radial-gradient(circle at top left,
rgba(147,51,234,.25),
transparent 35%),

radial-gradient(circle at top right,
rgba(6,182,212,.18),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(37,99,235,.20),
transparent 40%);

color:#fff;

}

.container{

width:100%;

max-width:430px;

padding:30px;

border-radius:24px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 10px 35px rgba(0,0,0,.35),
0 0 30px rgba(37,99,235,.15);

animation:fade .5s ease;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

h2{

text-align:center;

font-size:36px;

font-weight:700;

margin-bottom:10px;

background:linear-gradient(
90deg,
#3b82f6,
#8b5cf6,
#06b6d4);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.subtitle{

text-align:center;

font-size:15px;

color:#94a3b8;

margin-bottom:30px;

}

label{

display:block;

margin-bottom:8px;

font-size:15px;

font-weight:600;

color:#fff;

}

.input-box{

position:relative;

margin-bottom:22px;

}

.input-box .left-icon{

position:absolute;

left:16px;

top:50%;

transform:translateY(-50%);

color:#3b82f6;

font-size:18px;

}

.input-box input{

width:100%;

padding:15px 55px 15px 48px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

border-radius:14px;

outline:none;

color:#fff;

font-size:16px;

transition:.3s;

}

.input-box input::placeholder{

color:#94a3b8;

}

.input-box input:focus{

border-color:#3b82f6;

box-shadow:
0 0 18px rgba(59,130,246,.35);

}

.toggle-password{

position:absolute;

right:18px;

top:50%;

transform:translateY(-50%);

font-size:24px;

cursor:pointer;

user-select:none;

color:#cbd5e1;

transition:.3s;

}

.toggle-password:hover{

color:#ffffff;

}

button{

width:100%;

padding:15px;

margin-top:8px;

border:none;

border-radius:14px;

cursor:pointer;

font-size:18px;

font-weight:600;

color:#fff;

background:linear-gradient(
90deg,
#2563eb,
#8b5cf6,
#06b6d4);

transition:.3s;

}

button:hover{

transform:translateY(-2px);

box-shadow:
0 0 25px rgba(59,130,246,.35);

}

#result{

margin-top:15px;

text-align:center;

font-size:15px;

font-weight:600;

color:#ef4444;

}

.version{

margin-top:22px;

text-align:center;

font-size:14px;

color:#94a3b8;

}

</style>

</head>

<body>

<div class="container">

<h2>

Login

</h2>

<p
class="subtitle"
id="siteName">

Loading...

</p>
<label>

Username

</label>

<div class="input-box">

<i class="fa-solid fa-user left-icon"></i>

<input
type="text"
id="username"
placeholder="Enter Username">

</div>

<label>

Password

</label>

<div class="input-box">

<i class="fa-solid fa-lock left-icon"></i>

<input
type="password"
id="password"
placeholder="Enter Password">

<span
class="toggle-password"
onclick="togglePassword()">

𓁹

</span>

</div>

<button
onclick="login()">

<i class="fa-solid fa-right-to-bracket"></i>

&nbsp;

Login

</button>

<div id="result"></div>

<div class="version">

Gowind SMM Panel v3.1

</div>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

async function loadSettings(){

try{

const response =
await fetch(API+"/api/settings");

const data =
await response.json();

if(data.success){

document.getElementById("siteName").textContent =
data.settings.site_name;

}

}catch(error){

console.log(error);

}

}

function togglePassword(){

const password =
document.getElementById("password");

const eye =
document.querySelector(".toggle-password");

if(password.type==="password"){

password.type="text";

eye.textContent="𓁺";

}else{

password.type="password";

eye.textContent="𓁹";

}

}
   async function login(){

try{

const username=
document.getElementById("username").value.trim();

const password=
document.getElementById("password").value;

if(username==="" || password===""){

document.getElementById("result").textContent=
"Please enter username and password";

return;

}

const response=await fetch(

API+"/api/login",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

username,

password

})

}

);

const data=await response.json();

if(
data.message &&
data.message.toLowerCase().includes("maintenance")
){

document.getElementById("result").textContent=
"Panel is under maintenance";

return;

}

if(!data.success){

document.getElementById("result").textContent=
data.message || "Login Failed";

return;

}

localStorage.setItem(

"token",

data.token

);

localStorage.setItem(

"user",

JSON.stringify(data.user)

);

if(data.user.role==="admin"){

location.href="admindashboard.html";

}else{

location.href="userdashboard.html";

}

}catch(error){

document.getElementById("result").textContent=
error.message;

}

}

const savedUser=
JSON.parse(localStorage.getItem("user"));

if(localStorage.getItem("token") && savedUser){

if(savedUser.role==="admin"){

location.href="admindashboard.html";

}else{

location.href="userdashboard.html";

}

}

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

login();

}

});

window.onload=function(){

loadSettings();

};

</script>

</body>

</html>
