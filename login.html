<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Gowind SMM Panel - Official Login</title>

<meta name="description"
content="Official Login Portal for Gowind SMM Panel">

<meta name="robots"
content="noindex,nofollow">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

background:#08111f;

background-image:

radial-gradient(circle at top left,
rgba(147,51,234,.20),
transparent 35%),

radial-gradient(circle at top right,
rgba(6,182,212,.18),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(37,99,235,.20),
transparent 40%);

color:#fff;

overflow:hidden;

}

.container{

width:100%;

max-width:430px;

padding:32px;

border-radius:24px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

box-shadow:

0 12px 35px rgba(0,0,0,.35),

0 0 30px rgba(37,99,235,.18);

animation:fade .5s ease;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.logo{

width:78px;

height:78px;

margin:0 auto 18px;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

font-size:34px;

background:linear-gradient(
135deg,
#2563eb,
#8b5cf6,
#06b6d4);

box-shadow:

0 0 25px rgba(37,99,235,.35);

}

h2{

text-align:center;

font-size:30px;

font-weight:700;

background:linear-gradient(
90deg,
#3b82f6,
#8b5cf6,
#06b6d4);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

margin-bottom:10px;

}

.subtitle{

text-align:center;

font-size:14px;

color:#94a3b8;

margin-bottom:26px;

line-height:1.6;

}

label{

display:block;

margin-bottom:8px;

font-size:15px;

font-weight:600;

color:#fff;

}

.input-box{

position:relative;

margin-bottom:22px;

}

.left-icon{

position:absolute;

left:16px;

top:50%;

transform:translateY(-50%);

color:#3b82f6;

font-size:18px;

}

.input-box input{

width:100%;

padding:15px 55px 15px 48px;

border:none;

outline:none;

border-radius:14px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:16px;

transition:.3s;

}

.input-box input:focus{

border-color:#3b82f6;

box-shadow:

0 0 18px rgba(59,130,246,.35);

}

.input-box input::placeholder{

color:#94a3b8;

}
   .toggle-password{

position:absolute;

right:18px;

top:50%;

transform:translateY(-50%);

font-size:22px;

cursor:pointer;

user-select:none;

color:#cbd5e1;

transition:.3s;

}

.toggle-password:hover{

color:#ffffff;

}

.login-btn{

width:100%;

padding:15px;

margin-top:8px;

border:none;

border-radius:14px;

cursor:pointer;

font-size:17px;

font-weight:600;

color:#fff;

background:linear-gradient(
90deg,
#2563eb,
#8b5cf6,
#06b6d4);

transition:.3s;

}

.login-btn:hover{

transform:translateY(-2px);

box-shadow:
0 0 25px rgba(59,130,246,.35);

}

#result{

margin-top:16px;

text-align:center;

font-size:15px;

font-weight:600;

color:#ef4444;

}

.login-note{

margin-top:22px;

padding:14px;

border-radius:14px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

font-size:13px;

line-height:1.7;

text-align:center;

color:#cbd5e1;

}

.version{

margin-top:20px;

text-align:center;

font-size:13px;

color:#94a3b8;

line-height:1.8;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<i class="fa-solid fa-shield-halved"></i>

</div>

<h2>Gowind SMM Panel</h2>

<p class="subtitle">

Official Login Portal for
Administrators and Users

</p>

<label>Username</label>

<div class="input-box">

<i class="fa-solid fa-user left-icon"></i>

<input
type="text"
id="username"
placeholder="Enter Username">

</div>

<label>Password</label>

<div class="input-box">

<i class="fa-solid fa-lock left-icon"></i>

<input
type="password"
id="password"
placeholder="Enter Password">

<span
class="toggle-password"
onclick="togglePassword()">

👁

</span>

</div>

<button
class="login-btn"
onclick="login()">

<i class="fa-solid fa-right-to-bracket"></i>

&nbsp;Login to Dashboard

</button>

<div id="result"></div>

<div class="login-note">

<b>Official Notice</b><br><br>

This is the official login portal for
<b>Gowind SMM Panel</b>.

Only registered users and
authorized administrators
may access this system.

Unauthorized access is prohibited.

</div>

<div class="version">

© 2026 Gowind SMM Panel

<br>

Version 3.1

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";
   async function loadSettings(){

try{

const response =
await fetch(API + "/api/settings");

const data =
await response.json();

if(data.success &&
data.settings &&
data.settings.site_name){

document.querySelector("h2").textContent =
data.settings.site_name;

}

}catch(error){

console.log(error);

}

}

function togglePassword(){

const password =
document.getElementById("password");

const eye =
document.querySelector(".toggle-password");

if(password.type==="password"){

password.type="text";

eye.innerHTML="🙈";

}else{

password.type="password";

eye.innerHTML="👁";

}

}

async function login(){

const username =
document.getElementById("username").value.trim();

const password =
document.getElementById("password").value;

const result =
document.getElementById("result");

result.textContent="";

if(username==="" || password===""){

result.textContent =
"Please enter Username and Password";

return;

}

try{

const response =
await fetch(API + "/api/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

username,
password

})

});

const data =
await response.json();

if(!data.success){

result.textContent =
data.message || "Login Failed";

return;

}

localStorage.setItem(
"token",
data.token
);

localStorage.setItem(
"user",
JSON.stringify(data.user)
);
   if(data.user.role==="admin"){

location.href="admindashboard.html";

}else{

location.href="userdashboard.html";

}

}catch(error){

document.getElementById("result").textContent =
error.message || "Unable to connect to server";

}

}

/* ===========================
   AUTO LOGIN
=========================== */

const savedUser =
JSON.parse(localStorage.getItem("user"));

if(localStorage.getItem("token") && savedUser){

if(savedUser.role==="admin"){

location.href="admindashboard.html";

}else{

location.href="userdashboard.html";

}

}

/* ===========================
   ENTER KEY LOGIN
=========================== */

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

login();

}

});

/* ===========================
   PAGE LOAD
=========================== */

window.onload=function(){

loadSettings();

};

</script>

</body>

</html>
