<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>User Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0f172a;
color:white;

}

header{

background:#1e293b;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
box-shadow:0 2px 10px rgba(0,0,0,.4);

}

.container{

width:95%;
max-width:900px;
margin:25px auto;

}

.welcome{

background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
text-align:center;

}

.welcome h2{

margin-bottom:10px;

}

.balance{

font-size:28px;
font-weight:bold;
color:#22c55e;
margin-top:10px;

}

.menu{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:15px;

}

.menu a{

display:block;
text-decoration:none;
background:#1e293b;
color:white;
padding:18px;
border-radius:10px;
text-align:center;
font-size:17px;
font-weight:bold;
transition:.2s;

}

.menu a:hover{

background:#2563eb;
transform:scale(1.03);

}

.logout{

margin-top:25px;
width:100%;
padding:14px;
background:#ef4444;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;

}

</style>

</head>

<body>

<header>

User Dashboard

</header>

<div class="container">

<div class="welcome">

<h2>

Welcome,

<span id="username">

User

</span>

</h2>

<div>

Wallet Balance

</div>

<div
class="balance"
id="wallet">

₹0.00

</div>

</div>

<div class="menu">

<a href="new-order.html">

New Order

</a>

<a href="orderhistory.html">

Order History

</a>

<a href="transactions.html">

Transactions

</a>

<a href="profile.html">

Profile

</a>

</div>

<button
class="logout"
onclick="logout()">

Logout

</button>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(localStorage.getItem("user"));
  /* ===========================
   LOGIN CHECK
=========================== */

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER || USER.role!=="user"){

location.href="login.html";

}

/* ===========================
   LOAD USER
=========================== */

document.getElementById("username").innerHTML=
USER.username;

/* ===========================
   LOAD WALLET
=========================== */

async function loadWallet(){

try{

const response=await fetch(

API+"/api/wallet/"+USER.id

);

const data=await response.json();

if(data.success){

document.getElementById("wallet").innerHTML=

"₹"+Number(data.wallet).toFixed(2);

}

}catch(err){

console.log(err);

}

}

/* ===========================
   AUTO REFRESH
=========================== */

setInterval(loadWallet,30000);

/* ===========================
   LOGOUT
=========================== */

function logout(){

localStorage.removeItem("token");

localStorage.removeItem("user");

location.href="login.html";

}

/* ===========================
   WINDOW LOAD
=========================== */

window.onload=function(){

loadWallet();

};
  /* ===========================
   MENU ANIMATION
=========================== */

document.querySelectorAll(".menu a").forEach(link=>{

link.addEventListener("mouseenter",function(){

this.style.transform="scale(1.03)";
this.style.transition=".2s";

});

link.addEventListener("mouseleave",function(){

this.style.transform="scale(1)";

});

});

/* ===========================
   LOGOUT BUTTON
=========================== */

document.querySelector(".logout")
.addEventListener("mouseenter",function(){

this.style.transform="scale(1.03)";
this.style.transition=".2s";

});

document.querySelector(".logout")
.addEventListener("mouseleave",function(){

this.style.transform="scale(1)";

});

/* ===========================
   ENTER KEY
=========================== */

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

logout();

}

});

console.log("User Dashboard Ready");

</script>

</body>

</html>
