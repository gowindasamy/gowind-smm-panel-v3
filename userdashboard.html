<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>User Dashboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#08111f;

background-image:
radial-gradient(circle at top left,
rgba(147,51,234,.18),
transparent 35%),

radial-gradient(circle at top right,
rgba(6,182,212,.15),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(37,99,235,.18),
transparent 40%);

color:#fff;

min-height:100vh;

}

.container{

width:95%;

max-width:500px;

margin:18px auto;

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:center;

padding:16px 18px;

border-radius:18px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 10px 30px rgba(0,0,0,.25),
0 0 20px rgba(37,99,235,.18);

margin-bottom:18px;

}

.title h1{

font-size:24px;

font-weight:700;

line-height:1.2;

background:linear-gradient(
90deg,
#3b82f6,
#06b6d4);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.status{

display:flex;

align-items:center;

gap:6px;

margin-top:6px;

font-size:12px;

font-weight:600;

color:#22c55e;

letter-spacing:1px;

}

.status-dot{

width:8px;

height:8px;

border-radius:50%;

background:#22c55e;

box-shadow:0 0 10px #22c55e;

}

.actions{

display:flex;

gap:10px;

}

.action-btn{

width:44px;

height:44px;

border:none;

border-radius:50%;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:17px;

cursor:pointer;

transition:.3s;

}

.action-btn:hover{

background:#2563eb;

transform:scale(1.08);

box-shadow:0 0 18px rgba(37,99,235,.45);

}

/* CARDS */

.card{

margin-top:16px;

padding:20px;

border-radius:18px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

box-shadow:0 8px 25px rgba(0,0,0,.18);

}

.card-title{

display:flex;

align-items:center;

gap:10px;

font-size:17px;

font-weight:600;

margin-bottom:10px;

}

.card-title i{

color:#3b82f6;

}

.balance{

font-size:34px;

font-weight:700;

color:#22c55e;

margin-top:10px;

}

.menu{

display:flex;

flex-direction:column;

gap:14px;

margin-top:18px;

}

.menu-card{

display:flex;

align-items:center;

justify-content:space-between;

padding:18px;

border-radius:18px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

cursor:pointer;

transition:.3s;

}

.menu-card:hover{

transform:translateX(6px);

box-shadow:0 0 18px rgba(37,99,235,.30);

}

.menu-left{

display:flex;

align-items:center;

gap:14px;

}

.menu-left i{

color:#3b82f6;

font-size:20px;

}

.footer{

margin-top:25px;

padding:20px;

text-align:center;

border-radius:18px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

}

.footer h3{

color:#3b82f6;

margin-bottom:5px;

}

.copy{

margin-top:10px;

font-size:12px;

color:#94a3b8;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">

<h1 id="siteName">

Loading...

</h1>

<div class="status">

<div class="status-dot"></div>

<span>ACTIVE</span>

</div>

</div>

<div class="actions">

<button
class="action-btn"
onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

</div>

</div>
<div class="card">

<div class="card-title">

<i class="fa-solid fa-user"></i>

<span>

Welcome,

<b id="username">

User

</b>

</span>

</div>

<div>

Wallet Balance

</div>

<div
class="balance"
id="wallet">

₹0.00

</div>

</div>

<div class="menu">

<div
class="menu-card"
onclick="location.href='new-order.html'">

<div class="menu-left">

<i class="fa-solid fa-cart-plus"></i>

<span>

New Order

</span>

</div>

<i class="fa-solid fa-angle-right"></i>

</div>

<div
class="menu-card"
onclick="location.href='orderhistory.html'">

<div class="menu-left">

<i class="fa-solid fa-clock-rotate-left"></i>

<span>

Order History

</span>

</div>

<i class="fa-solid fa-angle-right"></i>

</div>

<div
class="menu-card"
onclick="location.href='transactions.html'">

<div class="menu-left">

<i class="fa-solid fa-wallet"></i>

<span>

Transactions

</span>

</div>

<i class="fa-solid fa-angle-right"></i>

</div>

<div
class="menu-card"
onclick="location.href='profile.html'">

<div class="menu-left">

<i class="fa-solid fa-user"></i>

<span>

Profile

</span>

</div>

<i class="fa-solid fa-angle-right"></i>

</div>

</div>

<footer class="footer">

<h3>

Gowind SMM Panel

</h3>

<p>

Version 3.0

</p>

<div class="status">

<div class="status-dot"></div>

<span>

System Online

</span>

</div>

<p class="copy">

© 2026 All Rights Reserved

</p>

</footer>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(
localStorage.getItem("user")
);
  async function loadSettings(){

try{

const response=
await fetch(API+"/api/settings");

const data=
await response.json();

if(data.success){

document.getElementById("siteName").textContent=
data.settings.site_name;

}

}catch(err){

console.log(err);

}

}

async function loadWallet(){

try{

const response=
await fetch(

API+"/api/wallet/"+USER.id,

{

headers:{

Authorization:
"Bearer "+
localStorage.getItem("token")

}

}

);

const data=
await response.json();

if(data.success){

document.getElementById("wallet").textContent=
"₹"+Number(data.wallet).toFixed(2);

}

}catch(err){

console.log(err);

}

}

function logout(){

localStorage.removeItem("token");

localStorage.removeItem("user");

location.href="login.html";

}

if(!localStorage.getItem("token") || !USER){

location.href="login.html";

}

document.getElementById("username").textContent=
USER.username;

window.onload=function(){

loadSettings();

loadWallet();

};

</script>

</body>

</html>
