<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Gowind SMM Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.container{

width:420px;
max-width:95%;
background:#1e293b;
padding:35px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.35);

}

.logo{

font-size:60px;
margin-bottom:15px;

}

h1{

margin-bottom:10px;

}

.version{

color:#94a3b8;
margin-bottom:20px;

}

p{

line-height:1.6;
margin-bottom:25px;

}

button{

width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
background:#2563eb;
color:white;
cursor:pointer;
transition:.2s;

}

button:hover{

background:#1d4ed8;
transform:scale(1.03);

}

.footer{

margin-top:25px;
font-size:14px;
color:#94a3b8;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

🚀

</div>

<h1 id="siteName">

Gowind SMM Panel

</h1>

<div class="version">

Version 3.1.0

</div>

<p>

Fast, Secure & Private<br>

Social Media Marketing Panel

</p>

<button onclick="openPanel()">

🔐 Login

</button>

<div class="footer">

© 2026 Gowind SMM Panel

</div>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

/* ===========================
   LOAD SITE NAME
=========================== */

async function loadSiteName(){

try{

const response=await fetch(
API+"/api/settings"
);

const data=await response.json();

if(data.success){

document.getElementById("siteName").innerHTML=

data.settings.site_name || "Gowind SMM Panel";

}

}catch(err){

console.log(err);

}

}

/* ===========================
   LOGIN BUTTON
=========================== */

function openPanel(){

location.href="login.html";

}

/* ===========================
   AUTO LOGIN
=========================== */

const token=

localStorage.getItem("token");

const user=

JSON.parse(localStorage.getItem("user"));

if(token && user){

if(user.role==="admin"){

location.href="admindashboard.html";

}else{

location.href="userdashboard.html";

}

}

/* ===========================
   WINDOW LOAD
=========================== */

window.onload=function(){

loadSiteName();

};

</script>

</body>

</html>
