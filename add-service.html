<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Add Service</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial,sans-serif;

}

body{

background:#08111f;

background-image:

radial-gradient(circle at top left,
rgba(147,51,234,.18),
transparent 35%),

radial-gradient(circle at top right,
rgba(6,182,212,.15),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(37,99,235,.18),
transparent 40%);

color:#fff;

min-height:100vh;

}

.container{

width:95%;

max-width:650px;

margin:18px auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

padding:16px 18px;

margin-bottom:18px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

box-shadow:

0 10px 30px rgba(0,0,0,.25),

0 0 20px rgba(37,99,235,.18);

}

.title h2{

font-size:26px;

font-weight:700;

background:linear-gradient(

90deg,

#3b82f6,

#06b6d4

);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.status{

display:flex;

align-items:center;

gap:6px;

margin-top:6px;

font-size:12px;

font-weight:600;

color:#22c55e;

}

.status-dot{

width:8px;

height:8px;

border-radius:50%;

background:#22c55e;

box-shadow:0 0 10px #22c55e;

}

.actions{

display:flex;

gap:10px;

}

.action-btn{

width:44px;

height:44px;

border:none;

border-radius:50%;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:17px;

cursor:pointer;

transition:.3s;

}

.action-btn:hover{

background:#2563eb;

transform:scale(1.08);

box-shadow:0 0 18px rgba(37,99,235,.35);

}

.form-card{

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:22px;

box-shadow:

0 10px 30px rgba(0,0,0,.25);

}

.form-card h3{

text-align:center;

margin-bottom:18px;

font-size:22px;

}
  .form-card select,
.form-card input{

width:100%;

padding:14px;

margin-bottom:15px;

border:none;

outline:none;

border-radius:12px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:15px;

transition:.3s;

}

.form-card select{

cursor:pointer;

}

.form-card select option{

background:#0f172a;

color:#fff;

}

.form-card input::placeholder{

color:#94a3b8;

}

.form-card input:focus,
.form-card select:focus{

border-color:#3b82f6;

box-shadow:0 0 18px rgba(59,130,246,.35);

}

.save-btn{

width:100%;

padding:15px;

border:none;

border-radius:14px;

cursor:pointer;

font-size:16px;

font-weight:600;

color:#fff;

background:linear-gradient(
90deg,
#2563eb,
#8b5cf6,
#06b6d4);

transition:.3s;

}

.save-btn:hover{

transform:translateY(-2px);

box-shadow:0 0 25px rgba(59,130,246,.35);

}

.result{

margin-top:15px;

text-align:center;

font-weight:600;

color:#22c55e;

min-height:20px;

}

@media(max-width:768px){

.container{

width:94%;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">

<h2 id="siteName">

Loading...

</h2>

<div class="status">

<div class="status-dot"></div>

<span>ACTIVE</span>

</div>

</div>

<div class="actions">

<button
class="action-btn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<button
class="action-btn"
onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

</div>

</div>

<div class="form-card">

<h3>

➕ Add Service

</h3>

<select id="provider">

<option value="">

Loading Providers...

</option>

</select>
<input
type="number"
id="provider_service_id"
placeholder="Provider Service ID">

<input
type="text"
id="name"
placeholder="Service Name">

<input
type="text"
id="category"
placeholder="Category">

<input
type="number"
id="rate"
placeholder="Rate per 1000">

<input
type="number"
id="min"
placeholder="Minimum Quantity">

<input
type="number"
id="max"
placeholder="Maximum Quantity">

<button
class="save-btn"
onclick="addService()">

<i class="fa-solid fa-floppy-disk"></i>

Save Service

</button>

<div
class="result"
id="result">

</div>

</div>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(localStorage.getItem("user"));

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER || USER.role!=="admin"){

location.href="login.html";

}

async function loadSettings(){

try{

const response=
await fetch(API+"/api/settings");

const data=
await response.json();

if(data.success){

document.getElementById("siteName").textContent=
data.settings.site_name;

}

}catch(err){

console.log(err);

}

}

async function loadProviders(){

try{

const response=
await fetch(API+"/api/providers");

const data=
await response.json();

const provider=
document.getElementById("provider");

provider.innerHTML="";

if(data.providers.length===0){

provider.innerHTML=
"<option value=''>No Providers Found</option>";

return;

}

data.providers.forEach(item=>{

provider.innerHTML+=`

<option value="${item.id}">

${item.name}

</option>

`;

});

}catch(err){

document.getElementById("result").textContent=
err.message;

}

}
  async function addService(){

try{

const response = await fetch(

API + "/api/services",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

provider_id:
Number(document.getElementById("provider").value),

provider_service_id:
Number(document.getElementById("provider_service_id").value),

name:
document.getElementById("name").value.trim(),

category:
document.getElementById("category").value.trim(),

rate:
Number(document.getElementById("rate").value),

min:
Number(document.getElementById("min").value),

max:
Number(document.getElementById("max").value)

})

}

);

const data = await response.json();

document.getElementById("result").textContent =
data.message || data.error;

if(data.success){

setTimeout(()=>{

location.href="services.html";

},1000);

}

}catch(err){

document.getElementById("result").textContent =
err.message;

}

}

function logout(){

localStorage.removeItem("token");

localStorage.removeItem("user");

location.href="login.html";

}

window.onload=function(){

loadSettings();

loadProviders();

};

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

history.back();

}

});

</script>

</body>

</html>
