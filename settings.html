<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
}

.container{
width:100%;
max-width:700px;
margin:30px auto;
padding:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.card h2{
text-align:center;
margin-bottom:25px;
font-size:28px;
}

label{
display:block;
margin-top:15px;
margin-bottom:8px;
font-weight:bold;
}

input,
select{

width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:15px;
outline:none;

}

button{

width:100%;
margin-top:25px;
padding:14px;
border:none;
border-radius:8px;
background:#22c55e;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;

}

button:hover{

background:#16a34a;

}

.status{

margin-top:20px;
text-align:center;
font-weight:bold;

}

.logo-preview{

display:block;
margin:15px auto;
width:80px;
height:80px;
object-fit:contain;
border-radius:10px;
background:#334155;
padding:8px;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>

⚙️ Panel Settings

</h2>

<label>

🏷️ Site Name

</label>

<input
id="site_name"
type="text"
placeholder="Site Name">

<label>

🖼️ Logo URL

</label>

<input
id="logo_url"
type="text"
placeholder="https://example.com/logo.png">

<img
id="logoPreview"
class="logo-preview"
src=""
alt="Logo Preview">

<label>

🔧 Maintenance Mode

</label>

<select id="maintenance">

<option value="false">

OFF

</option>

<option value="true">

ON

</option>

</select>

<label>

⏱️ Auto Sync Interval

</label>

<select id="sync_interval">

<option value="30">

30 Seconds

</option>

<option value="60">

1 Minute

</option>

<option value="300">

5 Minutes

</option>

</select>

<button
onclick="saveSettings()">

💾 Save Settings

</button>

<div
class="status"
id="status">

Ready...

</div>

</div>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";
    /* ===========================
   LOGIN CHECK
=========================== */

const USER =
JSON.parse(localStorage.getItem("user"));

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER || USER.role!=="admin"){

location.href="login.html";

}

/* ===========================
   LOAD SETTINGS
=========================== */

async function loadSettings(){

try{

const response=await fetch(

API+"/api/settings"

);

const data=await response.json();

if(!data.success){

document.getElementById("status").innerHTML=

"❌ Failed to Load Settings";

return;

}

const s=data.settings;

document.getElementById("site_name").value=

s.site_name || "";

document.getElementById("logo_url").value=

s.logo_url || "";

document.getElementById("maintenance").value=

String(s.maintenance);

document.getElementById("sync_interval").value=

String(s.sync_interval);

updateLogoPreview();

document.getElementById("status").innerHTML=

"✅ Settings Loaded";

}catch(err){

document.getElementById("status").innerHTML=

err.message;

}

}

/* ===========================
   LOGO PREVIEW
=========================== */

function updateLogoPreview(){

const url=

document.getElementById("logo_url").value.trim();

const img=

document.getElementById("logoPreview");

if(url===""){

img.src="";

return;

}

img.src=url;

img.onerror=function(){

this.src="";

};

}

/* ===========================
   LOGO URL CHANGE
=========================== */

document.getElementById("logo_url")

.addEventListener(

"input",

updateLogoPreview

);
    /* ===========================
   SAVE SETTINGS
=========================== */

async function saveSettings(){

const site_name=
document.getElementById("site_name").value.trim();

const logo_url=
document.getElementById("logo_url").value.trim();

const maintenance=

document.getElementById("maintenance").value==="true";

const sync_interval=

Number(

document.getElementById("sync_interval").value

);

document.getElementById("status").innerHTML=

"⏳ Saving...";

try{

const response=await fetch(

API+"/api/settings",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

site_name,

logo_url,

maintenance,

sync_interval

})

}

);

const data=await response.json();

if(data.success){

document.getElementById("status").innerHTML=

"✅ Settings Saved Successfully";

}else{

document.getElementById("status").innerHTML=

"❌ "+(data.message || data.error);

}

}catch(err){

document.getElementById("status").innerHTML=

"❌ "+err.message;

}

}

/* ===========================
   WINDOW LOAD
=========================== */

window.onload=function(){

loadSettings();

};

/* ===========================
   AUTO REFRESH PREVIEW
=========================== */

setInterval(updateLogoPreview,5000);
    /* ===========================
   BUTTON ANIMATION
=========================== */

document.querySelectorAll("button").forEach(btn=>{

btn.addEventListener("mouseenter",function(){

this.style.transform="scale(1.03)";
this.style.transition=".2s";

});

btn.addEventListener("mouseleave",function(){

this.style.transform="scale(1)";

});

});

/* ===========================
   SHORTCUT KEYS
=========================== */

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="s"){

e.preventDefault();

saveSettings();

}

if(e.ctrlKey && e.key==="r"){

e.preventDefault();

loadSettings();

}

if(e.key==="Escape"){

location.href="admindashboard.html";

}

});

/* ===========================
   PAGE READY
=========================== */

console.log("Settings Ready");

</script>

</body>

</html>
