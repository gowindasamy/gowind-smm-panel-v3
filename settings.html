<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Panel Settings</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

min-height:100vh;

background:
radial-gradient(circle at top left,#7c3aed33,transparent 35%),
radial-gradient(circle at top right,#06b6d433,transparent 35%),
radial-gradient(circle at bottom,#2563eb33,transparent 40%),
#0b1120;

color:#fff;

overflow-x:hidden;

}

/* Glow Background */

body::before{

content:"";

position:fixed;

width:260px;
height:260px;

background:#7c3aed;

filter:blur(140px);

top:-80px;
left:-80px;

opacity:.35;

z-index:-1;

}

body::after{

content:"";

position:fixed;

width:320px;
height:320px;

background:#06b6d4;

filter:blur(160px);

bottom:-100px;
right:-100px;

opacity:.25;

z-index:-1;

}

.container{

width:95%;
max-width:700px;

margin:35px auto;

padding:28px;

background:rgba(255,255,255,.04);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:22px;

box-shadow:

0 0 40px rgba(124,58,237,.20),

0 0 70px rgba(37,99,235,.18);

animation:fadeUp .5s ease;

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.header{

text-align:center;

margin-bottom:25px;

}

.header h1{

font-size:34px;

background:linear-gradient(
90deg,
#3b82f6,
#06b6d4,
#7c3aed
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

margin-bottom:8px;

}

.header p{

color:#94a3b8;

font-size:15px;

}

label{

display:block;

margin-top:18px;
margin-bottom:8px;

font-weight:bold;

font-size:18px;

color:#fff;

}

input,
select{

width:100%;

padding:15px;

border-radius:14px;

background:#16213a;

border:1px solid #334155;

color:#fff;

font-size:16px;

outline:none;

transition:.3s;

}

input:focus,
select:focus{

border-color:#3b82f6;

box-shadow:0 0 18px rgba(59,130,246,.35);

}

.logo-preview{

width:170px;
height:170px;

margin:25px auto;

border-radius:24px;

background:#111827;

display:flex;

justify-content:center;
align-items:center;

border:2px solid rgba(255,255,255,.08);

box-shadow:

0 0 25px rgba(59,130,246,.25);

overflow:hidden;

}

.logo-preview img{

width:100%;
height:100%;

object-fit:contain;

}

.info{

margin-top:15px;

text-align:center;

color:#cbd5e1;

font-size:15px;

line-height:1.8;

}
    button{

width:100%;

margin-top:25px;

padding:16px;

border:none;

border-radius:14px;

font-size:17px;

font-weight:bold;

cursor:pointer;

color:#fff;

background:linear-gradient(
90deg,
#2563eb,
#7c3aed,
#06b6d4
);

transition:.3s;

box-shadow:
0 0 20px rgba(59,130,246,.35);

}

button:hover{

transform:translateY(-3px);

box-shadow:
0 0 35px rgba(124,58,237,.45);

}

.toast{

position:fixed;

top:20px;
right:20px;

padding:14px 20px;

background:#22c55e;

border-radius:12px;

display:none;

font-weight:bold;

box-shadow:0 0 20px rgba(34,197,94,.4);

z-index:9999;

}

</style>

</head>

<body>

<div class="toast" id="toast">

✅ Settings Saved Successfully

</div>

<div class="container">

<div class="header">

<h1>⚙️ Panel Settings</h1>

<p>

Manage your Private SMM Panel

</p>

</div>

<label>

🏷️ Site Name

</label>

<input
type="text"
id="siteName">

<label>

🖼 Current Logo

</label>

<div class="logo-preview">

<img
src="assets/logo.png?v=1"
alt="Logo">

</div>

<div class="info">

📂 Current Logo:
<b>assets/logo.png</b>

<br><br>

💡 To change the logo,
replace
<b>assets/logo.png</b>
in your GitHub repository
and commit the changes.

</div>

<label>

🚧 Maintenance Mode

</label>

<select id="maintenance">

<option value="false">

OFF

</option>

<option value="true">

ON

</option>

</select>

<label>

⏱️ Sync Interval (Seconds)

</label>

<input
type="number"
id="syncInterval"
min="10">

<button
onclick="saveSettings()">

💾 Save Settings

</button>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";
    /* ===========================
   TOAST
=========================== */

function showToast(message){

const toast =
document.getElementById("toast");

toast.innerHTML="✅ "+message;

toast.style.display="block";

setTimeout(function(){

toast.style.display="none";

},3000);

}

/* ===========================
   LOAD SETTINGS
=========================== */

async function loadSettings(){

try{

const response=await fetch(

API+"/api/settings"

);

const data=await response.json();

if(!data.success){

alert("Failed to load settings");

return;

}

document.getElementById("siteName").value=
data.settings.site_name || "";

document.getElementById("maintenance").value=
String(data.settings.maintenance);

document.getElementById("syncInterval").value=
data.settings.sync_interval || 60;

}catch(err){

console.log(err);

alert("Server Error");

}

}

/* ===========================
   WINDOW LOAD
=========================== */

window.onload=function(){

loadSettings();

};
    /* ===========================
   SAVE SETTINGS
=========================== */

async function saveSettings(){

try{

const response = await fetch(

API + "/api/settings",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

site_name:
document.getElementById("siteName").value.trim(),

maintenance:
document.getElementById("maintenance").value==="true",

sync_interval:
Number(
document.getElementById("syncInterval").value
)

})

}

);

const data = await response.json();

if(data.success){

showToast("Settings Saved Successfully");

}else{

alert(
data.message ||
data.error ||
"Failed to Save Settings"
);

}

}catch(err){

alert(err.message);

}

}
    /* ===========================
   CTRL + S
=========================== */

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="s"){

e.preventDefault();

saveSettings();

}

});

/* ===========================
   INPUT ANIMATION
=========================== */

document.querySelectorAll("input,select").forEach(el=>{

el.addEventListener("focus",function(){

this.style.transform="scale(1.01)";
this.style.transition=".2s";

});

el.addEventListener("blur",function(){

this.style.transform="scale(1)";

});

});

/* ===========================
   BUTTON EFFECT
=========================== */

const btn=document.querySelector("button");

btn.addEventListener("mouseenter",function(){

this.style.transform="translateY(-3px)";

});

btn.addEventListener("mouseleave",function(){

this.style.transform="translateY(0)";

});

/* ===========================
   PAGE READY
=========================== */

console.log("Premium Settings Ready");

</script>

</body>

</html>
