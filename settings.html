<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

.container{

width:420px;
max-width:95%;
margin:40px auto;
background:#1e293b;
padding:20px;
border-radius:10px;

}

h2{

text-align:center;
margin-bottom:20px;

}

label{

display:block;
margin-bottom:5px;
font-weight:bold;

}

input,select{

width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:6px;

}

button{

width:100%;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;

}

.save{

background:#22c55e;
color:white;

}

#result{

margin-top:15px;
text-align:center;
font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h2>⚙️ Panel Settings</h2>

<label>Site Name</label>

<input
type="text"
id="site_name"
placeholder="Enter Site Name">

<label>Maintenance Mode</label>

<select id="maintenance">

<option value="false">
OFF
</option>

<option value="true">
ON
</option>

</select>

<button
class="save"
onclick="saveSettings()">

💾 Save Settings

</button>

<div id="result"></div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";
    /* ===========================
   LOAD SETTINGS
=========================== */

async function loadSettings(){

try{

const response = await fetch(
API + "/api/settings"
);

const data = await response.json();

if(!data.success){

document.getElementById("result").innerHTML =
data.message || "Settings not found";

return;

}

const settings = data.settings;

document.getElementById("site_name").value =
settings.site_name || "";

document.getElementById("maintenance").value =
String(settings.maintenance);

}catch(err){

document.getElementById("result").innerHTML =
err.message;

}

}
    /* ===========================
   SAVE SETTINGS
=========================== */

async function saveSettings(){

try{

const response = await fetch(

API + "/api/settings",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

site_name:
document.getElementById("site_name").value,

maintenance:
document.getElementById("maintenance").value === "true"

})

}

);

const data = await response.json();

document.getElementById("result").innerHTML =
data.message || data.error;

}catch(err){

document.getElementById("result").innerHTML =
err.message;

}

}

/* ===========================
   PAGE LOAD
=========================== */

loadSettings();
    /* ===========================
   LOGIN CHECK
=========================== */

if (!localStorage.getItem("token")) {

    location.href = "login.html";

}

/* ===========================
   WINDOW LOAD
=========================== */

window.onload = function(){

    loadSettings();

};

/* ===========================
   BUTTON ANIMATION
=========================== */

document.querySelectorAll("button").forEach(btn=>{

    btn.addEventListener("mouseenter",()=>{

        btn.style.transform="scale(1.05)";
        btn.style.transition=".2s";

    });

    btn.addEventListener("mouseleave",()=>{

        btn.style.transform="scale(1)";

    });

});

</script>

</body>

</html>
