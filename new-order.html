<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>New Order</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0f172a;
color:white;

}

.container{

width:450px;
max-width:95%;
margin:35px auto;
background:#1e293b;
padding:20px;
border-radius:10px;

}

h2{

text-align:center;
margin-bottom:20px;

}

#walletBox{

background:#22c55e;
padding:12px;
border-radius:8px;
text-align:center;
font-size:18px;
font-weight:bold;
margin-bottom:15px;

}

#serviceInfo{

background:#111827;
padding:12px;
border-radius:8px;
margin-bottom:15px;
line-height:1.8;

}

#serviceInfo span{

color:#22c55e;
font-weight:bold;

}

select,
input{

width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:6px;
font-size:16px;

}

button{

width:100%;
padding:12px;
background:#22c55e;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;

}

button:hover{

background:#16a34a;

}

#result{

margin-top:15px;
text-align:center;
font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h2>

🛒 Place New Order

</h2>

<div id="walletBox">

💰 Wallet Balance :
<span id="walletBalance">

₹0.00

</span>

</div>

<div id="serviceInfo">

📏 Min :
<span id="min">

0

</span>

&nbsp;&nbsp;|&nbsp;&nbsp;

📈 Max :
<span id="max">

0

</span>

<br><br>

💵 Rate :
₹<span id="rate">

0

</span>/1000

<br><br>

🧮 Charge :
₹<span id="charge">

0.00

</span>

</div>

<select id="service">

<option>

Loading Services...

</option>

</select>

<input
type="text"
id="link"
placeholder="Enter Link">

<input
type="number"
id="quantity"
placeholder="Quantity">

<button onclick="placeOrder()">

🚀 Place Order

</button>

<div id="result"></div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(localStorage.getItem("user"));

let SERVICES = [];
  /* ===========================
   LOGIN CHECK
=========================== */

if(!localStorage.getItem("token")){

location.href="login.html";

}

/* ===========================
   LOAD WALLET
=========================== */

async function loadWallet(){

try{

const response=await fetch(
API+"/api/wallet/"+USER.id
);

const data=await response.json();

if(data.success){

document.getElementById("walletBalance").innerHTML=
"₹"+Number(data.wallet).toFixed(2);

}

}catch(err){

console.log(err);

}

}

/* ===========================
   LOAD SERVICES
=========================== */

async function loadServices(){

try{

const response=await fetch(
API+"/api/services"
);

const data=await response.json();

SERVICES=data.services;

const service=
document.getElementById("service");

service.innerHTML="";

SERVICES.forEach(item=>{

service.innerHTML+=`

<option value="${item.id}">

${item.name}

</option>

`;

});

updateServiceInfo();

}catch(err){

document.getElementById("result").innerHTML=
err.message;

}

}

/* ===========================
   UPDATE SERVICE INFO
=========================== */

function updateServiceInfo(){

const id=
Number(document.getElementById("service").value);

const item=
SERVICES.find(x=>x.id===id);

if(!item)return;

document.getElementById("min").innerHTML=
item.min;

document.getElementById("max").innerHTML=
item.max;

document.getElementById("rate").innerHTML=
item.rate;

if(item.name.toLowerCase().includes("instagram")){

document.getElementById("link").placeholder=
"Enter Instagram Link";

}else if(item.name.toLowerCase().includes("youtube")){

document.getElementById("link").placeholder=
"Enter YouTube Link";

}else{

document.getElementById("link").placeholder=
"Enter Service Link";

}

calculateCharge();

}

/* ===========================
   CALCULATE CHARGE
=========================== */

function calculateCharge(){

const id=
Number(document.getElementById("service").value);

const qty=
Number(document.getElementById("quantity").value);

const item=
SERVICES.find(x=>x.id===id);

if(!item||!qty){

document.getElementById("charge").innerHTML="0.00";

return;

}

const charge=
(Number(item.rate)*qty)/1000;

document.getElementById("charge").innerHTML=
charge.toFixed(2);

}

document.getElementById("service")
.addEventListener("change",updateServiceInfo);

document.getElementById("quantity")
.addEventListener("input",calculateCharge);
  /* ===========================
   PLACE ORDER
=========================== */

async function placeOrder(){

try{

if(!USER){

document.getElementById("result").innerHTML=
"Please Login First";

return;

}

const response=await fetch(

API+"/api/orders",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id:USER.id,

service_id:Number(
document.getElementById("service").value
),

link:
document.getElementById("link").value,

quantity:Number(
document.getElementById("quantity").value
)

})

}

);

const data=await response.json();

document.getElementById("result").innerHTML=

data.message ||

(data.success
? "✅ Order Placed Successfully"
: data.error);

if(data.success){

document.getElementById("link").value="";

document.getElementById("quantity").value="";

calculateCharge();

loadWallet();

}

}catch(err){

document.getElementById("result").innerHTML=
err.message;

}

}

/* ===========================
   AUTO REFRESH
=========================== */

setInterval(loadWallet,30000);

/* ===========================
   WINDOW LOAD
=========================== */

window.onload=function(){

loadWallet();

loadServices();

};

/* ===========================
   BUTTON ANIMATION
=========================== */

document.querySelector("button")
.addEventListener("mouseenter",function(){

this.style.transform="scale(1.05)";
this.style.transition=".2s";

});

document.querySelector("button")
.addEventListener("mouseleave",function(){

this.style.transform="scale(1)";

});

/* ===========================
   ENTER KEY
=========================== */

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

placeOrder();

}

});

console.log("New Order Page Ready");

</script>

</body>

</html>
