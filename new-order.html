<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Place New Order</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
}

.container{

width:450px;
max-width:95%;
margin:35px auto;
background:#1e293b;
padding:25px;
border-radius:12px;

}

h2{

text-align:center;
margin-bottom:25px;
font-size:34px;

}

label{

display:block;
margin-bottom:8px;
font-size:16px;
font-weight:bold;

}

select,
input{

width:100%;
padding:14px;
margin-bottom:18px;
border:none;
border-radius:8px;
font-size:16px;
outline:none;

}

.info{

background:#111827;
padding:18px;
border-radius:10px;
margin-bottom:20px;
line-height:2;

}

.row{

display:flex;
justify-content:space-between;
margin-bottom:10px;

}

.value{

color:#22c55e;
font-weight:bold;

}

#charge{

font-size:30px;
color:#22c55e;
font-weight:bold;

}

button{

width:100%;
padding:15px;
background:#22c55e;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;

}

button:hover{

background:#16a34a;

}

#result{

margin-top:15px;
text-align:center;
font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h2>

Place New Order

</h2>

<label>

Service

</label>

<select id="service">

<option>

Loading Services...

</option>

</select>

<label>

Link

</label>

<input
type="text"
id="link"
placeholder="Enter Service Link">

<label>

Quantity

</label>

<input
type="number"
id="quantity"
placeholder="Enter Quantity">

<div class="info">

<div class="row">

<span>Minimum</span>

<span class="value" id="min">0</span>

</div>

<div class="row">

<span>Maximum</span>

<span class="value" id="max">0</span>

</div>

<div class="row">

<span>Rate</span>

<span class="value">

₹<span id="rate">0</span>/1000

</span>

</div>

<hr style="margin:15px 0;border-color:#374151;">

<div style="text-align:center;">

<div>Estimated Charge</div>

<div id="charge">

₹0.00

</div>

</div>

</div>

<button onclick="placeOrder()">

Place Order

</button>

<div id="result"></div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(localStorage.getItem("user"));

let SERVICES=[];
  /* ===========================
   LOGIN CHECK
=========================== */

if(!localStorage.getItem("token")){

location.href="login.html";

}

/* ===========================
   LOAD SERVICES
=========================== */

async function loadServices(){

try{

const response=await fetch(
API+"/api/services"
);

const data=await response.json();

SERVICES=data.services;

const service=document.getElementById("service");

service.innerHTML="";

if(SERVICES.length===0){

service.innerHTML=
"<option>No Services Available</option>";

return;

}

SERVICES.forEach(item=>{

service.innerHTML+=`

<option value="${item.id}">

${item.name}

</option>

`;

});

updateService();

}catch(err){

document.getElementById("result").innerHTML=
err.message;

}

}

/* ===========================
   UPDATE SERVICE
=========================== */

function updateService(){

const id=
Number(document.getElementById("service").value);

const item=
SERVICES.find(x=>x.id===id);

if(!item)return;

document.getElementById("min").innerHTML=
item.min;

document.getElementById("max").innerHTML=
item.max;

document.getElementById("rate").innerHTML=
Number(item.rate).toFixed(2);

const link=document.getElementById("link");

const name=item.name.toLowerCase();

if(name.includes("instagram")){

link.placeholder="Enter Instagram Link";

}else if(name.includes("youtube")){

link.placeholder="Enter YouTube Video Link";

}else if(name.includes("telegram")){

link.placeholder="Enter Telegram Link";

}else if(name.includes("facebook")){

link.placeholder="Enter Facebook Link";

}else{

link.placeholder="Enter Service Link";

}

calculateCharge();

}

/* ===========================
   CHARGE CALCULATOR
=========================== */

function calculateCharge(){

const qty=
Number(document.getElementById("quantity").value);

const id=
Number(document.getElementById("service").value);

const item=
SERVICES.find(x=>x.id===id);

if(!item || qty<=0){

document.getElementById("charge").innerHTML=
"₹0.00";

return;

}

const charge=
(Number(item.rate)*qty)/1000;

document.getElementById("charge").innerHTML=
"₹"+charge.toFixed(2);

}

document.getElementById("service")
.addEventListener("change",updateService);

document.getElementById("quantity")
.addEventListener("input",calculateCharge);
  /* ===========================
   PLACE ORDER
=========================== */

async function placeOrder(){

try{

if(!USER){

document.getElementById("result").innerHTML=
"Please Login First";

return;

}

const serviceId=
Number(document.getElementById("service").value);

const qty=
Number(document.getElementById("quantity").value);

const link=
document.getElementById("link").value.trim();

const item=
SERVICES.find(x=>x.id===serviceId);

if(!item){

document.getElementById("result").innerHTML=
"Please Select Service";

return;

}

if(link===""){

document.getElementById("result").innerHTML=
"Please Enter Link";

return;

}

if(qty<item.min){

document.getElementById("result").innerHTML=
"Minimum Quantity : "+item.min;

return;

}

if(qty>item.max){

document.getElementById("result").innerHTML=
"Maximum Quantity : "+item.max;

return;

}

const response=await fetch(

API+"/api/orders",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id:USER.id,

service_id:serviceId,

link:link,

quantity:qty

})

}

);

const data=await response.json();

if(data.success){

document.getElementById("result").style.color="#22c55e";

document.getElementById("result").innerHTML=
"Order Placed Successfully";

document.getElementById("link").value="";

document.getElementById("quantity").value="";

calculateCharge();

}else{

document.getElementById("result").style.color="#ef4444";

document.getElementById("result").innerHTML=
data.error || data.message;

}

}catch(err){

document.getElementById("result").style.color="#ef4444";

document.getElementById("result").innerHTML=
err.message;

}

}

/* ===========================
   PAGE LOAD
=========================== */

window.onload=function(){

loadServices();

};

/* ===========================
   BUTTON EFFECT
=========================== */

const btn=document.querySelector("button");

btn.addEventListener("mouseenter",()=>{

btn.style.transform="scale(1.02)";

btn.style.transition=".2s";

});

btn.addEventListener("mouseleave",()=>{

btn.style.transform="scale(1)";

});

/* ===========================
   ENTER KEY
=========================== */

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

placeOrder();

}

});

</script>

</body>

</html>
