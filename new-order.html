<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>New Order</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#08111f;

background-image:
radial-gradient(circle at top left,
rgba(147,51,234,.18),
transparent 35%),

radial-gradient(circle at top right,
rgba(6,182,212,.15),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(37,99,235,.18),
transparent 40%);

color:#fff;

min-height:100vh;

}

.container{

width:95%;
max-width:500px;

margin:18px auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

padding:16px 18px;

margin-bottom:18px;

border-radius:18px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 10px 30px rgba(0,0,0,.25),
0 0 20px rgba(37,99,235,.18);

}

.title h2{

font-size:24px;

background:linear-gradient(
90deg,
#3b82f6,
#06b6d4);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.status{

display:flex;

align-items:center;

gap:6px;

margin-top:6px;

font-size:12px;

font-weight:600;

color:#22c55e;

}

.status-dot{

width:8px;

height:8px;

border-radius:50%;

background:#22c55e;

box-shadow:0 0 10px #22c55e;

}

.actions{

display:flex;

gap:10px;

}

.action-btn{

width:44px;
height:44px;

border:none;

border-radius:50%;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:17px;

cursor:pointer;

transition:.3s;

}

.action-btn:hover{

background:#2563eb;

transform:scale(1.08);

}

.card{

padding:22px;

border-radius:18px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

box-shadow:0 8px 25px rgba(0,0,0,.20);

}

.card h3{

text-align:center;

font-size:30px;

margin-bottom:25px;

}

label{

display:block;

margin-bottom:8px;

font-weight:600;

font-size:15px;

}

select,
input{

width:100%;

padding:15px;

margin-bottom:18px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

border-radius:14px;

outline:none;

font-size:16px;

color:#fff;

}

select option{

background:#0f172a;

}

input::placeholder{

color:#94a3b8;

}

input:focus,
select:focus{

border-color:#3b82f6;

box-shadow:0 0 18px rgba(59,130,246,.35);

}

.info{

margin:20px 0;

padding:20px;

border-radius:18px;

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.08);

}

.row{

display:flex;

justify-content:space-between;

margin-bottom:15px;

}

.value{

color:#22c55e;

font-weight:bold;

}

#charge{

margin-top:18px;

font-size:34px;

font-weight:bold;

text-align:center;

color:#22c55e;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:14px;

background:linear-gradient(
90deg,
#2563eb,
#8b5cf6,
#06b6d4);

color:#fff;

font-size:18px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-2px);

box-shadow:0 0 25px rgba(59,130,246,.35);

}

#result{

margin-top:18px;

text-align:center;

font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">

<h2 id="siteName">

Loading...

</h2>

<div class="status">

<div class="status-dot"></div>

<span>ACTIVE</span>

</div>

</div>

<div class="actions">

<button
class="action-btn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<button
class="action-btn"
onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

</div>

</div>

<div class="card">

<h3>

Place New Order

</h3>
<label>

Service

</label>

<select id="service">

<option>

Loading Services...

</option>

</select>

<label>

Link

</label>

<input
type="text"
id="link"
placeholder="Enter Service Link">

<label>

Quantity

</label>

<input
type="number"
id="quantity"
placeholder="Enter Quantity">

<div class="info">

<div class="row">

<span>

Minimum

</span>

<span
class="value"
id="min">

0

</span>

</div>

<div class="row">

<span>

Maximum

</span>

<span
class="value"
id="max">

0

</span>

</div>

<div class="row">

<span>

Rate

</span>

<span class="value">

₹<span id="rate">

0.00

</span>

/1000

</span>

</div>

<hr style="
margin:18px 0;
border:1px solid rgba(255,255,255,.08);
">

<div style="text-align:center;">

<div style="
font-size:16px;
margin-bottom:10px;
">

Estimated Charge

</div>

<div id="charge">

₹0.00

</div>

</div>

</div>

<button onclick="placeOrder()">

<i class="fa-solid fa-cart-shopping"></i>

&nbsp;

Place Order

</button>

<div id="result"></div>

</div>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(
localStorage.getItem("user")
);

let SERVICES = [];
  if(!localStorage.getItem("token") || !USER){

location.href="login.html";

}

async function loadSettings(){

try{

const response=
await fetch(API+"/api/settings");

const data=
await response.json();

if(data.success){

document.getElementById("siteName").textContent=
data.settings.site_name;

}

}catch(err){

console.log(err);

}

}

async function loadServices(){

try{

const response=
await fetch(API+"/api/services");

const data=
await response.json();

SERVICES=data.services||[];

const service=
document.getElementById("service");

service.innerHTML="";

if(SERVICES.length===0){

service.innerHTML=
"<option>No Services</option>";

return;

}

SERVICES.forEach(item=>{

service.innerHTML+=`
<option value="${item.id}">
${item.name}
</option>
`;

});

updateService();

}catch(err){

document.getElementById("result").innerHTML=
err.message;

}

}

function updateService(){

const id=
Number(document.getElementById("service").value);

const item=
SERVICES.find(x=>x.id===id);

if(!item)return;

min.textContent=item.min;

max.textContent=item.max;

rate.textContent=
Number(item.rate).toFixed(2);

calculateCharge();

}

function calculateCharge(){

const qty=
Number(quantity.value);

const id=
Number(service.value);

const item=
SERVICES.find(x=>x.id===id);

if(!item||qty<=0){

charge.textContent="₹0.00";

return;

}

const total=
(Number(item.rate)*qty)/1000;

charge.textContent=
"₹"+total.toFixed(2);

}

service.onchange=updateService;

quantity.oninput=calculateCharge;

async function placeOrder(){

try{

const response=
await fetch(API+"/api/orders",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

user_id:USER.id,

service_id:Number(service.value),

link:link.value.trim(),

quantity:Number(quantity.value)

})

});

const data=
await response.json();

if(data.success){

result.style.color="#22c55e";

result.innerHTML=
"Order Placed Successfully";

link.value="";

quantity.value="";

calculateCharge();

}else{

result.style.color="#ef4444";

result.innerHTML=
data.error||data.message;

}

}catch(err){

result.style.color="#ef4444";

result.innerHTML=
err.message;

}

}

function logout(){

localStorage.removeItem("token");

localStorage.removeItem("user");

location.href="login.html";

}

window.onload=function(){

loadSettings();

loadServices();

};

document.addEventListener("keydown",e=>{

if(e.key==="Enter"){

placeOrder();

}

});

</script>

</body>

</html>
