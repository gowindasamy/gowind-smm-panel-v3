<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Execute Order Target - GOWIND SMM PANEL V3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard-wrapper">
    <div class="sidebar">
      <div class="brand">GOWIND V3</div>
      <ul class="sidebar-menu">
        <li><a href="user.html">Main Operations Desk</a></li>
        <li><a href="order.html" class="active">New Order Execution</a></li>
        <li><a href="history.html">Order History Repository</a></li>
        <li><a href="#" onclick="logout()">Secure Logout</a></li>
      </ul>
    </div>
    <div class="main-content">
      <div class="top-bar">
        <h2>New Order Formulation Matrix</h2>
        <div class="badge badge-inprogress" id="currentBalanceDisplay">Tracking liquid assets: $0.0000</div>
      </div>

      <div class="table-container" style="max-width: 600px; padding: 40px; margin: 0 auto;">
        <form id="formNewOrder" onsubmit="dispatchOrder(event)">
          <div class="form-group">
            <label>Select Deployment Targeted Service Array</label>
            <select id="orderServiceSelect" class="form-control" required onchange="evaluatePricingMatrix()"></select>
          </div>
          
          <div class="form-group">
            <label>Instagram/Target Reference Resource Link</label>
            <input type="url" id="orderLink" class="form-control" required placeholder="https://instagram.com/...">
          </div>

          <div class="form-group">
            <label>Requested Allocation Volume Quantity</label>
            <input type="number" id="orderQty" class="form-control" required placeholder="0" oninput="evaluatePricingMatrix()">
          </div>

          <div class="form-group">
            <label>Auto Calculated Computational Price Cost ($)</label>
            <input type="text" id="orderCostEstimate" class="form-control" readonly value="0.0000">
          </div>

          <button type="submit" class="btn">Deploy Real-Time API Order</button>
        </form>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    let internalRateMap = [];
    document.addEventListener("DOMContentLoaded", async () => {
      const u = getSessionUser();
      if(!u) return window.location.href = "index.html";
      
      const profile = await handleRequest(`${API_BASE}/user/${u.id}`);
      document.getElementById('currentBalanceDisplay').innerText = `Tracking liquid assets: $${parseFloat(profile.balance).toFixed(4)}`;

      const services = await handleRequest(`${API_BASE}/services/active`);
      internalRateMap = services;
      const select = document.getElementById('orderServiceSelect');
      
      services.forEach(s => {
        let opt = document.createElement('option');
        opt.value = s.id;
        opt.innerText = `${s.service_name} — ($${s.price}/1k) [Min:${s.min_quantity} Max:${s.max_quantity}]`;
        select.appendChild(opt);
      });
      evaluatePricingMatrix();
    });

    function evaluatePricingMatrix() {
      const sId = document.getElementById('orderServiceSelect').value;
      const qty = parseInt(document.getElementById('orderQty').value) || 0;
      const match = internalRateMap.find(item => item.id == sId);
      if(match) {
        let cost = (parseFloat(match.price) / 1000) * qty;
        document.getElementById('orderCostEstimate').value = cost.toFixed(4);
      }
    }

    async function dispatchOrder(e) {
      e.preventDefault();
      const u = getSessionUser();
      const serviceId = document.getElementById('orderServiceSelect').value;
      const link = document.getElementById('orderLink').value;
      const quantity = document.getElementById('orderQty').value;

      const res = await handleRequest(`${API_BASE}/orders/new`, {
        method: 'POST',
        body: JSON.stringify({ userId: u.id, serviceId, link, quantity })
      });
      if(res) {
        alert("Transaction Completed: API Order Routed Successfully!");
        window.location.href = "history.html";
      }
    }
  </script>
</body>
</html>
