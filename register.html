<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<style>

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e293b;
padding:25px;
border-radius:10px;
width:350px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

#result{
margin-top:15px;
text-align:center;
}

</style>

</head>

<body>

<div class="box">

<h2>Create User</h2>

<input
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<select id="role">
<option value="user">User</option>
<option value="admin">Admin</option>
</select>

<button onclick="register()">

Create Account

</button>

<div id="result"></div>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

async function register(){

const response = await fetch(

API + "/api/register",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:
document.getElementById("username").value,

password:
document.getElementById("password").value,

role:
document.getElementById("role").value

})

}

);

const data = await response.json();

document.getElementById("result").innerHTML =
data.message;

}

</script>

</body>
</html>
