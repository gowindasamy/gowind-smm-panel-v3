<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Admin User</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    background:#111827;
    color:white;
    text-align:center;
    font-family:Arial,sans-serif;
}

main{
    width:90%;
    max-width:400px;
    margin:auto;
    padding:20px;
}

input,select{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#00d4ff;
    color:#111827;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00b5d8;
}

#result{
    margin-top:20px;
    color:#00ff88;
    font-weight:bold;
    word-break:break-word;
}
</style>

</head>

<body>

<header>
<h1>👤 Create Admin User</h1>
</header>

<main>

<input
id="username"
type="text"
placeholder="Username"
required>

<input
id="password"
type="password"
placeholder="Password"
required>

<select id="role">
<option value="user">User</option>
<option value="admin">Admin</option>
</select>

<button onclick="registerUser()">
Create User
</button>

<p id="result"></p>

<br>

<button onclick="location.href='login.html'">
⬅ Login
</button>

</main>

<script>

async function registerUser(){

const username=document.getElementById("username").value;
const password=document.getElementById("password").value;
const role=document.getElementById("role").value;

if(username==="" || password===""){
document.getElementById("result").innerHTML="Please fill all fields.";
return;
}

try{

const response=await fetch(
"https://gowind-smm-panel-v3.onrender.com/api/register",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
password,
role
})
}
);

const data=await response.json();

document.getElementById("result").innerHTML=
data.message ||
data.error ||
JSON.stringify(data);

}
catch(err){

document.getElementById("result").innerHTML=
"Error: "+err.message;

}

}

</script>

</body>
</html>
