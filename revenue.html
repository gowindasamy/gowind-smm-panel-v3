<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Revenue</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial,sans-serif;

}

body{

background:#08111f;

background-image:

radial-gradient(circle at top left,
rgba(147,51,234,.18),
transparent 35%),

radial-gradient(circle at top right,
rgba(6,182,212,.15),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(37,99,235,.18),
transparent 40%);

color:#fff;

min-height:100vh;

}

.container{

width:95%;

max-width:1450px;

margin:18px auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

padding:16px 18px;

margin-bottom:18px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

box-shadow:

0 10px 30px rgba(0,0,0,.25),

0 0 20px rgba(37,99,235,.18);

}

.title h2{

font-size:28px;

font-weight:700;

background:linear-gradient(

90deg,

#3b82f6,

#06b6d4

);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.status{

display:flex;

align-items:center;

gap:6px;

margin-top:6px;

font-size:12px;

font-weight:600;

color:#22c55e;

}

.status-dot{

width:8px;

height:8px;

border-radius:50%;

background:#22c55e;

box-shadow:0 0 10px #22c55e;

}

.actions{

display:flex;

gap:10px;

}

.action-btn{

width:44px;

height:44px;

border:none;

border-radius:50%;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:17px;

cursor:pointer;

transition:.3s;

}

.action-btn:hover{

background:#2563eb;

transform:scale(1.08);

box-shadow:0 0 18px rgba(37,99,235,.35);

}

.search{

width:100%;

padding:15px;

margin-bottom:18px;

border:none;

outline:none;

border-radius:14px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:16px;

transition:.3s;

}

.search::placeholder{

color:#94a3b8;

}

.search:focus{

border-color:#3b82f6;

box-shadow:0 0 18px rgba(59,130,246,.35);

}

.revenue-card{

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:24px;

margin-bottom:18px;

text-align:center;

box-shadow:

0 10px 30px rgba(0,0,0,.25);

}

.revenue-card h3{

font-size:20px;

margin-bottom:12px;

}

.revenue-card h1{

font-size:42px;

color:#22c55e;

font-weight:bold;

}
  .table-card{

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

overflow:auto;

box-shadow:
0 10px 30px rgba(0,0,0,.25);

}

table{

width:100%;

min-width:1250px;

border-collapse:collapse;

}

th{

padding:16px;

background:rgba(59,130,246,.18);

text-align:center;

font-size:15px;

font-weight:600;

}

td{

padding:15px;

text-align:center;

border-top:1px solid rgba(255,255,255,.08);

}

.profit{

color:#22c55e;

font-weight:bold;

font-size:16px;

}

.loss{

color:#ef4444;

font-weight:bold;

}

.status{

font-weight:bold;

}

@media(max-width:768px){

table{

min-width:1250px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">

<h2 id="siteName">

Loading...

</h2>

<div class="status">

<div class="status-dot"></div>

<span>ACTIVE</span>

</div>

</div>

<div class="actions">

<button
class="action-btn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<button
class="action-btn"
onclick="loadRevenue()">

<i class="fa-solid fa-rotate-right"></i>

</button>

<button
class="action-btn"
onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

</div>

</div>

<input

class="search"

id="search"

type="text"

placeholder="Search Revenue..."

onkeyup="searchRevenue()">

<div class="revenue-card">

<h3>

💰 Total Revenue

</h3>

<h1 id="totalRevenue">

₹0.00

</h1>

</div>

<div class="table-card">
  <table>

<thead>

<tr>

<th>ID</th>

<th>Username</th>

<th>Service</th>

<th>Quantity</th>

<th>Provider</th>

<th>Provider Cost</th>

<th>My Price</th>

<th>Revenue</th>

<th>Status</th>

<th>Date</th>

</tr>

</thead>

<tbody id="revenueTable">

<tr>

<td colspan="10">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(localStorage.getItem("user"));

let revenues=[];

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER || USER.role!=="admin"){

location.href="login.html";

}

async function loadSettings(){

try{

const response=
await fetch(API+"/api/settings");

const data=
await response.json();

if(data.success){

document.getElementById("siteName").textContent=
data.settings.site_name;

}

}catch(err){

console.log(err);

}

}

async function loadRevenue(){

try{

const response=
await fetch(API+"/api/orders");

const data=
await response.json();

revenues=data.orders||[];

renderRevenue(revenues);

}catch(err){

document.getElementById("revenueTable").innerHTML=

"<tr><td colspan='10'>Failed to load revenue</td></tr>";

}

}
  function renderRevenue(list){

const table =
document.getElementById("revenueTable");

table.innerHTML="";

let totalRevenue=0;

if(list.length===0){

table.innerHTML=
"<tr><td colspan='10'>No Revenue Found</td></tr>";

document.getElementById("totalRevenue").textContent=
"₹0.00";

return;

}

list.forEach(order=>{

const providerCost=
Number(order.provider_rate||0)*
Number(order.quantity)/1000;

const myPrice=
Number(order.charge||0);

const revenue=
myPrice-providerCost;

if(order.status==="Completed"){

totalRevenue+=revenue;

}

const date=
new Date(order.created_at);

const day=
String(date.getDate()).padStart(2,"0");

const month=
String(date.getMonth()+1).padStart(2,"0");

const year=
String(date.getFullYear()).slice(-2);

table.innerHTML+=`

<tr>

<td>${order.id}</td>

<td>${order.username||"-"}</td>

<td>${order.service_name||"-"}</td>

<td>${order.quantity}</td>

<td>${order.provider_name||"-"}</td>

<td>

₹${providerCost.toFixed(2)}

</td>

<td>

₹${myPrice.toFixed(2)}

</td>

<td class="${
revenue>=0
? "profit"
: "loss"
}">

₹${revenue.toFixed(2)}

</td>

<td>

${order.status}

</td>

<td>

${day}/${month}/${year}

</td>

</tr>

`;

});

document.getElementById("totalRevenue").textContent=

"₹"+totalRevenue.toFixed(2);

}

function searchRevenue(){

const key=
document.getElementById("search")
.value
.toLowerCase();

renderRevenue(

revenues.filter(order=>

String(order.id)
.includes(key)

||

String(order.username||"")
.toLowerCase()
.includes(key)

||

String(order.service_name||"")
.toLowerCase()
.includes(key)

||

String(order.provider_name||"")
.toLowerCase()
.includes(key)

||

String(order.status||"")
.toLowerCase()
.includes(key)

)

);

}

function logout(){

localStorage.removeItem("token");

localStorage.removeItem("user");

location.href="login.html";

}

window.onload=function(){

loadSettings();

loadRevenue();

};

setInterval(loadRevenue,30000);

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

history.back();

}

if(e.ctrlKey&&e.key==="r"){

e.preventDefault();

loadRevenue();

}

});

</script>

</body>

</html>
