<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#08111f;

background-image:
radial-gradient(circle at top left,#2563eb22,transparent 35%),
radial-gradient(circle at bottom right,#06b6d422,transparent 40%);

color:#fff;

min-height:100vh;

overflow-x:hidden;

}

.container{

width:95%;

max-width:500px;

margin:18px auto;

}

/* ===========================
HEADER
=========================== */

.header{

display:flex;

justify-content:space-between;

align-items:center;

padding:20px;

border-radius:18px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

box-shadow:

0 10px 30px rgba(0,0,0,.25),

0 0 20px rgba(37,99,235,.18);

margin-bottom:18px;

}

.title h1{

font-size:28px;

font-weight:700;

background:linear-gradient(
90deg,
#3b82f6,
#06b6d4
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.title p{

margin-top:4px;

font-size:13px;

color:#94a3b8;

}

.actions{

display:flex;

gap:10px;

}

.action-btn{

width:46px;

height:46px;

border:none;

border-radius:50%;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:18px;

cursor:pointer;

transition:.3s;

}

.action-btn:hover{

background:#2563eb;

transform:scale(1.08);

box-shadow:

0 0 18px rgba(37,99,235,.45);

}

/* ===========================
CARDS
=========================== */

.cards{

display:grid;

gap:15px;

}

.card{

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:18px;

transition:.35s;

position:relative;

overflow:hidden;

cursor:pointer;

}

.card::before{

content:"";

position:absolute;

top:0;

left:-120%;

width:60%;

height:100%;

background:linear-gradient(

90deg,

transparent,

rgba(255,255,255,.12),

transparent

);

transform:skewX(-20deg);

transition:.8s;

}

.card:hover::before{

left:180%;

}

.card:hover{

transform:translateY(-4px);

border-color:#3b82f6;

box-shadow:

0 0 20px rgba(37,99,235,.30),

0 0 35px rgba(6,182,212,.20);

}

.card-title{

display:flex;

align-items:center;

gap:10px;

font-size:16px;

font-weight:600;

color:#fff;

margin-bottom:10px;

}

.card-title i{

color:#3b82f6;

font-size:18px;

}

.card-value{

font-size:32px;

font-weight:bold;

color:#fff;

}

.wallet{

font-size:30px;

color:#22c55e;

}
   </style>

</head>

<body>

<div class="container">

<!-- Header -->

<div class="header">

<div class="title">

<h1 id="siteName">Loading...</h1>

</div>

<div class="actions">

<button
class="action-btn"
onclick="location.href='settings.html'"
title="Settings">

<i class="fa-solid fa-gear"></i>

</button>

<button
class="action-btn"
onclick="logout()"
title="Logout">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

</div>

</div>

<!-- Dashboard -->

<div class="cards">

<div class="card">

<div class="card-title">

<i class="fa-solid fa-cart-shopping"></i>

<span>Total Orders</span>

</div>

<div
class="card-value"
id="totalOrders">

0

</div>

</div>

<div class="card">

<div class="card-title">

<i class="fa-solid fa-users"></i>

<span>Total Users</span>

</div>

<div
class="card-value"
id="totalUsers">

0

</div>

</div>

<div class="card">

<div class="card-title">

<i class="fa-solid fa-box"></i>

<span>Total Services</span>

</div>

<div
class="card-value"
id="totalServices">

0

</div>

</div>

<div class="card">

<div class="card-title">

<i class="fa-solid fa-server"></i>

<span>Providers</span>

</div>

<div
class="card-value"
id="totalProviders">

0

</div>

</div>

<div class="card">

<div class="card-title">

<i class="fa-solid fa-wallet"></i>

<span>Wallet Balance</span>

</div>

<div
class="card-value wallet"
id="walletBalance">

₹0.00

</div>

</div>

<!-- Menu -->

<div class="card"
onclick="location.href='new-order.html'">

<div class="card-title">

<i class="fa-solid fa-cart-plus"></i>

<span>New Order</span>

</div>

</div>

<div class="card"
onclick="location.href='orders.html'">

<div class="card-title">

<i class="fa-solid fa-list-check"></i>

<span>Orders</span>

</div>

</div>

<div class="card"
onclick="location.href='users.html'">

<div class="card-title">

<i class="fa-solid fa-users"></i>

<span>Users</span>

</div>

</div>

<div class="card"
onclick="location.href='services.html'">

<div class="card-title">

<i class="fa-solid fa-box"></i>

<span>Services</span>

</div>

</div>

<div class="card"
onclick="location.href='providers.html'">

<div class="card-title">

<i class="fa-solid fa-server"></i>

<span>Providers</span>

</div>

</div>

<div class="card"
onclick="location.href='transactions.html'">

<div class="card-title">

<i class="fa-solid fa-wallet"></i>

<span>Transactions</span>

</div>

</div>

<div class="card"
onclick="location.href='profile.html'">

<div class="card-title">

<i class="fa-solid fa-user"></i>

<span>Profile</span>

</div>

</div>

</div>

<script>

const API="https://gowind-smm-panel-v3.onrender.com";
   async function loadDashboard(){

try{

const response=await fetch(API+"/api/admin/dashboard");

if(!response.ok) return;

const data=await response.json();

if(!data.success) return;

document.getElementById("totalOrders").textContent=
data.dashboard.orders ?? 0;

document.getElementById("totalUsers").textContent=
data.dashboard.users ?? 0;

document.getElementById("totalServices").textContent=
data.dashboard.services ?? 0;

document.getElementById("totalProviders").textContent=
data.dashboard.providers ?? 0;

}catch(error){

console.error(error);

}

}

async function loadWallet(){

try{

const user=JSON.parse(
localStorage.getItem("user")
);

if(!user) return;

const response=await fetch(
API+"/api/wallet/"+user.id
);

if(!response.ok) return;

const data=await response.json();

if(data.success){

document.getElementById("walletBalance").textContent=

"₹"+Number(data.wallet || 0).toFixed(2);

}

}catch(error){

console.error(error);

}

}
async function loadSettings(){

    try{

        const response = await fetch(API + "/api/settings");

        const data = await response.json();

        if(!data.success) return;

        document.getElementById("siteName").textContent =
            data.settings.site_name;

      
    }catch(error){

        console.error(error);

    }

    }
function logout(){

localStorage.removeItem("token");

localStorage.removeItem("user");

window.location.href="login.html";

}

const token=localStorage.getItem("token");

const user=JSON.parse(
localStorage.getItem("user")
);

if(!token || !user || user.role!=="admin"){

window.location.href="login.html";

}

window.onload=function(){

loadDashboard();
loadDashboard();
loadWallet();

};

setInterval(function(){

loadDashboard();

loadWallet();

},30000);

</script>

</body>

</html>
