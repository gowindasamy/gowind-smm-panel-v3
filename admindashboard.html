<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0b1120;
color:#fff;

}

.container{

width:95%;
max-width:1400px;
margin:20px auto;

}

.header{

display:flex;
justify-content:space-between;
align-items:center;
background:rgba(30,41,59,.95);
backdrop-filter:blur(15px);
padding:18px 20px;
border-radius:18px;
border:1px solid #2d3b52;
box-shadow:0 10px 30px rgba(0,0,0,.35);
margin-bottom:20px;

}

.logo{

display:flex;
align-items:center;
gap:12px;

}

.logo-icon{

width:50px;
height:50px;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
background:linear-gradient(135deg,#7c3aed,#3b82f6);

}

.logo h2{

font-size:24px;
font-weight:bold;

}

.avatar{

width:48px;
height:48px;
border-radius:50%;
background:#334155;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;

}

.grid{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-bottom:20px;

}

.menu-card{

background:#1e293b;
border:1px solid #334155;
border-radius:18px;
padding:18px;
text-align:center;
cursor:pointer;
transition:.25s;

}

.menu-card:hover{

transform:translateY(-4px);
box-shadow:0 10px 20px rgba(0,0,0,.35);

}

.menu-icon{

font-size:34px;
margin-bottom:10px;

}

.menu-title{

font-size:16px;
font-weight:bold;

}

.stats{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;

}

.stat-card{

background:#1e293b;
border-radius:18px;
padding:18px;
border:1px solid #334155;

}

.stat-title{

font-size:15px;
color:#cbd5e1;

}

.stat-value{

font-size:30px;
font-weight:bold;
margin-top:8px;

}

.overview{

margin-top:20px;
background:#1e293b;
border-radius:18px;
padding:20px;
border:1px solid #334155;

}

.overview h3{

margin-bottom:15px;

}

.info{

display:flex;
justify-content:space-between;
margin:10px 0;

}

.logout{

width:170px;
margin:25px auto;
padding:12px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#ef4444,#dc2626);
color:white;
display:block;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:.2s;

}

.logout:hover{

transform:scale(1.05);

}

@media(max-width:600px){

.logo h2{

font-size:20px;

}

.menu-title{

font-size:14px;

}

.stat-value{

font-size:24px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">

<div class="logo-icon">

🚀

</div>

<h2 id="siteName">

Loading...

</h2>

</div>

<div class="avatar">

👤

</div>

  </div>
  <!-- ===========================

=========================== -->

<div class="grid">

onclick="location.href='providers.html'">

<div class="menu-title">

</div>

</div>

<div class="menu-card"
onclick="location.href='orders.html'">

<div class="menu-icon">

📝

</div>

<div class="menu-title">

Orders

</div>

</div>

<div class="menu-card"
onclick="location.href='users.html'">

<div class="menu-icon">

👥

</div>

<div class="menu-title">

Users

</div>

</div>

<div class="menu-card"
onclick="location.href='settings.html'">

<div class="menu-icon">

⚙️

</div>

<div class="menu-title">

Settings

</div>

</div>

<div class="menu-card"
onclick="location.href='orderhistory.html'">

<div class="menu-icon">

📜

</div>

<div class="menu-title">

Order History

</div>

</div>

<div class="menu-card"
onclick="location.href='transactions.html'">

<div class="menu-icon">

💳

</div>

<div class="menu-title">

Transactions

</div>

</div>

<div class="menu-card"
onclick="location.href='profile.html'">

<div class="menu-icon">

🙍

</div>

<div class="menu-title">

Profile

</div>

</div>

</div>

<!-- ===========================
     STATISTICS
=========================== -->

<div class="stats">

<div class="stat-card">

<div class="stat-title">

👥 Total Users

</div>

<div
class="stat-value"
id="totalUsers">

0

</div>

</div>

<div class="stat-card">

<div class="stat-title">

📦 Total Orders

</div>

<div
class="stat-value"
id="totalOrders">

0

</div>

</div>

<div class="stat-card">

<div class="stat-title">

🌐 Total Providers

</div>

<div
class="stat-value"
id="totalProviders">

0

</div>

</div>

<div class="stat-card">

🛒 Total Services

</div>

<div
class="stat-value"
id="totalServices">

0

</div>

</div>
<!-- ===========================
     SYSTEM OVERVIEW
=========================== -->

<div class="overview">

</h3>

<div class="info">

<span>

</span>

</span>

<button
class="logout"
onclick="logout()">

🚪 Logout

</button>

</div>

<script>

const API=
"https://gowind-smm-panel-v3.onrender.com";

const USER=
JSON.parse(localStorage.getItem("user"));

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER || USER.role!=="admin"){

location.href="login.html";

}

/* ===========================
   LOAD SITE NAME
=========================== */

async function loadSiteName(){

try{

const response=await fetch(
API+"/api/settings"
);

const data=await response.json();

if(data.success){

document.getElementById("siteName").innerHTML=

data.settings.site_name;

}

}catch(err){

console.log(err);

}

}
  /* ===========================
   LOAD DASHBOARD STATS
=========================== */

async function loadDashboard(){

try{

const users=await fetch(
API+"/api/users"
).then(r=>r.json());

const orders=await fetch(
API+"/api/orders"
).then(r=>r.json());

const providers=await fetch(
API+"/api/providers"
).then(r=>r.json());

const services=await fetch(
API+"/api/services"
).then(r=>r.json());

document.getElementById("totalUsers").innerHTML=

users.total || users.users?.length || 0;

document.getElementById("totalOrders").innerHTML=

orders.total || orders.orders?.length || 0;

document.getElementById("totalProviders").innerHTML=

providers.total || providers.providers?.length || 0;

document.getElementById("totalServices").innerHTML=

services.total || services.services?.length || 0;

document.getElementById("lastUpdated").innerHTML=

new Date().toLocaleTimeString();

}catch(err){

console.log(err);

}

}

/* ===========================
   LOGOUT
=========================== */

function logout(){

localStorage.removeItem("token");
localStorage.removeItem("user");

location.href="login.html";

}

/* ===========================
   WINDOW LOAD
=========================== */

window.onload=function(){

loadSiteName();

loadDashboard();

};

/* ===========================
   AUTO REFRESH
=========================== */

setInterval(function(){

loadDashboard();

document.getElementById("lastUpdated").innerHTML=

new Date().toLocaleTimeString();

},30000);
  /* ===========================
   BUTTON HOVER
=========================== */

document.querySelectorAll(".menu-card").forEach(card=>{

card.addEventListener("mouseenter",function(){

this.style.transform="translateY(-5px)";
this.style.boxShadow="0 15px 30px rgba(124,58,237,.35)";
this.style.transition=".25s";

});

card.addEventListener("mouseleave",function(){

this.style.transform="translateY(0)";
this.style.boxShadow="none";

});

});

/* ===========================
   COUNT ANIMATION
=========================== */

function animateValue(id,value){

let start=0;

const obj=document.getElementById(id);

const timer=setInterval(()=>{

start++;

obj.innerHTML=start;

if(start>=value){

clearInterval(timer);

obj.innerHTML=value;

}

},20);

}

/* ===========================
   KEYBOARD SHORTCUTS
=========================== */

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="r"){

e.preventDefault();

loadDashboard();

}

if(e.key==="Escape"){

logout();

}

});

/* ===========================
   PAGE READY
=========================== */

console.log("Admin Dashboard Ready");

</script>

</body>

</html>
