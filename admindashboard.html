<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0b1120;

color:#fff;

min-height:100vh;

overflow-x:hidden;

}

.container{

width:95%;

max-width:1200px;

margin:20px auto;

padding:5px;

}

/* ===========================
   HEADER
=========================== */

.header{

display:flex;

justify-content:space-between;

align-items:center;

background:#111827;

border:1px solid #1f2937;

border-radius:18px;

padding:18px;

margin-bottom:20px;

box-shadow:0 0 20px rgba(37,99,235,.15);

}

.brand{

display:flex;

align-items:center;

gap:15px;

}

.logo{

width:60px;

height:60px;

border-radius:50%;

overflow:hidden;

border:2px solid #2563eb;

box-shadow:

0 0 20px rgba(37,99,235,.30);

}

.logo img{

width:100%;

height:100%;

object-fit:cover;

}

.title h2{

font-size:24px;

font-weight:bold;

color:#ffffff;

}

.title p{

font-size:13px;

color:#94a3b8;

margin-top:3px;

}

.actions{

display:flex;

gap:10px;

}

.action-btn{

width:45px;

height:45px;

border:none;

border-radius:50%;

background:#1e293b;

color:#fff;

cursor:pointer;

font-size:18px;

transition:.3s;

}

.action-btn:hover{

background:#2563eb;

transform:scale(1.08);

box-shadow:

0 0 18px rgba(37,99,235,.45);

}

/* ===========================
   STATS
=========================== */

.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;

margin-bottom:20px;

}

.card{

background:#111827;

border:1px solid #1f2937;

border-radius:16px;

padding:20px;

position:relative;

overflow:hidden;

cursor:pointer;

transition:.3s;

box-shadow:

0 0 12px rgba(37,99,235,.12);

}

.card::before{

content:"";

position:absolute;

top:0;

left:-120%;

width:60%;

height:100%;

background:linear-gradient(

90deg,

transparent,

rgba(255,255,255,.08),

transparent

);

transition:.8s;

}

.card:hover::before{

left:170%;

}

.card:hover{

transform:translateY(-5px);

border-color:#2563eb;

box-shadow:

0 0 20px rgba(37,99,235,.35),

0 0 35px rgba(124,58,237,.25);

}

.card h4{

font-size:15px;

color:#cbd5e1;

margin-bottom:10px;

display:flex;

align-items:center;

gap:8px;

}

.card h2{

font-size:30px;

font-weight:bold;

}

.wallet{

grid-column:1/-1;

}
   </style>

</head>

<body>

<div class="container">

<!-- Header -->

<div class="header">

<div class="brand">

<div class="logo">

<img src="assets/logo.png" alt="Logo">

</div>

<div class="title">

<h2>Gowind SMM Panel</h2>

<p>Private Multi Provider Panel</p>

</div>

</div>

<div class="actions">

<button
class="action-btn"
onclick="location.href='settings.html'"
title="Settings">

<i class="fa-solid fa-gear"></i>

</button>

<button
class="action-btn"
onclick="logout()"
title="Logout">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

</div>

</div>

<!-- Dashboard Cards -->

<div class="stats">

<div class="card">

<h4>

<i class="fa-solid fa-cart-shopping"></i>

Total Orders

</h4>

<h2 id="totalOrders">0</h2>

</div>

<div class="card">

<h4>

<i class="fa-solid fa-users"></i>

Total Users

</h4>

<h2 id="totalUsers">0</h2>

</div>

<div class="card">

<h4>

<i class="fa-solid fa-box"></i>

Total Services

</h4>

<h2 id="totalServices">0</h2>

</div>

<div class="card">

<h4>

<i class="fa-solid fa-server"></i>

Providers

</h4>

<h2 id="totalProviders">0</h2>

</div>

<div class="card wallet">

<h4>

<i class="fa-solid fa-wallet"></i>

Wallet Balance

</h4>

<h2 id="walletBalance">₹0.00</h2>

</div>

</div>

<!-- Menu -->

<div class="stats">

<div class="card"

onclick="location.href='new-order.html'">

<h4>

<i class="fa-solid fa-cart-plus"></i>

New Order

</h4>

</div>

<div class="card"

onclick="location.href='orders.html'">

<h4>

<i class="fa-solid fa-list-check"></i>

Orders

</h4>

</div>

<div class="card"

onclick="location.href='users.html'">

<h4>

<i class="fa-solid fa-users"></i>

Users

</h4>

</div>

<div class="card"

onclick="location.href='services.html'">

<h4>

<i class="fa-solid fa-box"></i>

Services

</h4>

</div>

<div class="card"

onclick="location.href='providers.html'">

<h4>

<i class="fa-solid fa-server"></i>

Providers

</h4>

</div>

<div class="card"

onclick="location.href='transactions.html'">

<h4>

<i class="fa-solid fa-wallet"></i>

Transactions

</h4>

</div>

<div class="card"

onclick="location.href='profile.html'">

<h4>

<i class="fa-solid fa-user"></i>

Profile

</h4>

</div>

</div>

<script>

const API="https://gowind-smm-panel-v3.onrender.com";
   async function loadDashboard(){

try{

const response=await fetch(
API+"/api/admin/dashboard"
);

if(!response.ok) return;

const data=await response.json();

if(!data.success) return;

document.getElementById("totalOrders").textContent=
data.dashboard.orders ?? 0;

document.getElementById("totalUsers").textContent=
data.dashboard.users ?? 0;

document.getElementById("totalServices").textContent=
data.dashboard.services ?? 0;

document.getElementById("totalProviders").textContent=
data.dashboard.providers ?? 0;

}catch(error){

console.error("Dashboard:",error);

}

}

async function loadWallet(){

try{

const user=JSON.parse(
localStorage.getItem("user")
);

if(!user) return;

const response=await fetch(
API+"/api/wallet/"+user.id
);

if(!response.ok) return;

const data=await response.json();

if(data.success){

document.getElementById("walletBalance").textContent=
"₹"+Number(data.wallet||0).toFixed(2);

}

}catch(error){

console.error("Wallet:",error);

}

}

function logout(){

localStorage.removeItem("token");

localStorage.removeItem("user");

location.href="login.html";

}

const token=
localStorage.getItem("token");

const user=
JSON.parse(localStorage.getItem("user"));

if(
!token||
!user||
user.role!=="admin"
){

location.href="login.html";

}

window.onload=function(){

loadDashboard();

loadWallet();

};

setInterval(function(){

loadDashboard();

loadWallet();

},30000);

</script>

</body>

</html>
