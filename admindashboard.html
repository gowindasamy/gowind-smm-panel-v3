<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0f172a;
color:white;

}

header{

background:#1e293b;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
box-shadow:0 2px 10px rgba(0,0,0,.4);

}

.container{

width:95%;
max-width:1300px;
margin:20px auto;

}

.menu{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:15px;
margin-bottom:25px;

}

.menu a{

display:block;
text-decoration:none;
background:#1e293b;
color:white;
padding:18px;
text-align:center;
border-radius:10px;
font-size:16px;
font-weight:bold;
transition:.2s;

}

.menu a:hover{

background:#2563eb;
transform:scale(1.03);

}

.cards{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

}

.card{

background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;

}

.card h3{

margin-bottom:10px;

}

.card h1{

font-size:34px;
color:#22c55e;

}

.logout{

margin-top:30px;
width:100%;
padding:14px;
background:#ef4444;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;

}

</style>

</head>

<body>

<h2 id="siteName">Loading...</h2>

<div class="container">

<div class="menu">

<a href="providers.html">
Providers
</a>

<a href="services.html">
Services
</a>

<a href="orders.html">
Orders
</a>

<a href="users.html">
Users
</a>

<a href="settings.html">
Settings
</a>

<a href="new-order.html">
New Order
</a>

<a href="orderhistory.html">
Order History
</a>

<a href="transactions.html">
Transactions
</a>

<a href="profile.html">
Profile
</a>

</div>

<div class="cards">

<div class="card">

<h3>Total Users</h3>

<h1 id="users">

0

</h1>

</div>

<div class="card">

<h3>Total Orders</h3>

<h1 id="orders">

0

</h1>

</div>

<div class="card">

<h3>Total Providers</h3>

<h1 id="providers">

0

</h1>

</div>

<div class="card">

<h3>Total Services</h3>

<h1 id="services">

0

</h1>

</div>

<div class="card">

<h3>Total Revenue</h3>

<h1 id="revenue">

₹0.00

</h1>

</div>

</div>

<button
class="logout"
onclick="logout()">

Logout

</button>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(localStorage.getItem("user"));
  /* ===========================
   LOGIN CHECK
=========================== */

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER || USER.role!=="admin"){

location.href="login.html";

}

/* ===========================
   LOAD DASHBOARD
=========================== */

async function loadDashboard(){

try{

const response=await fetch(
API+"/api/admin/dashboard"
);

const data=await response.json();

if(!data.success){

return;

}

document.getElementById("users").innerHTML=
data.dashboard.users;

document.getElementById("orders").innerHTML=
data.dashboard.orders;

document.getElementById("providers").innerHTML=
data.dashboard.providers;

document.getElementById("services").innerHTML=
data.dashboard.services;

document.getElementById("revenue").innerHTML=
"₹"+Number(data.dashboard.revenue).toFixed(2);

}catch(err){

console.log(err);

}

}

/* ===========================
   AUTO REFRESH
=========================== */

setInterval(loadDashboard,30000);

/* ===========================
   LOGOUT
=========================== */

function logout(){

localStorage.removeItem("token");

localStorage.removeItem("user");

location.href="login.html";

}

/* ===========================
   WINDOW LOAD
=========================== */

window.onload=function(){

loadDashboard();

};
  /* ===========================
   MENU ANIMATION
=========================== */

document.querySelectorAll(".menu a").forEach(link=>{

link.addEventListener("mouseenter",function(){

this.style.transform="scale(1.03)";
this.style.transition=".2s";

});

link.addEventListener("mouseleave",function(){

this.style.transform="scale(1)";

});

});

/* ===========================
   LOGOUT BUTTON
=========================== */

const btn=document.querySelector(".logout");

btn.addEventListener("mouseenter",function(){

btn.style.transform="scale(1.03)";
btn.style.transition=".2s";

});

btn.addEventListener("mouseleave",function(){

btn.style.transform="scale(1)";

});

/* ===========================
   SHORTCUT KEYS
=========================== */

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

logout();

}

if(e.ctrlKey && e.key==="r"){

e.preventDefault();

loadDashboard();

}

});

/* ===========================
   PAGE READY
=========================== */

console.log("Admin Dashboard Ready");

</script>

</body>

</html>
