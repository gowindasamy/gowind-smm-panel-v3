<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Orders</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
width:95%;
margin:auto;
padding:20px;
}

input{

width:100%;
padding:12px;
margin-bottom:20px;
border:none;
border-radius:6px;

}

table{

width:100%;
border-collapse:collapse;

}

th{

background:#334155;
padding:12px;

}

td{

padding:10px;
text-align:center;
border-bottom:1px solid #475569;

}

.pending{
background:#f59e0b;
padding:5px 10px;
border-radius:5px;
}

.processing{
background:#3b82f6;
padding:5px 10px;
border-radius:5px;
}

.completed{
background:#22c55e;
padding:5px 10px;
border-radius:5px;
}

.cancelled{
background:#ef4444;
padding:5px 10px;
border-radius:5px;
}

button{

padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:20px;

}

</style>

</head>

<body>

<header>

📦 My Orders

</header>

<div class="container">

<input
type="text"
id="search"
placeholder="Search Order..."
onkeyup="searchOrders()">

<table>

<thead>

<tr>

<th>ID</th>
<th>Service</th>
<th>Quantity</th>
<th>Charge</th>
<th>Status</th>
<th>Date</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

<br>

<button onclick="loadOrders()">

🔄 Refresh

</button>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(localStorage.getItem("user"));

let allOrders = [];
    /* ===========================
   LOAD ORDERS
=========================== */

async function loadOrders(){

try{

const response = await fetch(
API + "/api/orders"
);

const data = await response.json();

if(!data.success){

document.getElementById("ordersTable").innerHTML =
"<tr><td colspan='6'>No Orders Found</td></tr>";

return;

}

allOrders = data.orders.filter(order=>

order.user_id === USER.id

);

renderOrders(allOrders);

}catch(err){

document.getElementById("ordersTable").innerHTML =

"<tr><td colspan='6'>"+err.message+"</td></tr>";

}

}

/* ===========================
   RENDER ORDERS
=========================== */

function renderOrders(list){

const table =
document.getElementById("ordersTable");

table.innerHTML = "";

if(list.length===0){

table.innerHTML =
"<tr><td colspan='6'>No Orders Found</td></tr>";

return;

}

list.forEach(order=>{

let statusClass = "";

switch(order.status){

case "Pending":
statusClass="pending";
break;

case "Processing":
statusClass="processing";
break;

case "Completed":
statusClass="completed";
break;

default:
statusClass="cancelled";

}

table.innerHTML += `

<tr>

<td>${order.id}</td>

<td>${order.service_id}</td>

<td>${order.quantity}</td>

<td>₹${order.charge}</td>

<td>

<span class="${statusClass}">
${order.status}
</span>

</td>

<td>

${new Date(order.created_at)
.toLocaleDateString()}

</td>

</tr>

`;

});

}
    /* ===========================
   SEARCH ORDERS
=========================== */

function searchOrders(){

const keyword =
document.getElementById("search")
.value.toLowerCase();

const filtered = allOrders.filter(order=>

String(order.id).includes(keyword) ||

String(order.service_id)
.toLowerCase()
.includes(keyword) ||

String(order.status)
.toLowerCase()
.includes(keyword)

);

renderOrders(filtered);

}

/* ===========================
   LOGIN CHECK
=========================== */

if(!localStorage.getItem("token")){

location.href="login.html";

}

/* ===========================
   AUTO REFRESH
=========================== */

setInterval(loadOrders,30000);

/* ===========================
   WINDOW LOAD
=========================== */

window.onload=function(){

loadOrders();

};
    /* ===========================
   BUTTON ANIMATION
=========================== */

document.querySelector("button").addEventListener("mouseenter",function(){

    this.style.transform="scale(1.05)";
    this.style.transition=".2s";

});

document.querySelector("button").addEventListener("mouseleave",function(){

    this.style.transform="scale(1)";

});

/* ===========================
   PAGE READY
=========================== */

console.log("Order History Loaded");

</script>

</body>

</html>
