<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order History</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    background:#111827;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

header{
    background:#1f2937;
    padding:20px;
    text-align:center;
}

main{
    padding:20px;
}

.card{
    background:#1f2937;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.3);
}

.card h3{
    color:#00d4ff;
    margin-bottom:10px;
}

.card p{
    margin:6px 0;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00d4ff;
    color:#111827;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#00b5d8;
}
</style>

</head>

<body>

<header>
<h1>📜 Order History</h1>
</header>

<main>

<div id="orders">
Loading...
</div>

<br>

<button onclick="location.href='dashboard.html'">
🏠 Dashboard
</button>

</main>

<script>

async function loadOrders(){

try{

const response=await fetch(
"https://gowind-smm-panel-v3.onrender.com/api/orders"
);

const data=await response.json();

let html="";

if(!data.orders || data.orders.length===0){

html="<h3>No Orders Found</h3>";

}else{

data.orders.forEach(order=>{

html+=`
<div class="card">

<h3>Order #${order.id}</h3>

<p><b>Service ID:</b> ${order.service_id}</p>

<p><b>Link:</b><br>${order.link}</p>

<p><b>Quantity:</b> ${order.quantity}</p>

<p><b>Charge:</b> ₹${order.charge}</p>

<p><b>Status:</b> ${order.status}</p>

<p><b>Date:</b> ${new Date(order.created_at).toLocaleString()}</p>

</div>
`;

});

}

document.getElementById("orders").innerHTML=html;

}catch(err){

document.getElementById("orders").innerHTML=
"❌ Error: "+err.message;

}

}

loadOrders();

</script>

</body>
</html>
