<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Order History</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
}

.container{
width:98%;
max-width:1400px;
margin:20px auto;
padding:15px;
}

.header{
background:#1e293b;
padding:20px;
border-radius:12px;
text-align:center;
margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,.35);
}

.header h2{
font-size:32px;
margin-bottom:8px;
}

.header p{
color:#94a3b8;
font-size:15px;
}

.search{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
margin-bottom:15px;
outline:none;
}

.actions{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.actions button{
flex:1;
min-width:140px;
padding:13px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
color:#fff;
transition:.2s;
}

.refresh{
background:#2563eb;
}

.back{
background:#475569;
}

.actions button:hover{
transform:scale(1.03);
}

.table-container{
width:100%;
overflow-x:auto;
-webkit-overflow-scrolling:touch;
}

table{
width:100%;
min-width:900px;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

th{
background:#334155;
padding:14px;
text-align:center;
}

td{
padding:14px;
text-align:center;
border-bottom:1px solid #334155;
}

.pending{
background:#f59e0b;
color:#000;
padding:5px 10px;
border-radius:6px;
font-weight:bold;
}

.processing{
background:#3b82f6;
padding:5px 10px;
border-radius:6px;
font-weight:bold;
}

.completed{
background:#22c55e;
padding:5px 10px;
border-radius:6px;
font-weight:bold;
}

.cancelled{
background:#ef4444;
padding:5px 10px;
border-radius:6px;
font-weight:bold;
}

@media(max-width:600px){

.header h2{
font-size:24px;
}

.actions{
flex-direction:column;
}

table{
min-width:750px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>📜 Order History</h2>

<p>Your Previous Orders</p>

</div>
<input

class="search"

id="search"

type="text"

placeholder="Search Service or Status..."

onkeyup="searchOrders()">

<div class="actions">

<button
class="refresh"
onclick="loadOrders()">

🔄 Refresh

</button>

<button
class="back"
onclick="location.href='userdashboard.html'">

⬅ Back

</button>

</div>

<div class="table-container">

<table>

<thead>

<tr>

<th>ID</th>

<th>Service</th>

<th>Link</th>

<th>Quantity</th>

<th>Charge</th>

<th>Status</th>

<th>Date</th>

</tr>

</thead>

<tbody id="ordersTable">

<tr>

<td colspan="7">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(localStorage.getItem("user"));

let allOrders = [];
    /* ===========================
   LOGIN CHECK
=========================== */

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER){

location.href="login.html";

}

/* ===========================
   LOAD ORDERS
=========================== */

async function loadOrders(){

try{

const response = await fetch(

API + "/api/orders/user/" + USER.id

);

const data = await response.json();

const table =

document.getElementById("ordersTable");

if(!data.success){

table.innerHTML=

"<tr><td colspan='7'>No Orders Found</td></tr>";

return;

}

allOrders = data.orders || [];

renderOrders(allOrders);

}catch(err){

document.getElementById("ordersTable").innerHTML=

"<tr><td colspan='7'>"+err.message+"</td></tr>";

}

    }
    /* ===========================
   RENDER ORDERS
=========================== */

function renderOrders(list){

const table =
document.getElementById("ordersTable");

table.innerHTML = "";

if(list.length===0){

table.innerHTML=

"<tr><td colspan='7'>No Orders Found</td></tr>";

return;

}

list.forEach(order=>{

let statusClass="pending";

if(order.status==="Processing"){

statusClass="processing";

}else if(order.status==="Completed"){

statusClass="completed";

}else if(order.status==="Cancelled"){

statusClass="cancelled";

}

table.innerHTML += `

<tr>

<td>${order.id}</td>

<td>${order.service_name || "-"}</td>

<td style="max-width:220px;word-break:break-all;">

${order.link || "-"}

</td>

<td>${order.quantity}</td>

<td>₹${Number(order.charge).toFixed(2)}</td>

<td>

<span class="${statusClass}">

${order.status}

</span>

</td>

<td>

${new Date(order.created_at).toLocaleDateString()}

</td>

</tr>

`;

});

}

/* ===========================
   SEARCH
=========================== */

function searchOrders(){

const keyword =

document.getElementById("search")
.value
.toLowerCase();

const filtered = allOrders.filter(order=>

String(order.id).includes(keyword)

||

String(order.service_name || "")
.toLowerCase()
.includes(keyword)

||

String(order.status || "")
.toLowerCase()
.includes(keyword)

);

renderOrders(filtered);

    }
    /* ===========================
   AUTO REFRESH
=========================== */

setInterval(loadOrders,30000);

/* ===========================
   WINDOW LOAD
=========================== */

window.onload=function(){

loadOrders();

};

/* ===========================
   BUTTON ANIMATION
=========================== */

document.querySelectorAll("button").forEach(btn=>{

btn.addEventListener("mouseenter",function(){

this.style.transform="scale(1.03)";
this.style.transition=".2s";

});

btn.addEventListener("mouseleave",function(){

this.style.transform="scale(1)";

});

});

/* ===========================
   SHORTCUT KEYS
=========================== */

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="r"){

e.preventDefault();

loadOrders();

}

if(e.key==="Escape"){

location.href="userdashboard.html";

}

});

/* ===========================
   PAGE READY
=========================== */

console.log("Order History Ready");

</script>

</body>

</html>
