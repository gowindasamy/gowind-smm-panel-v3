<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Orders</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
}

header{

background:#1e293b;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
box-shadow:0 2px 10px rgba(0,0,0,.4);

}

.container{

width:100%;
max-width:100%;
padding:15px;
margin:auto;

}

input{

width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
margin-bottom:15px;

}

.table-container{

width:100%;
overflow-x:auto;
-webkit-overflow-scrolling:touch;
margin-top:10px;

}

table{

width:100%;
min-width:750px;
border-collapse:collapse;
background:#1e293b;
border-radius:8px;
overflow:hidden;

}

th{

background:#334155;
padding:14px;
text-align:center;

}

td{

padding:12px;
text-align:center;
border-bottom:1px solid #475569;
white-space:nowrap;

}

.pending{

background:#f59e0b;
padding:5px 10px;
border-radius:5px;
color:#000;

}

.processing{

background:#3b82f6;
padding:5px 10px;
border-radius:5px;

}

.completed{

background:#22c55e;
padding:5px 10px;
border-radius:5px;

}

.cancelled{

background:#ef4444;
padding:5px 10px;
border-radius:5px;

}

button{

margin-top:15px;
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;

}

button:hover{

background:#1d4ed8;

}

</style>

</head>

<body>

<header>

📦 My Orders

</header>

<div class="container">

<input
type="text"
id="search"
placeholder="Search Order..."
onkeyup="searchOrders()">

<div class="table-container">

<table>

<thead>

<tr>

<th>ID</th>
<th>Service</th>
<th>Quantity</th>
<th>Charge</th>
<th>Status</th>
<th>Date</th>

</tr>

</thead>

<tbody id="ordersTable">

<tr>

<td colspan="6">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<button onclick="loadOrders()">

Refresh

</button>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(localStorage.getItem("user"));

let allOrders = [];
    /* ===========================
   LOAD ORDERS
=========================== */

async function loadOrders(){

try{

const response = await fetch(
API + "/api/orders"
);

const data = await response.json();

const table =
document.getElementById("ordersTable");

if(!data.success){

table.innerHTML =
"<tr><td colspan='6'>No Orders Found</td></tr>";

return;

}

allOrders = data.orders.filter(order=>

order.user_id == USER.id

);

renderOrders(allOrders);

}catch(err){

document.getElementById("ordersTable").innerHTML=

"<tr><td colspan='6'>"+err.message+"</td></tr>";

}

}

/* ===========================
   RENDER ORDERS
=========================== */

function renderOrders(list){

const table =
document.getElementById("ordersTable");

table.innerHTML = "";

if(list.length===0){

table.innerHTML=

"<tr><td colspan='6'>No Orders Found</td></tr>";

return;

}

list.forEach(order=>{

let statusClass="pending";

if(order.status==="Processing"){

statusClass="processing";

}else if(order.status==="Completed"){

statusClass="completed";

}else if(order.status==="Cancelled"){

statusClass="cancelled";

}

table.innerHTML += `

<tr>

<td>${order.id}</td>

<td>${order.service_id}</td>

<td>${order.quantity}</td>

<td>₹${Number(order.charge).toFixed(2)}</td>

<td>

<span class="${statusClass}">

${order.status}

</span>

</td>

<td>

${new Date(order.created_at)
.toLocaleDateString()}

</td>

</tr>

`;

});

}

/* ===========================
   SEARCH
=========================== */

function searchOrders(){

const keyword =

document.getElementById("search")
.value
.toLowerCase();

const filtered = allOrders.filter(order=>

String(order.id).includes(keyword)

||

String(order.service_id)
.toLowerCase()
.includes(keyword)

||

String(order.status)
.toLowerCase()
.includes(keyword)

);

renderOrders(filtered);

    }
    /* ===========================
   LOGIN CHECK
=========================== */

if(!localStorage.getItem("token")){

location.href="login.html";

}

/* ===========================
   AUTO REFRESH
=========================== */

setInterval(loadOrders,30000);

/* ===========================
   WINDOW LOAD
=========================== */

window.onload=function(){

loadOrders();

};

/* ===========================
   BUTTON ANIMATION
=========================== */

const btn=document.querySelector("button");

btn.addEventListener("mouseenter",function(){

this.style.transform="scale(1.05)";
this.style.transition=".2s";

});

btn.addEventListener("mouseleave",function(){

this.style.transform="scale(1)";

});

/* ===========================
   SHORTCUT KEYS
=========================== */

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="r"){

e.preventDefault();

loadOrders();

}

if(e.key==="Escape"){

history.back();

}

});

/* ===========================
   PAGE READY
=========================== */

console.log("Order History Ready");

</script>

</body>

</html>
