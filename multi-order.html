<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Multi Order</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial,sans-serif;

}

body{

background:#0f172a;

color:#fff;

padding:20px;

}

.container{

max-width:900px;

margin:auto;

background:#1e293b;

padding:25px;

border-radius:20px;

box-shadow:0 0 20px rgba(0,0,0,.35);

}

h1{

text-align:center;

margin-bottom:25px;

color:#38bdf8;

font-size:30px;

}

label{

display:block;

margin-top:18px;

margin-bottom:8px;

font-weight:bold;

font-size:15px;

}

input[type="text"],

input[type="number"]{

width:100%;

padding:14px;

border:none;

outline:none;

border-radius:12px;

background:#334155;

color:#fff;

font-size:15px;

}

input::placeholder{

color:#cbd5e1;

}

.search-box{

margin-top:20px;

}

.switch-row{

display:flex;

justify-content:space-between;

align-items:center;

margin:20px 0;

}
  .switch{

position:relative;

display:inline-block;

width:60px;

height:34px;

}

.switch input{

opacity:0;

width:0;

height:0;

}

.slider{

position:absolute;

cursor:pointer;

top:0;

left:0;

right:0;

bottom:0;

background:#64748b;

transition:.4s;

border-radius:34px;

}

.slider:before{

position:absolute;

content:"";

height:26px;

width:26px;

left:4px;

bottom:4px;

background:white;

transition:.4s;

border-radius:50%;

}

input:checked + .slider{

background:#22c55e;

}

input:checked + .slider:before{

transform:translateX(26px);

}

.services{

margin-top:15px;

background:#0f172a;

border:1px solid #334155;

border-radius:15px;

max-height:400px;

overflow-y:auto;

}

.service-item{

display:flex;

align-items:center;

padding:14px;

border-bottom:1px solid #334155;

}

.service-item:last-child{

border-bottom:none;

}

.service-item input{

width:20px;

height:20px;

margin-right:15px;

}

.service-name{

flex:1;

font-size:15px;

}
  .selected-count{

margin-top:20px;

font-size:16px;

font-weight:bold;

color:#38bdf8;

}

.place-order{

width:100%;

margin-top:25px;

padding:16px;

border:none;

border-radius:14px;

background:#22c55e;

color:#fff;

font-size:17px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

.place-order:hover{

background:#16a34a;

}

</style>

</head>

<body>

<div class="container">

<h1>Multi Order</h1>

<label>Link</label>

<input
type="text"
id="link"
placeholder="Paste Link">

<label>Quantity</label>

<input
type="number"
id="quantity"
placeholder="Enter Quantity">

<div class="search-box">

<label>Search Service</label>

<input
type="text"
id="search"
placeholder="Search Service">

</div>

<div class="switch-row">

<span>Select All</span>

<label class="switch">

<input
type="checkbox"
id="selectAll">

<span class="slider"></span>

</label>

</div>

<div
class="services"
id="services">

</div>

<div
class="selected-count"
id="selectedCount">

Selected : 0 Services

</div>

<button
class="place-order"
id="placeOrder">

Place All Orders

</button>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";
  const servicesDiv =
document.getElementById("services");

const search =
document.getElementById("search");

const selectAll =
document.getElementById("selectAll");

const selectedCount =
document.getElementById("selectedCount");

const placeOrder =
document.getElementById("placeOrder");

let allServices = [];

async function loadServices(){

const res =
await fetch(
API + "/api/services"
);

const data =
await res.json();

allServices =
data.services || [];

renderServices(allServices);

}

function renderServices(list){

servicesDiv.innerHTML = "";

list.forEach(service=>{

servicesDiv.innerHTML += `

<div class="service-item">

<input
type="checkbox"
class="serviceCheck"
value="${service.id}">

<div class="service-name">

${service.name}

</div>

</div>

`;

});

updateCount();

}

loadServices();
  search.addEventListener("input",()=>{

const value =
search.value.toLowerCase();

const filtered =
allServices.filter(service=>

service.name
.toLowerCase()
.includes(value)

);

renderServices(filtered);

});

selectAll.addEventListener("change",()=>{

document
.querySelectorAll(".serviceCheck")
.forEach(box=>{

box.checked =
selectAll.checked;

});

updateCount();

});

document.addEventListener("change",e=>{

if(
e.target.classList.contains("serviceCheck")
){

updateCount();

}

});

function updateCount(){

const total =
document
.querySelectorAll(
".serviceCheck:checked"
).length;

selectedCount.innerText =
"Selected : " +
total +
" Services";

  }
  placeOrder.addEventListener("click",async()=>{

const link =
document.getElementById("link").value.trim();

const quantity =
document.getElementById("quantity").value;

if(!link || !quantity){

alert("Enter Link & Quantity");

return;

}

const user =
JSON.parse(
localStorage.getItem("user")
);

if(!user){

alert("Please Login");

return;

}

const selected =
document.querySelectorAll(
".serviceCheck:checked"
);

if(selected.length===0){

alert("Select at least one service");

return;

}

for(const item of selected){

await fetch(
API + "/api/orders",
{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:JSON.stringify({

user_id:user.id,

service_id:item.value,

link:link,

quantity:quantity

})

});

}

alert("All Orders Placed Successfully");

});
  </script>

</body>

</html>
