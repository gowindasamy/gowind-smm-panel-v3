<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Provider Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.card h2{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
outline:none;
font-size:15px;
}

button{
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
margin:5px;
}

.add{
background:#22c55e;
color:white;
}

.import{
background:#2563eb;
color:white;
}

.balance{
background:#f59e0b;
color:white;
}

.delete{
background:#dc2626;
color:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:#334155;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #475569;
text-align:center;
}

.status{
margin-top:15px;
text-align:center;
font-weight:bold;
font-size:18px;
}

</style>

</head>

<body>

<header>

🌐 Provider Management

</header>

<div class="container">

<div class="card">

<h2>Add Provider</h2>

<input
type="text"
id="name"
placeholder="Provider Name">

<input
type="text"
id="url"
placeholder="API URL">

<input
type="text"
id="key"
placeholder="API Key">

<button
class="add"
onclick="addProvider()">

Add Provider

</button>

</div>

<div class="card">

<h2>Provider List</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="providerTable">

</tbody>

</table>

</div>

<div
id="result"
class="status">

Ready...

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";
   /* ===========================
   LOAD PROVIDERS
=========================== */

async function loadProviders(){

try{

const response = await fetch(
API + "/api/providers"
);

const data = await response.json();

const table =
document.getElementById("providerTable");

table.innerHTML = "";

data.providers.forEach(provider=>{

table.innerHTML += `

<tr>

<td>${provider.id}</td>

<td>${provider.name}</td>

<td>

${provider.status
? "🟢 Active"
: "🔴 Disabled"}

</td>

<td>

<button
class="import"
onclick="importServices(${provider.id})">

Import

</button>

<button
class="balance"
onclick="checkBalance(${provider.id})">

Balance

</button>

<button
class="delete"
onclick="deleteProvider(${provider.id})">

Delete

</button>

</td>

</tr>

`;

});

}catch(err){

document.getElementById("result").innerHTML =
err.message;

}

}

/* ===========================
   ADD PROVIDER
=========================== */

async function addProvider(){

const name =
document.getElementById("name").value;

const url =
document.getElementById("url").value;

const key =
document.getElementById("key").value;

if(!name || !url || !key){

document.getElementById("result").innerHTML =
"Please fill all fields";

return;

}

const response = await fetch(

API + "/api/providers",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:name,
api_url:url,
api_key:key

})

}

);

const data =
await response.json();

document.getElementById("result").innerHTML =
data.message;

document.getElementById("name").value="";
document.getElementById("url").value="";
document.getElementById("key").value="";

loadProviders();

}
   /* ===========================
   IMPORT SERVICES
=========================== */

async function importServices(providerId){

document.getElementById("result").innerHTML =
"⏳ Importing services...";

try{

const response = await fetch(

API + "/api/providers/import",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

provider_id:providerId

})

}

);

const data = await response.json();

if(data.success){

document.getElementById("result").innerHTML =

"✅ Imported " +
data.imported +
" Services Successfully";

}else{

document.getElementById("result").innerHTML =

"❌ " +
(data.error || data.message);

}

}catch(err){

document.getElementById("result").innerHTML =
err.message;

}

}

/* ===========================
   PROVIDER BALANCE
=========================== */

async function checkBalance(providerId){

document.getElementById("result").innerHTML =
"⏳ Checking Balance...";

try{

const response = await fetch(

API +
"/api/providers/" +
providerId +
"/balance"

);

const data = await response.json();

if(data.balance){

document.getElementById("result").innerHTML =

"💰 Balance : " +
data.balance +
" " +
(data.currency || "");

}else{

document.getElementById("result").innerHTML =

JSON.stringify(data);

}

}catch(err){

document.getElementById("result").innerHTML =
err.message;

}

   }
   /* ===========================
   DELETE PROVIDER
=========================== */

async function deleteProvider(providerId){

const ok = confirm(
"Delete this provider?"
);

if(!ok){
return;
}

try{

const response = await fetch(

API + "/api/providers/" + providerId,

{
method:"DELETE"
}

);

const data =
await response.json();

document.getElementById("result").innerHTML =
data.message || data.error;

loadProviders();

}catch(err){

document.getElementById("result").innerHTML =
err.message;

}

}

/* ===========================
   PAGE LOAD
=========================== */

loadProviders();

/* ===========================
   AUTO REFRESH
=========================== */

setInterval(loadProviders,30000);

</script>

</body>
</html>
