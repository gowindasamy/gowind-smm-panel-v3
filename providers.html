<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Provider Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#08111f;

background-image:
radial-gradient(circle at top left,
rgba(147,51,234,.18),
transparent 35%),

radial-gradient(circle at top right,
rgba(6,182,212,.15),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(37,99,235,.18),
transparent 40%);

color:#fff;

min-height:100vh;

}

.container{

width:95%;

max-width:1450px;

margin:18px auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

padding:16px 18px;

margin-bottom:18px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

box-shadow:
0 10px 30px rgba(0,0,0,.25),
0 0 20px rgba(37,99,235,.18);

}

.title h2{

font-size:28px;

font-weight:700;

background:linear-gradient(
90deg,
#3b82f6,
#06b6d4);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.status{

display:flex;

align-items:center;

gap:6px;

margin-top:6px;

font-size:12px;

font-weight:600;

color:#22c55e;

}

.status-dot{

width:8px;

height:8px;

border-radius:50%;

background:#22c55e;

box-shadow:0 0 10px #22c55e;

}

.actions{

display:flex;

gap:10px;

}

.action-btn{

width:44px;

height:44px;

border:none;

border-radius:50%;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:17px;

cursor:pointer;

transition:.3s;

}

.action-btn:hover{

background:#2563eb;

transform:scale(1.08);

box-shadow:0 0 18px rgba(37,99,235,.35);

}

.search{

width:100%;

padding:15px;

margin-bottom:18px;

border:none;

outline:none;

border-radius:14px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:16px;

transition:.3s;

}

.search::placeholder{

color:#94a3b8;

}

.search:focus{

border-color:#3b82f6;

box-shadow:0 0 18px rgba(59,130,246,.35);

}

.card{

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

padding:20px;

margin-bottom:18px;

box-shadow:
0 10px 30px rgba(0,0,0,.25);

}

.card h3{

margin-bottom:16px;

font-size:20px;

font-weight:600;

}
   .card input{

width:100%;

padding:14px;

margin-bottom:14px;

border:none;

outline:none;

border-radius:12px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:15px;

transition:.3s;

}

.card input::placeholder{

color:#94a3b8;

}

.card input:focus{

border-color:#3b82f6;

box-shadow:0 0 18px rgba(59,130,246,.35);

}

.add-btn{

width:100%;

padding:15px;

border:none;

border-radius:14px;

cursor:pointer;

font-size:16px;

font-weight:600;

color:#fff;

background:linear-gradient(
90deg,
#2563eb,
#8b5cf6,
#06b6d4);

transition:.3s;

}

.add-btn:hover{

transform:translateY(-2px);

box-shadow:0 0 25px rgba(59,130,246,.35);

}

.table-card{

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

overflow:auto;

box-shadow:0 10px 30px rgba(0,0,0,.25);

}

table{

width:100%;

min-width:900px;

border-collapse:collapse;

}

th{

padding:16px;

background:rgba(59,130,246,.18);

text-align:center;

font-size:15px;

font-weight:600;

}

td{

padding:15px;

text-align:center;

border-top:1px solid rgba(255,255,255,.08);

}

.balance{

background:#f59e0b;

color:#fff;

border:none;

padding:8px 14px;

border-radius:8px;

cursor:pointer;

margin:2px;

font-weight:600;

}

.delete{

background:#ef4444;

color:#fff;

border:none;

padding:8px 14px;

border-radius:8px;

cursor:pointer;

margin:2px;

font-weight:600;

}

.balance:hover,
.delete:hover{

transform:translateY(-2px);

}

.status-active{

color:#22c55e;

font-weight:bold;

}

.status-disabled{

color:#ef4444;

font-weight:bold;

}

.message{

margin-top:18px;

text-align:center;

font-weight:600;

color:#94a3b8;

}

@media(max-width:768px){

table{

min-width:850px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">

<h2 id="siteName">

Loading...

</h2>

<div class="status">

<div class="status-dot"></div>

<span>ACTIVE</span>

</div>

</div>

<div class="actions">

<button
class="action-btn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<button
class="action-btn"
onclick="loadProviders()">

<i class="fa-solid fa-rotate-right"></i>

</button>

<button
class="action-btn"
onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

</div>

</div>

<input

class="search"

id="search"

type="text"

placeholder="Search Provider..."

onkeyup="searchProviders()">
<div class="card">

<h3>

Add Provider

</h3>

<input
id="name"
type="text"
placeholder="Provider Name">

<input
id="url"
type="text"
placeholder="API URL">

<input
id="key"
type="text"
placeholder="API Key">

<button
class="add-btn"
onclick="addProvider()">

<i class="fa-solid fa-plus"></i>

Add Provider

</button>

</div>

<div class="table-card">

<table>

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="providerTable">

<tr>

<td colspan="4">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<div
class="message"
id="result">

Ready...

</div>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(
localStorage.getItem("user")
);

let allProviders=[];

/* ===========================
   LOGIN CHECK
=========================== */

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER || USER.role!=="admin"){

location.href="login.html";

}

/* ===========================
   LOAD SETTINGS
=========================== */

async function loadSettings(){

try{

const response=
await fetch(API+"/api/settings");

const data=
await response.json();

if(data.success){

document.getElementById("siteName").textContent=
data.settings.site_name;

}

}catch(err){

console.log(err);

}

}

/* ===========================
   LOAD PROVIDERS
=========================== */

async function loadProviders(){

try{

const response=
await fetch(API+"/api/providers");

const data=
await response.json();

if(!data.success){

document.getElementById("providerTable").innerHTML=

"<tr><td colspan='4'>No Providers Found</td></tr>";

return;

}

allProviders=data.providers||[];

renderProviders(allProviders);

}catch(err){

document.getElementById("providerTable").innerHTML=

"<tr><td colspan='4'>"+err.message+"</td></tr>";

}

}
   function renderProviders(list){

const table =
document.getElementById("providerTable");

table.innerHTML="";

if(list.length===0){

table.innerHTML=
"<tr><td colspan='4'>No Providers Found</td></tr>";

return;

}

list.forEach(provider=>{

table.innerHTML+=`

<tr>

<td>${provider.id}</td>

<td>${provider.name}</td>

<td>

<span class="${
provider.status
? "status-active"
: "status-disabled"
}">

${provider.status
? "🟢 Active"
: "🔴 Disabled"}

</span>

</td>

<td>

<button
class="balance"
onclick="checkBalance(${provider.id})">

Balance

</button>

<button
class="delete"
onclick="deleteProvider(${provider.id})">

Delete

</button>

</td>

</tr>

`;

});

}

function searchProviders(){

const keyword=

document.getElementById("search")

.value

.toLowerCase();

renderProviders(

allProviders.filter(provider=>

String(provider.id)

.includes(keyword)

||

provider.name

.toLowerCase()

.includes(keyword)

)

);

}

async function addProvider(){

const name=
document.getElementById("name").value.trim();

const url=
document.getElementById("url").value.trim();

const key=
document.getElementById("key").value.trim();

if(!name || !url || !key){

document.getElementById("result").textContent=
"Please fill all fields";

return;

}

try{

const response=

await fetch(API+"/api/providers",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

name,

api_url:url,

api_key:key

})

});

const data=
await response.json();

document.getElementById("result").textContent=

data.message || data.error;

document.getElementById("name").value="";

document.getElementById("url").value="";

document.getElementById("key").value="";

loadProviders();

}catch(err){

document.getElementById("result").textContent=
err.message;

}

}

async function checkBalance(id){

document.getElementById("result").textContent=
"Checking Provider Balance...";

try{

const response=

await fetch(API+"/api/providers/"+id+"/balance");

const data=
await response.json();

if(data.balance){

document.getElementById("result").textContent=

"Balance : "+

data.balance+

" "+

(data.currency || "");

}else{

document.getElementById("result").textContent=

data.message ||

JSON.stringify(data);

}

}catch(err){

document.getElementById("result").textContent=

err.message;

}

}

async function deleteProvider(id){

if(!confirm("Delete this provider?")) return;

try{

const response=

await fetch(API+"/api/providers/"+id,{

method:"DELETE"

});

const data=
await response.json();

document.getElementById("result").textContent=

data.message ||

data.error;

loadProviders();

}catch(err){

document.getElementById("result").textContent=

err.message;

}

}

function logout(){

localStorage.removeItem("token");

localStorage.removeItem("user");

location.href="login.html";

}

window.onload=function(){

loadSettings();

loadProviders();

};

setInterval(loadProviders,30000);

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

history.back();

}

if(e.ctrlKey && e.key==="r"){

e.preventDefault();

loadProviders();

}

});

</script>

</body>

</html>
