<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Provider Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

.container{
width:100%;
max-width:1400px;
margin:auto;
padding:15px;
}

.header{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
margin-bottom:20px;
}

.header h2{
font-size:30px;
}

.search{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
margin-bottom:15px;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.actions button{
flex:1;
min-width:140px;
padding:13px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
color:white;
}

.refresh{
background:#7c3aed;
}

.add{
background:#22c55e;
}

.table-container{
width:100%;
overflow-x:auto;
-webkit-overflow-scrolling:touch;
}

table{
width:100%;
min-width:850px;
border-collapse:collapse;
background:#1e293b;
}

th{
background:#334155;
padding:14px;
text-align:center;
}

td{
padding:14px;
text-align:center;
border-bottom:1px solid #334155;
white-space:nowrap;
}

.balance{
background:#f59e0b;
color:#fff;
font-weight:bold;
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
margin:3px;
}

.delete{
background:#dc2626;
color:#fff;
font-weight:bold;
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
margin:3px;
}

.status-active{
color:#22c55e;
font-weight:bold;
}

.status-disabled{
color:#ef4444;
font-weight:bold;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.card h3{
margin-bottom:15px;
}

.card input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:15px;
}

.card button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

.message{
margin-top:15px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>

🌐 Provider Management

</h2>

</div>

<input

class="search"

id="search"

type="text"

placeholder="Search Provider..."

onkeyup="searchProviders()">

<div class="actions">

<button

class="refresh"

onclick="loadProviders()">

Refresh

</button>

</div>

<div class="card">

<h3>

Add Provider

</h3>

<input
id="name"
placeholder="Provider Name">

<input
id="url"
placeholder="API URL">

<input
id="key"
placeholder="API Key">

<button
onclick="addProvider()">

Add Provider

</button>

</div>

<div class="table-container">

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="providerTable">

<tr>

<td colspan="4">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<div
class="message"
id="result">

Ready...

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

let allProviders = [];
   /* ===========================
   LOGIN CHECK
=========================== */

const USER = JSON.parse(localStorage.getItem("user"));

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER || USER.role!=="admin"){

location.href="login.html";

}

/* ===========================
   LOAD PROVIDERS
=========================== */

async function loadProviders(){

try{

const response=await fetch(
API+"/api/providers"
);

const data=await response.json();

if(!data.success){

document.getElementById("providerTable").innerHTML=

"<tr><td colspan='4'>No Providers Found</td></tr>";

return;

}

allProviders=data.providers;

renderProviders(allProviders);

}catch(err){

document.getElementById("providerTable").innerHTML=

"<tr><td colspan='4'>"+err.message+"</td></tr>";

}

}

/* ===========================
   RENDER TABLE
=========================== */

function renderProviders(list){

const table=
document.getElementById("providerTable");

table.innerHTML="";

if(list.length===0){

table.innerHTML=

"<tr><td colspan='4'>No Providers Found</td></tr>";

return;

}

list.forEach(provider=>{

table.innerHTML+=`

<tr>

<td>${provider.id}</td>

<td>${provider.name}</td>

<td>

<span class="${
provider.status
? "status-active"
: "status-disabled"
}">

${provider.status
? "🟢 Active"
: "🔴 Disabled"}

</span>

</td>

<td>

<button
class="balance"
onclick="checkBalance(${provider.id})">

💰 Balance

</button>

<button
class="delete"
onclick="deleteProvider(${provider.id})">

🗑 Delete

</button>

</td>

</tr>

`;

});

}

/* ===========================
   SEARCH PROVIDERS
=========================== */

function searchProviders(){

const keyword=

document.getElementById("search")
.value
.toLowerCase();

const filtered=

allProviders.filter(provider=>

provider.name
.toLowerCase()
.includes(keyword)

||

String(provider.id)
.includes(keyword)

);

renderProviders(filtered);

                    }
   /* ===========================
   ADD PROVIDER
=========================== */

async function addProvider(){

const name=
document.getElementById("name").value.trim();

const url=
document.getElementById("url").value.trim();

const key=
document.getElementById("key").value.trim();

if(!name || !url || !key){

document.getElementById("result").innerHTML=
"⚠️ Please fill all fields";

return;

}

try{

const response=await fetch(

API+"/api/providers",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:name,
api_url:url,
api_key:key

})

}

);

const data=await response.json();

document.getElementById("result").innerHTML=

data.message || data.error;

document.getElementById("name").value="";
document.getElementById("url").value="";
document.getElementById("key").value="";

loadProviders();

}catch(err){

document.getElementById("result").innerHTML=

err.message;

}

}

/* ===========================
   CHECK BALANCE
=========================== */

async function checkBalance(providerId){

document.getElementById("result").innerHTML=
"⏳ Checking Provider Balance...";

try{

const response=await fetch(

API+
"/api/providers/"+
providerId+
"/balance"

);

const data=await response.json();

if(data.balance){

document.getElementById("result").innerHTML=

"💰 Balance : "+
data.balance+
" "+
(data.currency || "");

}else{

document.getElementById("result").innerHTML=

data.message ||
JSON.stringify(data);

}

}catch(err){

document.getElementById("result").innerHTML=

err.message;

}

}

/* ===========================
   DELETE PROVIDER
=========================== */

async function deleteProvider(providerId){

const ok=confirm(
"Delete this provider?"
);

if(!ok){

return;

}

try{

const response=await fetch(

API+"/api/providers/"+providerId,

{
method:"DELETE"
}

);

const data=await response.json();

document.getElementById("result").innerHTML=

data.message || data.error;

loadProviders();

}catch(err){

document.getElementById("result").innerHTML=

err.message;

}

}

/* ===========================
   REFRESH
=========================== */

function refreshProviders(){

loadProviders();

   }
   /* ===========================
   WINDOW LOAD
=========================== */

window.onload=function(){

loadProviders();

};

/* ===========================
   AUTO REFRESH
=========================== */

setInterval(loadProviders,30000);

/* ===========================
   BUTTON ANIMATION
=========================== */

document.addEventListener("mouseover",function(e){

if(e.target.tagName==="BUTTON"){

e.target.style.transform="scale(1.03)";
e.target.style.transition=".2s";

}

});

document.addEventListener("mouseout",function(e){

if(e.target.tagName==="BUTTON"){

e.target.style.transform="scale(1)";

}

});

/* ===========================
   SHORTCUT KEYS
=========================== */

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="r"){

e.preventDefault();

loadProviders();

}

if(e.key==="Escape"){

document.getElementById("name").value="";
document.getElementById("url").value="";
document.getElementById("key").value="";

document.getElementById("result").innerHTML=
"Ready...";

}

});

/* ===========================
   PAGE READY
=========================== */

console.log("Providers Management Ready");

</script>

</body>

</html>
