<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orders</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:#fff;
}

header{
background:#1e293b;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
width:95%;
margin:auto;
padding:20px;
}

.search{

margin-bottom:20px;

}

.search input{

width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;

}

table{

width:100%;
border-collapse:collapse;

}

th{

background:#334155;
padding:12px;

}

td{

padding:10px;
text-align:center;
border-bottom:1px solid #475569;

}

.status{

padding:6px 10px;
border-radius:5px;
font-weight:bold;

}

.pending{
background:#f59e0b;
color:#000;
}

.completed{
background:#22c55e;
}

.processing{
background:#3b82f6;
}

.cancelled{
background:#ef4444;
}

button{

padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:white;
margin-top:20px;

}

</style>

</head>

<body>

<header>

📦 Orders Management

</header>

<div class="container">

<div class="search">

<input
type="text"
id="search"
placeholder="Search Order ID / User"
onkeyup="searchOrders()">

</div>

<table>

<thead>

<tr>

<th>ID</th>

<th>User</th>

<th>Service</th>

<th>Quantity</th>

<th>Charge</th>

<th>Status</th>

<th>Provider Order</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

<button onclick="loadOrders()">

🔄 Refresh

</button>
<button
style="background:#ef4444"
onclick="logout()">

🚪 Logout

</button>
<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";
  /* ===========================
   LOAD ORDERS
=========================== */

let allOrders = [];

async function loadOrders(){

try{

const response = await fetch(
API + "/api/orders"
);

const data = await response.json();

allOrders = data.orders || [];

renderOrders(allOrders);

}catch(err){

console.log(err);

document.getElementById("ordersTable").innerHTML =

`<tr>
<td colspan="7">
Failed to load orders
</td>
</tr>`;

}

}

/* ===========================
   RENDER TABLE
=========================== */

function renderOrders(list){

const table =
document.getElementById("ordersTable");

table.innerHTML = "";

if(list.length===0){

table.innerHTML =

`<tr>
<td colspan="7">
No Orders Found
</td>
</tr>`;

return;

}

list.forEach(order=>{

let cls="pending";

if(order.status==="Completed")
cls="completed";

else if(order.status==="Processing")
cls="processing";

else if(order.status==="Cancelled")
cls="cancelled";

table.innerHTML += `

<tr>

<td>${order.id}</td>

<td>${order.user_id}</td>

<td>${order.service_id}</td>

<td>${order.quantity}</td>

<td>₹ ${order.charge}</td>

<td>

<span class="${cls}">
${order.status}
</span>

</td>

<td>

${order.provider_order_id || "-"}

</td>

</tr>

`;

});

}
  /* ===========================
   SEARCH ORDERS
=========================== */

function searchOrders(){

const keyword =
document.getElementById("search")
.value
.toLowerCase();

const filtered = allOrders.filter(order =>

String(order.id)
.includes(keyword)

||

String(order.user_id)
.toLowerCase()
.includes(keyword)

||

String(order.service_id)
.toLowerCase()
.includes(keyword)

||

String(order.status)
.toLowerCase()
.includes(keyword)

);

renderOrders(filtered);

}

/* ===========================
   PAGE LOAD
=========================== */

loadOrders();

/* ===========================
   AUTO REFRESH
=========================== */

setInterval(loadOrders,30000);

/* ===========================
   LOGOUT
=========================== */

function logout(){

localStorage.removeItem("token");
localStorage.removeItem("user");

location.href="login.html";

}
