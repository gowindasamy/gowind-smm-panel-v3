<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Orders Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial,sans-serif;

}

body{

background:#08111f;

background-image:
radial-gradient(circle at top left,
rgba(147,51,234,.18),
transparent 35%),

radial-gradient(circle at top right,
rgba(6,182,212,.15),
transparent 35%),

radial-gradient(circle at bottom right,
rgba(37,99,235,.18),
transparent 40%);

color:#fff;

min-height:100vh;

}

.container{

width:95%;

max-width:1400px;

margin:18px auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

padding:16px 18px;

margin-bottom:18px;

border-radius:18px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 10px 30px rgba(0,0,0,.25),
0 0 20px rgba(37,99,235,.18);

}

.title h2{

font-size:26px;

font-weight:700;

background:linear-gradient(
90deg,
#3b82f6,
#06b6d4
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.status{

display:flex;

align-items:center;

gap:6px;

margin-top:6px;

font-size:12px;

font-weight:600;

color:#22c55e;

}

.status-dot{

width:8px;

height:8px;

border-radius:50%;

background:#22c55e;

box-shadow:0 0 10px #22c55e;

}

.actions{

display:flex;

gap:10px;

}

.action-btn{

width:44px;

height:44px;

border:none;

border-radius:50%;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

color:#fff;

font-size:17px;

cursor:pointer;

transition:.3s;

}

.action-btn:hover{

background:#2563eb;

transform:scale(1.08);

box-shadow:0 0 18px rgba(37,99,235,.35);

}

.search{

width:100%;

padding:15px;

margin-bottom:18px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

border-radius:14px;

outline:none;

font-size:16px;

color:#fff;

transition:.3s;

}

.search::placeholder{

color:#94a3b8;

}

.search:focus{

border-color:#3b82f6;

box-shadow:0 0 18px rgba(59,130,246,.35);

}
  .refresh-btn{

width:100%;

padding:15px;

margin-bottom:18px;

border:none;

border-radius:14px;

font-size:17px;

font-weight:600;

cursor:pointer;

color:#fff;

background:linear-gradient(
90deg,
#2563eb,
#8b5cf6,
#06b6d4);

transition:.3s;

}

.refresh-btn:hover{

transform:translateY(-2px);

box-shadow:0 0 25px rgba(59,130,246,.35);

}

.table-card{

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.08);

border-radius:18px;

overflow:auto;

}

table{

width:100%;

min-width:1200px;

border-collapse:collapse;

}

th{

padding:16px;

background:rgba(59,130,246,.18);

font-size:15px;

font-weight:600;

text-align:center;

}

td{

padding:15px;

text-align:center;

border-top:1px solid rgba(255,255,255,.08);

}

.pending{

background:#f59e0b;

color:#000;

padding:6px 12px;

border-radius:8px;

font-weight:bold;

}

.processing{

background:#3b82f6;

padding:6px 12px;

border-radius:8px;

font-weight:bold;

}

.completed{

background:#22c55e;

padding:6px 12px;

border-radius:8px;

font-weight:bold;

}

.cancelled{

background:#ef4444;

padding:6px 12px;

border-radius:8px;

font-weight:bold;

}

.delete-btn{

background:#dc2626;

color:#fff;

border:none;

padding:8px 14px;

border-radius:8px;

cursor:pointer;

transition:.3s;

}

.delete-btn:hover{

background:#b91c1c;

}

@media(max-width:768px){

table{

min-width:1150px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">

<h2 id="siteName">

Loading...

</h2>

<div class="status">

<div class="status-dot"></div>

<span>ACTIVE</span>

</div>

</div>

<div class="actions">

<button
class="action-btn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<button
class="action-btn"
onclick="loadOrders()">

<i class="fa-solid fa-rotate-right"></i>

</button>

<button
class="action-btn"
onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

</button>

</div>

</div>

<input
class="search"
id="search"
type="text"
placeholder="Search Orders..."
onkeyup="searchOrders()">

<div class="table-card">
  <table>

<thead>

<tr>

<th>ID</th>

<th>Username</th>

<th>Service</th>

<th>Link</th>

<th>Quantity</th>

<th>Charge</th>

<th>Provider</th>

<th>Provider Order ID</th>

<th>Status</th>

<th>Date</th>

<th>Action</th>

</tr>

</thead>

<tbody id="ordersTable">

<tr>

<td colspan="11">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

<script>

const API =
"https://gowind-smm-panel-v3.onrender.com";

const USER =
JSON.parse(
localStorage.getItem("user")
);

let allOrders = [];

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER || USER.role!=="admin"){

location.href="login.html";

}

async function loadSettings(){

try{

const response=
await fetch(API+"/api/settings");

const data=
await response.json();

if(data.success){

document.getElementById("siteName").textContent=
data.settings.site_name;

}

}catch(err){

console.log(err);

}

}

async function loadOrders(){

try{

const response=
await fetch(API+"/api/orders");

const data=
await response.json();

allOrders=
data.orders || [];

renderOrders(allOrders);

}catch(err){

document.getElementById("ordersTable").innerHTML=

"<tr><td colspan='11'>Failed to load orders</td></tr>";

}

}
  function renderOrders(list){

const table=
document.getElementById("ordersTable");

table.innerHTML="";

if(list.length===0){

table.innerHTML=
"<tr><td colspan='11'>No Orders Found</td></tr>";

return;

}

list.forEach(order=>{

let statusClass="pending";

if(order.status==="Processing"){

statusClass="processing";

}else if(order.status==="Completed"){

statusClass="completed";

}else if(order.status==="Cancelled"){

statusClass="cancelled";

}

const date=new Date(order.created_at);

const day=
String(date.getDate()).padStart(2,"0");

const month=
String(date.getMonth()+1).padStart(2,"0");

const year=
String(date.getFullYear()).slice(-2);

table.innerHTML+=`

<tr>

<td>${order.id}</td>

<td>${order.username||"-"}</td>

<td>${order.service_name||"-"}</td>

<td style="max-width:220px;word-break:break-all;">

${order.link||"-"}

</td>

<td>${order.quantity}</td>

<td>₹${Number(order.charge).toFixed(2)}</td>

<td>${order.provider_name||"-"}</td>

<td>${order.provider_order_id||"-"}</td>

<td>

<span class="${statusClass}">

${order.status}

</span>

</td>

<td>${day}/${month}/${year}</td>

<td>

<button
class="delete-btn"
onclick="deleteOrder(${order.id})">

Delete

</button>

</td>

</tr>

`;

});

}

function searchOrders(){

const keyword=

document.getElementById("search")

.value

.toLowerCase();

const filtered=

allOrders.filter(order=>

String(order.id).includes(keyword)

||

String(order.username||"")

.toLowerCase()

.includes(keyword)

||

String(order.service_name||"")

.toLowerCase()

.includes(keyword)

||

String(order.provider_name||"")

.toLowerCase()

.includes(keyword)

||

String(order.status||"")

.toLowerCase()

.includes(keyword)

);

renderOrders(filtered);

}

async function deleteOrder(id){

if(!confirm("Delete this order?")) return;

try{

const response=
await fetch(API+"/api/orders/"+id,{

method:"DELETE"

});

const data=
await response.json();

alert(data.message);

loadOrders();

}catch(err){

alert(err.message);

}

}

function logout(){

localStorage.removeItem("token");

localStorage.removeItem("user");

location.href="login.html";

}

window.onload=function(){

loadSettings();

loadOrders();

};

setInterval(loadOrders,30000);

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

history.back();

}

if(e.ctrlKey && e.key==="r"){

e.preventDefault();

loadOrders();

}

});

</script>

</body>

</html>
