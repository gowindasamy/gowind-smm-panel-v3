<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Orders Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#0f172a;
color:white;

}

.container{

width:98%;
max-width:1400px;
margin:20px auto;
padding:15px;

}

.header{

background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
margin-bottom:20px;

}

.header h2{

font-size:32px;

}

.search{

width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
margin-bottom:15px;

}

.actions{

display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;

}

.actions button{

flex:1;
min-width:140px;
padding:13px;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;

}

.refresh{

background:#7c3aed;

}

.logout{

background:#dc2626;

}

.table-container{

width:100%;
overflow-x:auto;
-webkit-overflow-scrolling:touch;

}

table{

width:100%;
min-width:1200px;
border-collapse:collapse;
background:#1e293b;

}

th{

background:#334155;
padding:14px;
text-align:center;

}

td{

padding:14px;
text-align:center;
border-bottom:1px solid #334155;

}

.status{

padding:6px 10px;
border-radius:6px;
font-weight:bold;

}

.pending{

background:#f59e0b;
color:black;

}

.processing{

background:#3b82f6;

}

.completed{

background:#22c55e;

}

.cancelled{

background:#ef4444;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>

<h2>📦 Orders Management</h2>

</div>

<input

class="search"

id="search"

type="text"

placeholder="Search Order..."

onkeyup="searchOrders()">

<div class="actions">

<button
class="refresh"
onclick="loadOrders()">

Refresh

</button>

<button
class="logout"
onclick="logout()">

Logout

</button>

</div>

<div class="table-container">

<table>

<thead>

<tr>

<th>ID</th>

<th>User</th>

<th>Service</th>

<th>Quantity</th>

<th>Charge</th>

<th>Status</th>

<th>Provider Order</th>

</tr>

</thead>

<tbody id="ordersTable">

<tr>

<td colspan="7">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<script>

const API="https://gowind-smm-panel-v3.onrender.com";

let allOrders=[];
  /* ===========================
   LOGIN CHECK
=========================== */

const USER = JSON.parse(localStorage.getItem("user"));

if(!localStorage.getItem("token")){

location.href="login.html";

}

if(!USER || USER.role!=="admin"){

location.href="login.html";

}

/* ===========================
   LOAD ORDERS
=========================== */

async function loadOrders(){

try{

const response = await fetch(
API+"/api/orders"
);

const data = await response.json();

allOrders = data.orders || [];

renderOrders(allOrders);

}catch(err){

document.getElementById("ordersTable").innerHTML=

"<tr><td colspan='7'>Failed to load orders</td></tr>";

}

}

/* ===========================
   RENDER TABLE
=========================== */

function renderOrders(list){

const table=document.getElementById("ordersTable");

table.innerHTML="";

if(list.length===0){

table.innerHTML=

"<tr><td colspan='7' style='text-align:center;'>No Orders Found</td></tr>";

return;

}

list.forEach(order=>{

let statusClass="pending";

if(order.status==="Completed"){

statusClass="completed";

}else if(order.status==="Processing"){

statusClass="processing";

}else if(order.status==="Cancelled"){

statusClass="cancelled";

}

table.innerHTML+=`

<tr>

<td>${order.id}</td>

<td>${order.user_id}</td>

<td>${order.service_id}</td>

<td>${order.quantity}</td>

<td>₹${Number(order.charge).toFixed(2)}</td>

<td>

<span class="${statusClass}">

${order.status}

</span>

</td>

<td>

${order.provider_order_id || "-"}

</td>

</tr>

`;

});

}

/* ===========================
   SEARCH
=========================== */

function searchOrders(){

const keyword=document
.getElementById("search")
.value
.toLowerCase();

const filtered=allOrders.filter(order=>

String(order.id).includes(keyword)

||

String(order.user_id)
.toLowerCase()
.includes(keyword)

||

String(order.service_id)
.toLowerCase()
.includes(keyword)

||

String(order.status)
.toLowerCase()
.includes(keyword)

);

renderOrders(filtered);

  }
  /* ===========================
   AUTO REFRESH
=========================== */

setInterval(loadOrders,30000);

/* ===========================
   LOGOUT
=========================== */

function logout(){

localStorage.removeItem("token");
localStorage.removeItem("user");

location.href="login.html";

}

/* ===========================
   HEADER
=========================== */

if(USER){

document.querySelector(".header h2").innerHTML=

"📦 Orders Management";

}

/* ===========================
   WINDOW LOAD
=========================== */

window.onload=function(){

loadOrders();

};

/* ===========================
   BUTTON ANIMATION
=========================== */

document.querySelectorAll("button").forEach(btn=>{

btn.addEventListener("mouseenter",function(){

this.style.transform="scale(1.03)";
this.style.transition=".2s";

});

btn.addEventListener("mouseleave",function(){

this.style.transform="scale(1)";

});

});

/* ===========================
   SHORTCUT KEYS
=========================== */

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

location.href="admindashboard.html";

}

if(e.ctrlKey && e.key==="r"){

e.preventDefault();

loadOrders();

}

});
  /* ===========================
   STATUS STYLE
=========================== */

document.querySelectorAll(".status").forEach(status=>{

status.style.fontWeight="bold";
status.style.padding="8px 12px";
status.style.borderRadius="6px";

});

/* ===========================
   TABLE ROW HOVER
=========================== */

document.querySelectorAll("#ordersTable tr").forEach(row=>{

row.addEventListener("mouseenter",function(){

this.style.background="#273449";

});

row.addEventListener("mouseleave",function(){

this.style.background="transparent";

});

});

/* ===========================
   PAGE READY
=========================== */

console.log("Orders Management Ready");

</script>

</body>

</html>
