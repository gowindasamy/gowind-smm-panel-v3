<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Service</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>➕ Add Service</h1>
</header>

<main>

<input type="number" id="provider_id" placeholder="Provider ID">

<input type="number" id="service_id" placeholder="Service ID">

<input type="text" id="name" placeholder="Service Name">

<input type="text" id="category" placeholder="Category">

<input type="number" id="rate" placeholder="Rate">

<input type="number" id="min" placeholder="Minimum">

<input type="number" id="max" placeholder="Maximum">

<button onclick="addService()">Add Service</button>

<p id="result"></p>

</main>

<script>
async function addService(){

const response = await fetch("https://gowind-smm-panel-v3.onrender.com/api/services",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
provider_id:Number(document.getElementById("provider_id").value),
service_id:Number(document.getElementById("service_id").value),
name:document.getElementById("name").value,
category:document.getElementById("category").value,
rate:Number(document.getElementById("rate").value),
min:Number(document.getElementById("min").value),
max:Number(document.getElementById("max").value)
})
});

const data = await response.json();

document.getElementById("result").innerHTML =
data.message || data.error;

}
</script>

</body>
</html>
